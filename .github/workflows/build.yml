name: build-and-publish

# Build the HistoricalWow viewer container and push to ghcr.io on every
# push to main, plus on manual trigger. Tags:
#   :latest   — moves with main
#   :sha-XXXX — immutable, references the commit
#   :main     — moves with main (same as :latest)

on:
  push:
    branches: [main]
    paths-ignore:
      # Doc-only edits still trigger a rebuild — the deployed image bundles
      # docs/* (openapi.yaml, tables.md, API.md, swagger-ui assets), so a
      # README or API.md change needs a fresh image to reach prod.
      - 'project/data/**'
      - '.gitignore'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install doc-verify deps
        run: python3 -m pip install --quiet openapi-spec-validator

      - name: Verify docs in sync with SCHEMAS and openapi.yaml is valid
        run: make verify-docs

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # amd64 is fine for typical Linux VMs; add linux/arm64 here if
          # your prod VM is on Graviton / Apple Silicon.
          platforms: linux/amd64

      - name: Summary
        run: |
          echo "### Published image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags pushed:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull on the prod VM:" >> $GITHUB_STEP_SUMMARY
          echo '```sh' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
