# HistoricalWow — production deployment template.
#
# Pulls the latest build from ghcr.io and serves on port 8080.
# The exported archive is a read-only bind mount; data never lives in
# the image or the registry.
#
# Usage on the prod VM (after `docker login ghcr.io`):
#   docker compose pull
#   docker compose up -d
#
# Update flow:
#   docker compose pull && docker compose up -d
# (rolls forward to the latest image; data volume is untouched.)

services:
  historicalwow:
    # Replace <owner> with your GitHub username/org once the repo is created.
    # Pin to a specific SHA in production rather than :latest if you want
    # explicit version control over rollouts.
    image: ghcr.io/windoze95/historicalwow:latest
    container_name: historicalwow

    ports:
      - "8080:80"

    volumes:
      # Mount the exporter's data dir into the container. We do NOT mark
      # it :ro — SQLite in WAL journal mode needs to create -shm/-wal
      # coordination files on the same filesystem as the DB, even for
      # purely-SELECT readers, and a read-only mount returns "unable to
      # open database file". server.py compensates by opening the DB
      # with `?mode=ro` URI flags, so the application layer can't write
      # even though the mount allows it.
      - ./project/data:/app/data
      # Access log lives outside the image so it survives `docker compose
      # pull && up -d`. server.py writes one JSON line per request to
      # /app/logs/access.log, with rotation via Python's RotatingFileHandler.
      # Set HISTORICALWOW_ACCESS_LOG="" below to disable; this mount is
      # harmless when the log is off (the directory just stays empty).
      - ./logs:/app/logs

    environment:
      # HR gate. When HR_UNLOCK_PASSWORD is set, every API response hides
      # incidents whose assignment_group equals HR_GROUP_SYS_ID. The viewer
      # surfaces an "Unlock IT - HR Support" button; entering this password
      # sets a per-browser cookie that whitelists the session.
      # Source the password from the .env file alongside this compose file
      # (gitignored). Leave HR_UNLOCK_PASSWORD unset to disable the gate.
      HR_GROUP_SYS_ID: "356fce0a4fcd255057a8847221ad48de"
      HR_GROUP_LABEL:  "IT - HR Support"
      HR_UNLOCK_PASSWORD: "${HR_UNLOCK_PASSWORD:-}"

      # Access log. There is no auth in front of this service, so the only
      # identity signal is IP + best-effort reverse-DNS hostname. Disable
      # by setting HISTORICALWOW_ACCESS_LOG to empty; disable just the DNS
      # lookups (and log "-" for host) by setting _DNS=0 if corp DNS is
      # slow or unreliable. Rotation defaults to 10 MB × 5 backups.
      HISTORICALWOW_ACCESS_LOG:             "${HISTORICALWOW_ACCESS_LOG:-/app/logs/access.log}"
      HISTORICALWOW_ACCESS_LOG_DNS:         "${HISTORICALWOW_ACCESS_LOG_DNS:-1}"
      HISTORICALWOW_ACCESS_LOG_MAX_BYTES:   "${HISTORICALWOW_ACCESS_LOG_MAX_BYTES:-10485760}"
      HISTORICALWOW_ACCESS_LOG_BACKUPS:     "${HISTORICALWOW_ACCESS_LOG_BACKUPS:-5}"
      # Trust X-Forwarded-For for the logged client IP. Leave at 0 while the
      # container is directly reachable (a direct client can forge the header
      # and spoof the audit log). Set to 1 only once a trusted reverse proxy
      # terminates connections in front of this server.
      HISTORICALWOW_TRUST_PROXY:            "${HISTORICALWOW_TRUST_PROXY:-0}"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3

    # Optional: pin resources. Uncomment if your VM is shared.
    # deploy:
    #   resources:
    #     limits:
    #       memory: 256M
    #       cpus: '0.5'
