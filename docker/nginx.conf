# nginx config for HistoricalWow.
# Serves the bundled HistoricalWow.html and the volume-mounted data/.

server {
    listen 80;
    server_name _;
    root /app;
    index HistoricalWow.html;

    # Larger types map for ServiceNow attachment file extensions
    types {
        text/html                       html htm;
        text/css                        css;
        application/javascript          js;
        application/json                json ndjson;
        text/plain                      txt log;
        application/pdf                 pdf;
        image/jpeg                      jpg jpeg;
        image/png                       png;
        image/svg+xml                   svg;
        image/gif                       gif;
        application/zip                 zip;
        application/octet-stream        bin;
        message/rfc822                  eml;
        text/csv                        csv;
    }

    # Default: serve HistoricalWow.html for any unmatched path so deep links
    # (#/incidents/abc123 etc.) work after a refresh.
    location / {
        try_files $uri $uri/ /HistoricalWow.html;
    }

    # data/ is the volume mount — large NDJSON files + attachments tree.
    # Disable caching so a fresh export shows up immediately on refresh.
    location /data/ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff";
        autoindex off;

        # Attachments can be large (multi-MB PDFs, log files); raise the
        # client max body size only matters for uploads (we don't accept
        # any), but allow generous read timeouts for slow clients.
        sendfile on;
        tcp_nopush on;
    }

    # Don't ever cache the viewer HTML — we update it on every push to main.
    location = /HistoricalWow.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Quiet some noise
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;
    server_tokens off;
}
