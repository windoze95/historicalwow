<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>HistoricalWow docs</title>
  <style>
    :root {
      --bg:           #fafafa;
      --bg-elev:      #ffffff;
      --fg:           #1c1c1c;
      --fg-muted:     #555;
      --fg-subtle:    #888;
      --border:       #e3e3e3;
      --border-soft:  #ececec;
      --code-bg:      #f1f1f1;
      --pre-bg:       #f4f4f4;
      --link:         #0366d6;
      --table-head:   #f5f5f5;
      --quote-border: #dfe4ea;
      --error:        #c0392b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #1a1a1a;
        --bg-elev:      #232323;
        --fg:           #e6e6e6;
        --fg-muted:     #a8a8a8;
        --fg-subtle:    #777;
        --border:       #2e2e2e;
        --border-soft:  #2a2a2a;
        --code-bg:      #2a2a2a;
        --pre-bg:       #1f1f1f;
        --link:         #58a6ff;
        --table-head:   #262626;
        --quote-border: #3a3a3a;
        --error:        #ff6b6b;
      }
    }
    body { margin: 0; background: var(--bg); color: var(--fg);
           font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                        Helvetica, Arial, sans-serif;
           font-size: 14.5px; line-height: 1.55; }
    header { background: var(--bg-elev); border-bottom: 1px solid var(--border);
             padding: 10px 32px; font-size: 13px; }
    header a { color: var(--fg-muted); text-decoration: none; }
    header a:hover { text-decoration: underline; color: var(--link); }
    main { max-width: 920px; margin: 0 auto; padding: 28px 32px 64px; }
    main h1, main h2, main h3, main h4 { font-weight: 600; line-height: 1.25;
        margin: 1.6em 0 0.6em; color: var(--fg); }
    main h1 { font-size: 1.95em; border-bottom: 1px solid var(--border);
              padding-bottom: 0.3em; margin-top: 0.2em; }
    main h2 { font-size: 1.45em; border-bottom: 1px solid var(--border-soft);
              padding-bottom: 0.25em; }
    main h3 { font-size: 1.18em; }
    main h4 { font-size: 1.05em; color: var(--fg-muted); }
    main p { margin: 0.6em 0; }
    main code { background: var(--code-bg); padding: 1px 5px; border-radius: 3px;
        font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 0.92em; }
    main pre { background: var(--pre-bg); padding: 12px 16px; border-radius: 6px;
        overflow-x: auto; font-size: 0.9em; line-height: 1.45;
        border: 1px solid var(--border-soft); }
    main pre code { background: none; padding: 0; }
    main table { border-collapse: collapse; margin: 1em 0; display: block;
                 overflow-x: auto; }
    main table th, main table td { border: 1px solid var(--border);
                                   padding: 6px 12px;
                                   text-align: left; vertical-align: top; }
    main table th { background: var(--table-head); font-weight: 600; }
    main blockquote { border-left: 4px solid var(--quote-border);
                      padding: 0 14px; margin: 1em 0; color: var(--fg-muted); }
    main a { color: var(--link); text-decoration: none; }
    main a:hover { text-decoration: underline; }
    main hr { border: 0; border-top: 1px solid var(--border); margin: 1.6em 0; }
    main ul, main ol { padding-left: 30px; }
    main li { margin: 0.15em 0; }
    main img { max-width: 100%; }
    #status { color: var(--fg-subtle); padding: 24px 0; font-style: italic; }
    #status.err { color: var(--error); font-style: normal; }
    /* Codex-style inline code keeps backgrounds in tables looking right. */
    main table code { background: var(--code-bg); }
  </style>
</head>
<body>
<header>
  <a href="/docs/">← Interactive API docs</a>
</header>
<main id="content"><div id="status">Loading…</div></main>
<script src="md-viewer/marked.min.js"></script>
<script>
(function () {
  // viewer.html is served by server.py whenever a browser requests
  // /docs/<file>.md (content negotiation on Accept). The page is the same
  // for every .md request — the JS reads window.location.pathname to
  // figure out which file it's rendering and fetches the same URL back
  // with Accept: text/markdown so the server returns the raw bytes.
  var path = window.location.pathname;
  document.title = path.split('/').pop() + ' — HistoricalWow docs';
  fetch(path, { headers: { 'Accept': 'text/markdown' } })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function (md) {
      // Conservative marked options — our markdown is hand-authored with
      // explicit links and blank lines; no need for breaks-on-newline.
      var html = marked.parse(md, { gfm: true, breaks: false });
      document.getElementById('content').innerHTML = html;
      var h1 = document.querySelector('#content h1');
      if (h1) document.title = h1.textContent + ' — HistoricalWow docs';
    })
    .catch(function (e) {
      var s = document.getElementById('status') ||
              (function () {
                var d = document.createElement('div');
                d.id = 'status';
                document.getElementById('content').appendChild(d);
                return d;
              })();
      s.className = 'err';
      s.textContent = 'Could not load this document: ' + e.message;
    });
})();
</script>
</body>
</html>
