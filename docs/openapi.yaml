components:

  parameters:
    Limit:
      name: limit
      in: query
      schema: {type: integer, minimum: 1, maximum: 2000000, default: 200}
      description: |
        Maximum number of rows in the response. Hard cap is 2,000,000. The
        server still streams the response in one shot — pulling a huge `limit`
        without `Accept-Encoding: gzip` produces a very large body.
    Offset:
      name: offset
      in: query
      schema: {type: integer, minimum: 0, default: 0}
    Q:
      name: q
      in: query
      schema: {type: string}
      description: |
        Free-text needle. Matched with SQL `LIKE %q%` against whichever of
        `number`, `short_description`, `name`, `value`, `ip_address`, `fqdn`,
        `event_name` actually exist on the target table (so `cmdb_ci` is
        searchable by IP or hostname and event tables by event name). A `q`
        against a table that has none of those columns returns every row
        (footgun).
    OrderBy:
      name: order_by
      in: query
      schema: {type: string, default: sys_id}
      description: |
        Indexed column to sort on. Whitelisted against the SQLite table
        schema; unknown values fall back to `sys_id`. Defaults to `sys_id`
        because that's the only column with a guaranteed index on every
        table (the primary key). Pass `sys_updated_on` for recent-first lists.
    Dir:
      name: dir
      in: query
      schema: {type: string, enum: [asc, desc], default: desc}
    Slim:
      name: slim
      in: query
      schema: {type: boolean, default: false}
      description: |
        When `true`, the response includes only the indexed columns. The `raw`
        envelope is skipped entirely. Use for eager-loading list views that
        only need a handful of fields per row.

  schemas:

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: {type: string}

    CmdbDistribution:
      type: array
      description: |
        A `cmdb_ci` distribution, count-descending. `value` is the coded value
        (comma-joined when several codes share one display label, so it can be
        passed back to the list endpoint as an `IN (...)` filter); `label` is the
        display label; `count` is the row count.
      items:
        type: object
        properties:
          value: {type: string}
          label: {type: string}
          count: {type: integer}

    TaskDistribution:
      type: array
      description: |
        Count-descending indexed task dimension. `value` round-trips through
        the generic list filter; `__empty__` means NULL or empty string.
      items:
        type: object
        required: [value, label, count]
        properties:
          value: {type: string}
          label: {type: string}
          count: {type: integer}

    TaskSubcategoryMetric:
      type: object
      required: [category, category_label, value, label, count]
      properties:
        category: {type: string, description: 'Parent category value, or `__empty__`.'}
        category_label: {type: string}
        value: {type: string, description: Subcategory value.}
        label: {type: string}
        count: {type: integer}
        defined: {type: boolean, description: Whether an active matching sys_choice definition exists.}

    ListEnvelope:
      type: object
      required: [rows, total, limit, offset]
      properties:
        rows:
          type: array
          description: |
            One element per row. The shape varies by table — see the per-table
            `*Row` schemas in `openapi-schemas.yaml` and the `x-filterable-columns`
            extension. Every row carries at least `sys_id`. With `?slim=1`,
            indexed columns are scalars. Otherwise the row's `raw` envelope is
            merged on top, and same-named fields can retain ServiceNow
            `{value, display_value}` objects.
          items:
            type: object
            additionalProperties: true
            required: [sys_id]
            properties:
              sys_id: {type: string}
        total: {type: integer, description: 'Total rows matching the filter, regardless of pagination.'}
        limit: {type: integer}
        offset: {type: integer}

  securitySchemes:
    HrUnlockCookie:
      type: apiKey
      in: cookie
      name: hr_unlock
      description: |
        Session cookie issued by `POST /api/hr-unlock`. `HttpOnly`,
        `SameSite=Strict`. Required to read HR-assigned incidents and their
        child rows. Token lives in process memory only; a server restart
        clears every outstanding cookie.

