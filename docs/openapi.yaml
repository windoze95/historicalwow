openapi: 3.0.3
info:
  title: HistoricalWow API
  version: '1.3.0'
  description: |
    Read-only HTTP API over a frozen ServiceNow archive. Returns records from
    a SQLite database that was built from an offline ServiceNow export — no
    live ServiceNow connection is involved at request time.

    This spec is the contract for integration teams. The narrative guide
    [docs/API.md](API.md) walks through auth, conventions, footguns, and a
    glossary. The per-table column catalog is in
    [docs/tables.md](tables.md). Interactive try-it-out is served by the
    same image at `/docs` (Swagger UI).

    ## Audience
    Internal teams and approved external partners. The archive contains
    real ServiceNow PII, ticket bodies, and attachment binaries — handle
    every response as sensitive company data.

    ## Authentication
    Most endpoints are unauthenticated read-only. A subset of incidents
    (those assigned to a configured HR group) plus their child and descendant
    rows is hidden unless the caller holds a valid `hr_unlock` session cookie.
    See `/api/hr-status`, `/api/hr-unlock`, and `x-hr-parent-columns` in
    `openapi-schemas.yaml`.

    ## Versioning
    `info.version` tracks the API surface, not the deployed image tag.
    A new endpoint or new optional response field is a minor bump; a
    breaking change to a response shape is a major bump. The current
    image always serves the spec at `/openapi.yaml`.
  contact:
    name: HistoricalWow maintainers
    url: https://github.com/windoze95/historicalwow/issues
  license:
    name: Private — not licensed for redistribution.

servers:
  - url: /
    description: The same origin that serves this spec.

tags:
  - name: manifest
    description: Build manifest and pre-computed lookup blobs.
  - name: hr-gate
    description: HR session cookie — query state, unlock, lock.
  - name: tables
    description: Generic per-table list and record routes.
  - name: activity
    description: Per-record journal entries, audit trail, and attachment metadata.
  - name: search
    description: Cross-table search and CMDB relations.
  - name: catalog
    description: Service catalog variables submitted on a request item.
  - name: identity
    description: Caller network identity visible to the server.
  - name: flows
    description: Decoded Flow Designer source records.
  - name: service-status
    description: Historical outage and service-status reconstruction.
  - name: files
    description: Attachment file binaries.

paths:

  /api/manifest:
    get:
      tags: [manifest]
      summary: Build manifest
      description: |
        Returns the contents of `manifest.json` produced by the exporter — snapshot
        date, source instance, integrity counts, per-table row totals, and the
        SHA-256 digest of the manifest itself. Cached aggressively; clients
        should revalidate via `If-None-Match`.
      responses:
        '200':
          description: Manifest payload.
          headers:
            ETag: {schema: {type: string}}
            Cache-Control: {schema: {type: string}}
            Content-Encoding:
              schema: {type: string, enum: [gzip]}
              description: 'Always `gzip` on a 200 response; this endpoint serves a pre-compressed cached representation.'
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '304': {description: 'Not modified (matched `If-None-Match`).'}
        '404': {description: 'Manifest missing on disk.', content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  /data/manifest.json:
    get:
      tags: [manifest]
      summary: Build manifest compatibility alias
      deprecated: true
      description: |
        Compatibility alias for `/api/manifest`, with the same payload, caching,
        and conditional-request behavior. New clients should use
        `/api/manifest`.
      responses:
        '200':
          description: Manifest payload.
          headers:
            ETag: {schema: {type: string}}
            Cache-Control: {schema: {type: string}}
            Content-Encoding:
              schema: {type: string, enum: [gzip]}
              description: 'Always `gzip` on a 200 response; this endpoint serves a pre-compressed cached representation.'
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '304': {description: 'Not modified (matched `If-None-Match`).'}
        '404': {description: 'Manifest missing on disk.', content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  /api/cmdb_ci_lookup:
    get:
      tags: [manifest]
      summary: Compact CI lookup blob
      description: |
        Returns a `{sys_id: {name, sys_class_name, operational_status}}` map for
        every row in `cmdb_ci`. Optimised for clients that need to translate
        many CI sys_ids to display names without firing one request per row.
        Pre-built once per process and served from an in-memory cache.
      responses:
        '200':
          description: CI lookup map.
          headers:
            ETag: {schema: {type: string}}
            Cache-Control: {schema: {type: string}}
            Content-Encoding:
              schema: {type: string, enum: [gzip]}
              description: 'Always `gzip`; this endpoint serves a pre-compressed cached representation.'
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    name: {type: string}
                    sys_class_name: {type: string}
                    operational_status: {type: string}
        '304': {description: Not modified.}

  /api/cmdb/metrics:
    get:
      tags: [manifest]
      summary: CMDB overview metrics
      description: |
        Pre-computed aggregates over `cmdb_ci` and `cmdb_rel_ci` for the CMDB
        overview page and the CI-list filter dropdowns: counts by class,
        operational/install status, discovery source, last-discovered freshness,
        ownership coverage, and relationship/orphan coverage. Cached in-memory
        per DB build (same ETag / Cache-Control shape as the lookup blobs).

        A dimension is only computed when its column is indexed — `indexed_columns`
        lists what is available, so a client can tell which dimensions (and which
        CI-list filters) are populated. Distribution entries carry the coded
        `value` (comma-joined when several codes share one display label, so it
        round-trips through the `IN (...)` filter), the display `label`, and the
        `count`.
      responses:
        '200':
          description: CMDB metrics.
          headers:
            ETag: {schema: {type: string}}
            Cache-Control: {schema: {type: string}}
            Content-Encoding:
              schema: {type: string, enum: [gzip]}
              description: 'Always `gzip`; this endpoint serves a pre-compressed cached representation.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: {type: integer, description: Total cmdb_ci rows.}
                  snapshot_date: {type: string}
                  indexed_columns:
                    type: array
                    items: {type: string}
                    description: cmdb_ci columns that are indexed (hence filterable / aggregatable).
                  classes: {$ref: '#/components/schemas/CmdbDistribution'}
                  operational_status: {$ref: '#/components/schemas/CmdbDistribution'}
                  install_status: {$ref: '#/components/schemas/CmdbDistribution'}
                  discovery_source: {$ref: '#/components/schemas/CmdbDistribution'}
                  staleness:
                    type: array
                    description: last_discovered age buckets vs the snapshot date (empty until last_discovered is indexed).
                    items:
                      type: object
                      properties:
                        bucket: {type: string}
                        count: {type: integer}
                  ownership:
                    type: object
                    properties:
                      owned_by: {type: integer, nullable: true, description: CIs with owned_by set (null until the column is indexed).}
                      support_group: {type: integer, nullable: true}
                      total: {type: integer}
                  relationships:
                    type: object
                    properties:
                      total_rels: {type: integer}
                      connected: {type: integer, description: Distinct CIs appearing as a parent or child that exist in this snapshot.}
                      orphans: {type: integer}
                      types:
                        type: array
                        items:
                          type: object
                          properties:
                            label: {type: string}
                            count: {type: integer}
        '304': {description: Not modified.}

  /api/task/metrics/{table}:
    get:
      tags: [tables]
      summary: Task-table analysis metrics
      description: |
        Indexed distributions and coverage for one supported task table. The
        response powers the task analysis page and its drill-through list
        filters. Dimensions are capability-driven: a field appears only when
        it is an extracted column in the current SQLite build. Distribution
        entries carry the exact stored `value`, display `label`, and `count`;
        pass `value` back to `/api/{table}?<dimension>=<value>`.

        `category` and dependent `(category, subcategory)` definitions are
        reconciled with active `sys_choice` rows. `unused` contains active
        configured choices with zero observed records. `__empty__` is the
        explicit drill-through value for records whose indexed field is NULL
        or empty.

        Metrics for supported task tables with HR-dependent rows honor the gate.
        Responses vary by cookie and are revalidated on every request;
        server-side aggregates are cached separately for locked and unlocked
        visibility.
      parameters:
        - name: table
          in: path
          required: true
          schema:
            type: string
            enum:
              - incident
              - change_request
              - problem
              - problem_task
              - sc_request
              - sc_req_item
              - sc_task
              - incident_task
              - change_task
              - sysapproval_group
              - asset_task
              - sn_contract_renewal_task
      responses:
        '200':
          description: Task metrics visible to the current HR-gate session.
          headers:
            Cache-Control: {schema: {type: string}, description: '`no-cache, must-revalidate`.'}
            Vary: {schema: {type: string}, description: '`Accept-Encoding, Cookie`.'}
          content:
            application/json:
              schema:
                type: object
                required: [table, total, indexed_columns, dimensions, coverage, subcategory_pairs, unused]
                properties:
                  table: {type: string}
                  total: {type: integer}
                  snapshot_date: {type: string}
                  indexed_columns:
                    type: array
                    items: {type: string}
                  dimensions:
                    type: object
                    additionalProperties: {$ref: '#/components/schemas/TaskDistribution'}
                  coverage:
                    type: object
                    additionalProperties:
                      type: object
                      required: [set, empty]
                      properties:
                        set: {type: integer}
                        empty: {type: integer}
                  subcategory_pairs:
                    type: array
                    items: {$ref: '#/components/schemas/TaskSubcategoryMetric'}
                  unused:
                    type: object
                    properties:
                      category: {$ref: '#/components/schemas/TaskDistribution'}
                      subcategory:
                        type: array
                        items: {$ref: '#/components/schemas/TaskSubcategoryMetric'}
        '404':
          description: Unknown or unsupported task table.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/sys_user_lookup:
    get:
      tags: [manifest]
      summary: Compact user lookup blob
      description: |
        Returns a `{sys_id: {name, user_name, title, department, location}}` map
        for every row in `sys_user`. Same caching shape as `/api/cmdb_ci_lookup`.
      responses:
        '200':
          description: User lookup map.
          headers:
            ETag: {schema: {type: string}}
            Cache-Control: {schema: {type: string}}
            Content-Encoding:
              schema: {type: string, enum: [gzip]}
              description: 'Always `gzip`; this endpoint serves a pre-compressed cached representation.'
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    name: {type: string}
                    user_name: {type: string}
                    title: {type: string}
                    department: {type: string}
                    location: {type: string}
        '304': {description: Not modified.}

  /api/hr-status:
    get:
      tags: [hr-gate]
      summary: Inspect HR gate state
      description: |
        Reports whether the gate is enabled, whether the current request bears
        a valid `hr_unlock` cookie, and the configured HR group sys_id and
        label. Safe to call unauthenticated — no protected data is exposed.
      responses:
        '200':
          description: Gate state.
          content:
            application/json:
              schema:
                type: object
                required: [enabled, unlocked]
                properties:
                  enabled:
                    type: boolean
                    description: True iff `HR_UNLOCK_PASSWORD` is configured server-side.
                  unlocked:
                    type: boolean
                    description: True iff the request bears a valid `hr_unlock` cookie.
                  group_sys_id:
                    type: string
                    description: sys_id of the HR group whose incidents are gated.
                  group_label:
                    type: string

  /api/hr-unlock:
    post:
      tags: [hr-gate]
      summary: Unlock the HR gate
      description: |
        Exchanges a password for an `hr_unlock` session cookie. The cookie is
        `HttpOnly` and `SameSite=Strict`. Tokens live in process memory only;
        a server restart invalidates every outstanding cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: {type: string, format: password}
      responses:
        '200':
          description: Success. Sets the `hr_unlock` cookie.
          headers:
            Set-Cookie:
              schema: {type: string}
              description: '`hr_unlock=<token>; Path=/; HttpOnly; SameSite=Strict`'
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: {type: boolean, enum: [true]}
        '400': {description: 'Invalid JSON body.', content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
        '403': {description: 'Wrong password.', content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}
        '503': {description: 'Gate disabled (no password configured).', content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}}

  /api/hr-lock:
    post:
      tags: [hr-gate]
      summary: Lock the HR gate
      description: |
        Invalidates the caller's `hr_unlock` token server-side and clears the
        cookie. Idempotent — safe to call without a cookie.
      responses:
        '200':
          description: Cookie cleared.
          headers:
            Set-Cookie:
              schema: {type: string}
              description: '`hr_unlock=; Path=/; HttpOnly; SameSite=Strict; Max-Age=0`'
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: {type: boolean, enum: [true]}

  /api/whoami:
    get:
      tags: [identity]
      summary: Inspect caller network identity
      description: |
        Returns the source IP address and best-effort reverse-DNS hostname the
        server sees for this request, plus whether access logging is configured.
        This reports identity by network position; it does not authenticate the
        caller. `ip` and `host` can be null when unavailable.
      responses:
        '200':
          description: Caller identity visible to the server.
          content:
            application/json:
              schema:
                type: object
                required: [ip, host, access_log]
                properties:
                  ip: {type: string, nullable: true, example: 192.0.2.10}
                  host: {type: string, nullable: true, example: client.example}
                  access_log:
                    type: boolean
                    description: Whether this server process has access logging configured.

  /api/search:
    get:
      tags: [search]
      summary: Cross-table search
      description: |
        Searches `number` and `short_description` across the configured task
        tables (see `x-task-tables` in openapi-schemas.yaml). HR-assigned
        incidents and HR-linked child rows are filtered out when the gate is
        locked. Returns at most `limit` rows per table. A missing or blank `q`
        returns `{rows: []}` without running a search.
      parameters:
        - name: q
          in: query
          schema: {type: string}
          description: Search needle. Matched with SQL `LIKE %q%` against `number` and `short_description`; missing or blank returns an empty result.
        - name: types
          in: query
          schema: {type: string}
          description: |
            Optional comma-separated list of task tables to search. Defaults to
            every table in `x-task-tables`. Unknown table names are silently dropped.
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 50, default: 8}
          description: Max rows returned per table.
      responses:
        '200':
          description: Matched rows across each requested table.
          content:
            application/json:
              schema:
                type: object
                properties:
                  q: {type: string}
                  rows:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      description: |
                        A matched task row. Carries the indexed task columns plus a
                        `_table` field naming the source table.
                      properties:
                        _table: {type: string}
                        sys_id: {type: string}
                        number: {type: string}
                        short_description: {type: string}

  /api/journal/{element_id}:
    get:
      tags: [activity]
      summary: Journal entries for a record
      description: |
        Returns every `sys_journal_field` row whose `element_id` matches the
        parent record's sys_id. Includes work notes and comments, ordered by
        `sys_created_on` ascending. Returns `403 hr_locked` if `element_id`
        refers to an HR-assigned incident and the request lacks an `hr_unlock`
        cookie.
      parameters:
        - name: element_id
          in: path
          required: true
          schema: {type: string}
          description: Parent record sys_id (typically an incident or change request).
      responses:
        '200':
          description: Journal rows envelope.
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items: {$ref: 'openapi-schemas.yaml#/components/schemas/SysJournalFieldRow'}
        '403':
          description: HR-locked.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/audit/{documentkey}:
    get:
      tags: [activity]
      summary: Audit trail for a record
      description: |
        Returns every `sys_audit` row whose `documentkey` matches the parent
        record's sys_id. Each row is one field-level change. Same HR semantics
        as `/api/journal/{element_id}`.
      parameters:
        - name: documentkey
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Audit rows envelope.
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items: {$ref: 'openapi-schemas.yaml#/components/schemas/SysAuditRow'}
        '403':
          description: HR-locked.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/attachments/{table_sys_id}:
    get:
      tags: [activity]
      summary: Attachment metadata for a record
      description: |
        Returns `sys_attachment` metadata rows for the parent record. The
        binaries themselves are served from `/data/attachments/<shard>/<sys_id>/<file_name>`.
        Same HR semantics as the other activity endpoints.
      parameters:
        - name: table_sys_id
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Attachment rows envelope.
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items: {$ref: 'openapi-schemas.yaml#/components/schemas/SysAttachmentRow'}
        '403':
          description: HR-locked.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/related/cmdb/{sys_id}:
    get:
      tags: [search]
      summary: CMDB relations for a CI
      description: |
        Returns upstream (parents) and downstream (children) relations for a
        CI via the `cmdb_rel_ci` table. Each relation includes the related
        CI's full envelope merged in under the `ci` key.
      parameters:
        - name: sys_id
          in: path
          required: true
          schema: {type: string}
          description: CI sys_id.
      responses:
        '200':
          description: Upstream + downstream relations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  upstream:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  downstream:
                    type: array
                    items:
                      type: object
                      additionalProperties: true

  /api/variables/{ritm_sys_id}:
    get:
      tags: [catalog]
      summary: Catalog variables submitted on an RITM
      description: |
        Joins `sc_item_option_mtom` → `sc_item_option` → `item_option_new` to
        return the form fields a user typed when submitting a request item.
        Returns variables ordered by their definition's `order` field, then by
        question text.
      parameters:
        - name: ritm_sys_id
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Variables envelope.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cat_item:
                    type: string
                    nullable: true
                    description: Catalog item display name (from `sc_cat_item.name` on the first variable's join), or null if no variables matched.
                  rows:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      properties:
                        var_name: {type: string}
                        label: {type: string, description: '`question_text` from `item_option_new`.'}
                        value: {type: string}
                        type: {type: string, description: 'Variable type (e.g. `string`, `reference`, `select_box`).'}
                        order_idx: {type: string, nullable: true}
                        reference: {type: string, nullable: true, description: 'For `type=reference`, the target table.'}
        '403':
          description: HR-locked.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/sla-stats/{kind}/{sys_id}:
    get:
      tags: [activity]
      summary: Incident SLA totals for a user or group
      description: |
        Joins `task_sla` to `incident` and returns total SLAs, breached SLAs,
        and counts by stage for incidents assigned to one user or group. When
        the HR gate is locked, gated incidents are silently excluded. If either
        source table is unavailable, the endpoint returns zero counts.
      parameters:
        - name: kind
          in: path
          required: true
          schema: {type: string, enum: [user, group]}
          description: Use `user` to match `incident.assigned_to`; use `group` to match `incident.assignment_group`.
        - name: sys_id
          in: path
          required: true
          schema: {type: string, pattern: '^[a-f0-9]{1,32}$'}
          description: User or group sys_id, according to `kind`.
      responses:
        '200':
          description: SLA totals visible to the current HR-gate session.
          content:
            application/json:
              schema:
                type: object
                required: [total, breached, by_stage]
                properties:
                  total: {type: integer, minimum: 0}
                  breached: {type: integer, minimum: 0}
                  by_stage:
                    type: object
                    additionalProperties: {type: integer, minimum: 0}

  /api/flow_reconstruction/{flow_id}:
    get:
      tags: [flows]
      summary: Decode the archived records behind a flow
      description: |
        Returns the `sys_hub_flow` header plus legacy and modern triggers,
        action instances, and recovered flow-logic blocks. Stored base64+gzip
        configuration fields are decoded to JSON. Nested fields follow the raw
        ServiceNow records and vary by flow.
      parameters:
        - name: flow_id
          in: path
          required: true
          schema: {type: string, pattern: '^[a-f0-9]{1,32}$'}
          description: '`sys_hub_flow.sys_id`.'
      responses:
        '200':
          description: Decoded flow source records.
          headers:
            Cache-Control: {schema: {type: string}, description: '`public, max-age=300`.'}
          content:
            application/json:
              schema:
                type: object
                required: [flow, triggers, actions, logic, counts]
                properties:
                  flow:
                    type: object
                    nullable: true
                    additionalProperties: true
                  triggers:
                    type: array
                    items: {type: object, additionalProperties: true}
                  actions:
                    type: array
                    items: {type: object, additionalProperties: true}
                  logic:
                    type: array
                    items: {type: object, additionalProperties: true}
                  counts:
                    type: object
                    required: [actions, triggers, logic]
                    properties:
                      actions: {type: integer, minimum: 0}
                      triggers: {type: integer, minimum: 0}
                      logic: {type: integer, minimum: 0}
        '404':
          description: No flow header or related internals exist in the snapshot.
          content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}

  /api/service_status:
    get:
      tags: [service-status]
      summary: Reconstruct the historical service-status grid
      description: |
        Builds a daily outage grid from `cmdb_ci_outage`. The window ends on
        the most recent outage date in the frozen snapshot, not the current
        date. For overlapping outages, the worst status wins for each service
        and day. If no outage data is available, `window` is null and both
        arrays are empty; populated responses are cached for five minutes.
      parameters:
        - name: days
          in: query
          schema: {type: integer, minimum: 1, maximum: 180, default: 30}
          description: Number of snapshot-relative calendar days. Values are clamped to 1–180; invalid values use 30.
      responses:
        '200':
          description: Historical status window and service rows.
          headers:
            Cache-Control:
              schema: {type: string}
              description: '`public, max-age=300` when outage data is available; otherwise `no-cache, must-revalidate`.'
          content:
            application/json:
              schema:
                type: object
                required: [window, dates, services]
                properties:
                  window:
                    type: object
                    nullable: true
                    required: [start, end, days]
                    properties:
                      start: {type: string, format: date}
                      end: {type: string, format: date}
                      days: {type: integer}
                  dates:
                    type: array
                    items: {type: string, format: date}
                  services:
                    type: array
                    items:
                      type: object
                      required: [ci, name, days, outages]
                      properties:
                        ci: {type: string}
                        name: {type: string}
                        days:
                          type: object
                          additionalProperties: {type: string}
                        outages:
                          type: array
                          items:
                            type: object
                            properties:
