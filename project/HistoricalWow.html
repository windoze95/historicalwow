<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HistoricalNow · ServiceNow Historical Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* HistoricalWow — ServiceNow Historical Archive Viewer */

:root {
  /* Surface — warm dark, "library at dusk" feel. Hue 70 (amber) keeps a
     subtle warmth in the dark surface so it reads as ink-on-leather,
     not pure black. Lightness ~21% — enough to settle the eye but not
     overwhelmingly dark. */
  --bg: oklch(21% 0.012 70);
  --bg-2: oklch(24% 0.013 70);
  --bg-3: oklch(27% 0.015 70);
  --bg-elev: oklch(25% 0.014 70);
  --hover: oklch(29% 0.018 70);
  --selected: oklch(32% 0.055 155);

  /* Borders — visible but soft. The contrast budget on dark themes is
     tighter than light themes; over-bright borders read as harsh. */
  --border: oklch(33% 0.018 70);
  --border-2: oklch(40% 0.022 70);
  --border-strong: oklch(52% 0.025 70);

  /* Text — warm bone tones. Body text at ~91% lightness pairs with the
     21% bg for readable but not screaming contrast. */
  --fg: oklch(91% 0.012 70);
  --fg-2: oklch(76% 0.012 70);
  --fg-3: oklch(60% 0.012 70);
  --fg-4: oklch(48% 0.012 70);

  /* Accent — green stays the brand hue but lifted in lightness so it
     pops against the dark surface without burning the eye. */
  --accent: oklch(72% 0.13 155);
  --accent-2: oklch(78% 0.13 155);
  --accent-bg: oklch(28% 0.055 155);
  --accent-border: oklch(42% 0.090 155);
  --accent-fg: oklch(82% 0.11 155);

  /* Status / priority hues. Backgrounds drop to ~28% (above page bg);
     foreground chip text is light and saturated. Gray gets a warm tint
     so it sits in the same family as the rest of the palette. */
  --c-red:        oklch(74% 0.16 25);
  --c-red-bg:     oklch(28% 0.055 25);
  --c-red-border: oklch(42% 0.100 25);
  --c-amber:      oklch(80% 0.14 75);
  --c-amber-bg:   oklch(28% 0.060 75);
  --c-amber-border: oklch(42% 0.110 75);
  --c-blue:       oklch(74% 0.13 245);
  --c-blue-bg:    oklch(28% 0.055 245);
  --c-blue-border: oklch(42% 0.090 245);
  --c-violet:     oklch(74% 0.13 295);
  --c-violet-bg:  oklch(28% 0.055 295);
  --c-violet-border: oklch(42% 0.090 295);
  --c-gray:       oklch(72% 0.012 70);
  --c-gray-bg:    oklch(28% 0.012 70);
  --c-gray-border: oklch(40% 0.014 70);

  /* Type */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Menlo', monospace;

  /* Sizing */
  --radius: 6px;
  --radius-sm: 4px;
  --radius-lg: 10px;
  --topbar-h: 44px;
  --banner-h: 28px;
  --sidebar-w: 224px;

  /* Shadows */
  /* Shadows — true black with higher alpha. On dark surfaces a tinted
     shadow lifts a card; same alpha as the light theme would be invisible. */
  --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.25);
  --shadow: 0 2px 4px oklch(0% 0 0 / 0.30), 0 6px 14px oklch(0% 0 0 / 0.25);
  --shadow-lg: 0 6px 14px oklch(0% 0 0 / 0.40), 0 18px 44px oklch(0% 0 0 / 0.35);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: 13.5px;
  line-height: 1.5;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  -webkit-font-smoothing: antialiased;
}

#root { height: 100%; }

button {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}

input, textarea {
  font-family: inherit;
  color: inherit;
}

a { color: inherit; text-decoration: none; }

::selection { background: var(--accent-bg); }

.mono { font-family: var(--font-mono); font-feature-settings: 'zero', 'ss01'; }

/* App shell */
.app {
  display: grid;
  grid-template-rows: var(--banner-h) var(--topbar-h) 1fr;
  height: 100%;
}

.banner {
  height: var(--banner-h);
  background: var(--accent-bg);
  border-bottom: 1px solid var(--accent-border);
  color: var(--accent-fg);
  font-size: 11.5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  letter-spacing: 0.01em;
}
.banner .left { display: flex; align-items: center; gap: 12px; }
.banner .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px oklch(58% 0.11 155 / 0.18);
}
.banner .right { display: flex; align-items: center; gap: 14px; font-family: var(--font-mono); font-size: 11px; }
.banner .right span { opacity: 0.85; }

.topbar {
  height: var(--topbar-h);
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr auto;
  align-items: center;
  padding: 0;
}
.topbar .brand {
  display: flex; align-items: center; gap: 9px;
  padding: 0 16px;
  border-right: 1px solid var(--border);
  height: 100%;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.topbar .brand .logo {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--accent) 0%, oklch(45% 0.1 155) 100%);
  display: grid; place-items: center;
  color: white; font-weight: 700; font-size: 12px;
  box-shadow: inset 0 1px 0 oklch(100% 0 0 / 0.25);
}
.topbar .search-wrap {
  padding: 0 16px;
  display: flex; align-items: center;
  height: 100%;
}
.topbar .search-trigger {
  width: 100%;
  max-width: 520px;
  height: 30px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex; align-items: center;
  padding: 0 10px;
  gap: 8px;
  color: var(--fg-3);
  font-size: 13px;
  cursor: text;
  transition: border-color 0.12s, background 0.12s;
}
.topbar .search-trigger:hover { border-color: var(--border-2); background: var(--bg-3); }
.topbar .search-trigger .kbd {
  margin-left: auto;
  display: flex; gap: 2px;
}
.topbar .search-trigger .kbd kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  background: var(--bg-elev);
  border: 1px solid var(--border-2);
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--fg-3);
}
.topbar .controls {
  display: flex; align-items: center; gap: 4px;
  padding: 0 12px;
  height: 100%;
}
.topbar .controls .toggle {
  display: flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 10px;
  border-radius: var(--radius);
  font-size: 12px; color: var(--fg-2);
  border: 1px solid transparent;
}
.topbar .controls .toggle:hover { background: var(--hover); }
.topbar .controls .toggle.on { background: var(--accent-bg); color: var(--accent-fg); border-color: var(--accent-border); }
.topbar .controls .icon-btn {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  border-radius: var(--radius);
  color: var(--fg-2);
}
.topbar .controls .icon-btn:hover { background: var(--hover); color: var(--fg); }

/* Body grid: sidebar + main */
.body {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  overflow: hidden;
  min-height: 0;
}

.sidebar {
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 10px 8px 24px;
  display: flex; flex-direction: column; gap: 14px;
}
.sidebar .section-label {
  text-transform: uppercase;
  font-size: 10.5px;
  letter-spacing: 0.07em;
  color: var(--fg-4);
  font-weight: 600;
  padding: 0 10px;
  margin-bottom: 4px;
}
.sidebar .nav-item {
  display: flex; align-items: center; gap: 9px;
  width: 100%;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  color: var(--fg-2);
  font-size: 13px;
  font-weight: 450;
  position: relative;
}
.sidebar .nav-item:hover { background: var(--hover); color: var(--fg); }
.sidebar .nav-item.active { background: var(--bg-3); color: var(--fg); font-weight: 500; }
.sidebar .nav-item.active::before {
  content: '';
  position: absolute; left: -8px; top: 4px; bottom: 4px;
  width: 2px; background: var(--accent); border-radius: 2px;
}
.sidebar .nav-item .count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-4);
  letter-spacing: -0.02em;
}
.sidebar .nav-item .icon {
  width: 14px; height: 14px;
  color: var(--fg-3);
  display: grid; place-items: center;
}

.main {
  overflow: auto;
  background: var(--bg);
  min-width: 0;
}

/* Tags / chips */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 20px;
  padding: 0 7px;
  border-radius: 4px;
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.005em;
  border: 1px solid var(--c-gray-border);
  background: var(--c-gray-bg);
  color: var(--c-gray);
  white-space: nowrap;
}
.chip .swatch { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.chip.red    { color: var(--c-red);    border-color: var(--c-red-border);    background: var(--c-red-bg); }
.chip.amber  { color: var(--c-amber);  border-color: var(--c-amber-border);  background: var(--c-amber-bg); }
.chip.blue   { color: var(--c-blue);   border-color: var(--c-blue-border);   background: var(--c-blue-bg); }
.chip.violet { color: var(--c-violet); border-color: var(--c-violet-border); background: var(--c-violet-bg); }
.chip.green  { color: var(--accent);   border-color: var(--accent-border);   background: var(--accent-bg); }

.priority-bar {
  display: inline-flex;
  align-items: center;
  gap: 1.5px;
  height: 12px;
}
.priority-bar .b {
  width: 3px; background: var(--c-gray-border); border-radius: 1px;
}
.priority-bar .b.on { background: currentColor; }
.priority-bar.crit  { color: var(--c-red); }
.priority-bar.high  { color: var(--c-amber); }
.priority-bar.med   { color: var(--c-blue); }
.priority-bar.low   { color: var(--fg-4); }

/* Generic page header */
.page-header {
  padding: 22px 28px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 5;
}
.page-header h1 {
  margin: 0; font-size: 20px; font-weight: 600;
  letter-spacing: -0.015em;
  display: flex; align-items: center; gap: 10px;
}
.page-header h1 .count {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-4);
  background: var(--bg-2);
  padding: 2px 7px;
  border-radius: 10px;
}
.page-header .sub {
  font-size: 12.5px; color: var(--fg-3); margin-top: 4px;
}

.toolbar {
  display: flex; align-items: center; gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.toolbar .filter-pill {
  display: inline-flex; align-items: center; gap: 6px;
  height: 26px; padding: 0 9px;
  border: 1px solid var(--border-2);
  border-radius: 14px;
  background: var(--bg-elev);
  font-size: 12px;
  color: var(--fg-2);
}
.toolbar .filter-pill:hover { background: var(--hover); }
.toolbar .filter-pill.active { background: var(--accent-bg); color: var(--accent-fg); border-color: var(--accent-border); }
.toolbar .spacer { flex: 1; }
.toolbar .results {
  font-size: 12px; color: var(--fg-3); font-family: var(--font-mono);
}

/* Tables */
.dt {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.dt thead th {
  position: sticky; top: 0;
  background: var(--bg);
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
  padding: 9px 12px;
  border-bottom: 1px solid var(--border-2);
  white-space: nowrap;
}
.dt tbody tr {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.06s;
}
.dt tbody tr:hover { background: var(--bg-2); }
.dt tbody tr.selected { background: var(--selected); }
.dt tbody td {
  padding: 10px 12px;
  vertical-align: middle;
  color: var(--fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dt td.num, .dt th.num { font-family: var(--font-mono); font-size: 12.5px; color: var(--fg-2); }
.dt td.muted { color: var(--fg-3); }
.dt td.short { max-width: 0; }
.dt td.short .truncate {
  overflow: hidden; text-overflow: ellipsis; display: block;
}

/* Avatars */
.avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: inline-grid; place-items: center;
  font-size: 10.5px; font-weight: 600;
  color: white;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.avatar.sm { width: 18px; height: 18px; font-size: 9.5px; }
.avatar.lg { width: 36px; height: 36px; font-size: 13px; }
.avatar.xl { width: 56px; height: 56px; font-size: 19px; }

.user-cell {
  display: inline-flex; align-items: center; gap: 7px;
  min-width: 0;
}
.user-cell .name { color: var(--fg); }
.user-cell .name.muted { color: var(--fg-3); }

/* Cmd-K palette */
.kpalette-overlay {
  position: fixed; inset: 0;
  background: oklch(20% 0.01 95 / 0.28);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: grid;
  place-items: start center;
  padding-top: 12vh;
}
.kpalette {
  width: min(640px, 92vw);
  background: var(--bg-elev);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
  max-height: 70vh;
}
.kpalette .input-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.kpalette input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 15px;
  background: transparent;
}
.kpalette input::placeholder { color: var(--fg-4); }
.kpalette .results-list {
  overflow-y: auto;
  padding: 6px;
}
.kpalette .group-label {
  padding: 8px 10px 4px;
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--fg-4);
}
.kpalette .result {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
}
.kpalette .result.active { background: var(--bg-3); }
.kpalette .result .icon {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  border-radius: 5px;
  background: var(--bg-2);
  color: var(--fg-2);
  flex-shrink: 0;
}
.kpalette .result .label {
  flex: 1; min-width: 0;
  font-size: 13.5px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.kpalette .result .label .num { font-family: var(--font-mono); color: var(--fg-3); margin-right: 8px; font-size: 12px; }
.kpalette .result .meta { font-size: 11.5px; color: var(--fg-4); }
.kpalette .footer {
  border-top: 1px solid var(--border);
  padding: 8px 14px;
  font-size: 11px; color: var(--fg-4);
  display: flex; gap: 14px; align-items: center;
}
.kpalette .footer .hint { display: flex; align-items: center; gap: 5px; }
.kpalette .footer kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 4px;
}

/* Record detail */
.record {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  height: 100%;
  min-height: 0;
}
.record .left, .record .right { overflow-y: auto; min-height: 0; }
.record .left { border-right: 1px solid var(--border); }

.record-header {
  padding: 22px 28px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 4;
}
.record-header .crumbs {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--fg-3);
  margin-bottom: 8px;
}
.record-header .crumbs a:hover { color: var(--accent); }
.record-header h1 {
  margin: 0;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.35;
  display: flex; align-items: baseline; gap: 12px;
  flex-wrap: wrap;
}
.record-header h1 .num {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--fg-3);
  font-weight: 500;
  letter-spacing: 0;
}
.record-header .title-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--fg-3);
  margin-top: 8px;
  flex-wrap: wrap;
}
.record-header .title-row .dot { color: var(--fg-4); }

.section {
  padding: 16px 28px 8px;
  border-bottom: 1px solid var(--border);
}
.section h3 {
  margin: 0 0 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-3);
  display: flex; align-items: center; gap: 8px;
}
.section h3 .count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-4);
  background: var(--bg-2);
  padding: 1px 6px;
  border-radius: 8px;
  letter-spacing: 0;
  text-transform: none;
  font-weight: 500;
}

/* Field grid */
.fields {
  display: grid;
  grid-template-columns: 130px 1fr;
  row-gap: 9px;
  column-gap: 14px;
  padding-bottom: 14px;
}
.fields .label {
  font-size: 12px;
  color: var(--fg-3);
  font-weight: 450;
  padding-top: 1px;
}
.fields .value {
  font-size: 13px;
  color: var(--fg);
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
  min-width: 0;
  word-break: break-word;
}
.fields .value.muted { color: var(--fg-3); font-style: italic; }
.fields .value .raw {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--fg-4);
  background: var(--bg-2);
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 4px;
}
.fields .ref-link {
  color: var(--fg);
  border-bottom: 1px dashed var(--border-2);
  padding-bottom: 0;
  cursor: pointer;
}
.fields .ref-link:hover { color: var(--accent); border-bottom-color: var(--accent); }

.kv-block {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-size: 12.5px;
  white-space: pre-wrap;
  font-family: var(--font-sans);
  color: var(--fg);
  line-height: 1.55;
}
.kv-block.mono { font-family: var(--font-mono); font-size: 12px; }

/* Tabs */
.tabs {
  display: flex; gap: 2px;
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  background: var(--bg);
  position: sticky; top: 0; z-index: 4;
  height: 40px; align-items: stretch;
}
.tabs .tab {
  padding: 0 12px;
  font-size: 12.5px;
  color: var(--fg-3);
  border-bottom: 2px solid transparent;
  display: flex; align-items: center; gap: 6px;
  margin-bottom: -1px;
  font-weight: 500;
}
.tabs .tab:hover { color: var(--fg); }
.tabs .tab.active { color: var(--fg); border-bottom-color: var(--accent); }
.tabs .tab .badge {
  font-family: var(--font-mono);
  font-size: 10.5px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  padding: 0 5px; height: 16px;
  border-radius: 8px;
  display: inline-flex; align-items: center;
  color: var(--fg-3);
  font-weight: 500;
}

/* Journal */
.journal { padding: 16px 28px 40px; }
.journal .entry {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px dashed var(--border);
  position: relative;
}
.journal .entry:last-child { border-bottom: none; }
.journal .entry .head {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 5px;
  font-size: 12.5px;
  flex-wrap: wrap;
}
.journal .entry .head .who { font-weight: 600; color: var(--fg); }
.journal .entry .head .kind {

  border-radius: 3px; font-weight: 500;
  letter-spacing: 0.01em;

.journal .entry .head .kind.work_notes { background: var(--c-amber-bg); color: var(--c-amber); border: 1px solid var(--c-amber-border); }
.journal .entry .head .kind.comments { background: var(--c-blue-bg); color: var(--c-blue); border: 1px solid var(--c-blue-border); }
.journal .entry .head .when {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-4);
}
.journal .entry .body {
  font-size: 13.5px;
  color: var(--fg);
  white-space: pre-wrap;
  line-height: 1.55;
}

.audit { padding: 8px 28px 40px; }
.audit-row {
  display: grid;
  grid-template-columns: 150px 130px 1fr 1fr;
  font-size: 12.5px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.audit-row:hover { background: var(--bg-2); }
.audit-row .when { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-3); }
.audit-row .field { color: var(--fg-2); font-weight: 500; }
.audit-row .field .label { font-size: 11px; color: var(--fg-4); display: block; font-weight: 400; font-family: var(--font-mono); }
.audit-row .from { color: var(--fg-3); }
.audit-row .from .strike { text-decoration: line-through; opacity: 0.7; }
.audit-row .to { color: var(--fg); }
.audit-row .arrow { color: var(--fg-4); margin: 0 6px; }

.attachments-list { padding: 12px 28px 40px; display: flex; flex-direction: column; gap: 6px; }
.attachment {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elev);
}
.attachment:hover { background: var(--bg-2); border-color: var(--border-2); }

  border-radius: 5px;
  background: var(--bg-3);
  display: grid; place-items: center;
  color: var(--fg-2);
  font-family: var(--font-mono);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.attachment .meta { flex: 1; min-width: 0; }
.attachment .name { font-size: 13px; color: var(--fg); font-weight: 500; }
.attachment .sub { font-size: 11.5px; color: var(--fg-3); font-family: var(--font-mono); margin-top: 2px; }
.attachment .download {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  border-radius: 5px;
  color: var(--fg-3);
}
.attachment .download:hover { background: var(--bg-3); color: var(--fg); }

.related-list { padding: 12px 28px 40px; display: flex; flex-direction: column; gap: 4px; }
.related-item {
  display: grid;
  grid-template-columns: 90px 1fr auto;
  gap: 12px;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elev);
  font-size: 13px;
  align-items: center;
  cursor: pointer;

.related-item:hover { border-color: var(--border-2); background: var(--bg-2); }
.related-item .num { font-family: var(--font-mono); color: var(--fg-2); font-size: 12.5px; }
.related-item .desc { color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Reference page */
.ref-page { padding: 28px; max-width: 920px; margin: 0 auto; }
.ref-page .head {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 22px;
}
.ref-page .head .info h1 {
  margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.01em;
}
.ref-page .head .info .meta {
  font-size: 12.5px; color: var(--fg-3);

.ref-page .head .info .meta .mono { font-size: 11.5px; color: var(--fg-4); }

.ref-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}
.ref-grid .cell {

  padding: 12px 14px;
}
.ref-grid .cell .label {
  font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
  margin-bottom: 4px;
}
.ref-grid .cell .val {
  font-size: 13px; color: var(--fg);

.ref-section { margin-bottom: 22px; }
.ref-section h2 {

  border-radius: 8px;
  text-transform: none;
  letter-spacing: 0;
  color: var(--fg-3);
  font-weight: 500;

/* Empty state */
.empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 28px;
  color: var(--fg-3);
  font-size: 13px;
  text-align: center;
}
.empty .glyph {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-2);
  display: grid; place-items: center;
  color: var(--fg-4);
  margin-bottom: 12px;

/* Audit log overlay */
.audit-log-overlay {
  position: fixed; inset: 0;
  background: oklch(20% 0.01 95 / 0.28);
  z-index: 90;
  display: flex; justify-content: flex-end;
}
.audit-log-panel {
  width: min(520px, 92vw);
  background: var(--bg-elev);
  border-left: 1px solid var(--border-2);
  box-shadow: -8px 0 32px oklch(20% 0.01 95 / 0.12);

.audit-log-panel .head {

.audit-log-panel .head h3 { margin: 0; font-size: 14px; font-weight: 600; }

.audit-log-panel .head .close { margin-left: auto; }

.audit-log-panel .entry {

.audit-log-panel .entry .when { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }

.divider-v { width: 1px; height: 14px; background: var(--border-2); margin: 0 4px; }

/* Spinner */
.dot-pulse {

@keyframes pulse {

  70% { box-shadow: 0 0 0 8px oklch(58% 0.11 155 / 0); }

/* Mark for search highlight */
mark {
  background: var(--c-amber-bg);
  color: var(--c-amber);

  <script>
/* eslint-disable */
// HistoricalWow data layer.
//
// Architecture: this is a thin async API client, NOT a "load everything into
// memory" cache. The viewer fetches what each view needs, when the view needs
// it. Only small reference tables get eager-loaded so component code can do
// synchronous lookups (window.findUser, decodeChoice, etc.).
//
// What's eager (all fired in parallel on boot, gzipped, cached 5 min):
//   sys_choice, core_company, cmn_department, cmn_location, cmn_cost_center,
//   sys_user_group, sys_user_grmember,
//   sys_user_lookup (sys_id → {name, user_name, title, …} compact map),
//   cmdb_ci_lookup  (sys_id → {name, sys_class_name, …}    compact map).
//
// What's lazy (fetched per view via API helpers):
//   every task table (incident, change_request, problem, sc_request, …)
//   full sys_user / cmdb_ci records (UserRefPage / CIRefPage detail)
//   sys_audit, sys_journal_field (per-record on tab open)
//   sys_attachment metadata (per-record)
//   cmdb_rel_ci (per-CI on CIRefPage)

window.HistoricalWowData = (function () {
  // Tables eager-loaded ONLY because the JSX uses them in synchronous lookups
  // (findCI, findGroup, decodeChoice, etc.) and they're small enough to keep
  // in memory. Anything bigger is fetched per-view via API.
  const EAGER_TABLES = [
    ['sys_choice',          'sys_choice'],     // decodeChoice
    ['core_company',        'companies'],      // findCompany
    ['cmn_department',      'departments'],    // findDepartment
    ['cmn_location',        'locations'],      // findLocation
    ['cmn_cost_center',     'cost_centers'],   // findCostCenter
    ['sys_user_group',      'sys_user_group'], // findGroup (~200 records)
    ['sys_user_grmember',   'sys_user_grmember'], // group membership pivot (small)
  ];

  // Mirrors the exporter — used by UI code to inspect "is this a task table?"
  window.TASK_TABLES = [
    'incident', 'change_request', 'problem', 'problem_task',
    'sc_request', 'sc_req_item', 'sc_task',
    'incident_task', 'change_task',
    'sysapproval_group', 'asset_task',
  ];

  const data = {
    // Eagerly loaded (or empty until ready)
    companies: [], departments: [], locations: [], cost_centers: [],
    sys_user_group: [], sys_user_grmember: [],
    sys_choice: [],
    // Lookup maps — compact projections used by sync find* helpers.
    cmdb_ci_lookup: new Map(),  // sys_id → { name, sys_class_name, operational_status }
    sys_user_lookup: new Map(), // sys_id → { name, user_name, title, department, location }
    // Lazy: components fetch what they need via the API helpers below.
    sys_user: [],         // populated only by callers that need full envelope (rare)
    cmdb_ci: [],          // legacy compat — empty
    cmdb_rel_ci: [],
    incidents: [], changes: [],
    problem: [], problem_task: [],
    sc_request: [], sc_req_item: [], sc_task: [],
    incident_task: [], change_task: [],
    sysapproval_group: [], asset_task: [],
    task_ci: [], task_sla: [], sysapproval_approver: [],
    journal: [],
    audit: [],
    attachments: [],
    manifest: {
      label: 'loading…', snapshot_date: '', instance: '', captured_at: '',
      tables: [], integrity: { sha256_manifest: '', acl_skips: 0, missing_attachments: 0 },
    },
    // HR gate — populated by /api/hr-status on boot. enabled=true means the
    // server is filtering HR-assigned incidents on locked sessions; the
    // viewer surfaces an unlock button when so.
    hrStatus: { enabled: false, unlocked: false, group_sys_id: '', group_label: '' },
    loadStatus: {
      ready: false, source: null, table: null,
      total: EAGER_TABLES.length + 4,  // +manifest +cmdb_ci_lookup +sys_user_lookup +hr_status
      loaded: 0,
      error: null,
    },
  };

  // Subscriber pattern for re-render on load progress.
  const listeners = new Set();
  data.subscribe = (fn) => { listeners.add(fn); return () => listeners.delete(fn); };
  const notify = () => { for (const fn of listeners) { try { fn(data); } catch (_) {} } };

  function flatten(row) {
    if (!row) return row;
    const out = {};
    for (const k in row) {
      const v = row[k];
      if (v && typeof v === 'object' && !Array.isArray(v) && 'value' in v) {
        let val = v.value;
        if (val === 'true') val = true;
        else if (val === 'false') val = false;
        out[k] = val;
        if (v.display_value != null && v.display_value !== v.value) {
          out['__display_' + k] = v.display_value;
        }
      } else {
        out[k] = v;
      }
    }
    return out;
  }

  async function apiGet(path) {
    let lastErr = null;
    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error(`${path}: HTTP ${res.status}`);
        return await res.json();
      } catch (e) {
        lastErr = e;
        if (attempt === 0) await new Promise(r => setTimeout(r, 250));
      }
    }
    throw lastErr;
  }
  data.apiGet = apiGet;

  // ---- async helpers exposed to React components --------------------------

  data.fetchRecord = async function (table, sys_id) {
    return flatten(await apiGet(`/api/${table}/${sys_id}`));
  };

  // Paginated list. opts: { limit, offset, q, filters, order_by, dir, slim }.
  data.fetchTaskList = async function (table, opts = {}) {
    const params = new URLSearchParams();
    if (opts.limit) params.set('limit', opts.limit);
    if (opts.offset) params.set('offset', opts.offset);
    if (opts.q) params.set('q', opts.q);
    if (opts.order_by) params.set('order_by', opts.order_by);
    if (opts.dir) params.set('dir', opts.dir);
    if (opts.slim) params.set('slim', '1');
    if (opts.filters) {
      for (const [k, v] of Object.entries(opts.filters)) {
        if (v != null && v !== '') params.set(k, v);
      }
    }
    const res = await apiGet(`/api/${table}?${params}`);
    return { ...res, rows: (res.rows || []).map(flatten) };
  };

  data.fetchJournalFor = async function (sys_id) {
    const res = await apiGet(`/api/journal/${sys_id}`);
    return (res.rows || []).map(flatten);
  };
  data.fetchAuditFor = async function (sys_id) {
    const res = await apiGet(`/api/audit/${sys_id}`);
    return (res.rows || []).map(flatten);
  };
  data.fetchAttachmentsFor = async function (sys_id) {
    const res = await apiGet(`/api/attachments/${sys_id}`);
    return (res.rows || []).map(flatten);
  };
  data.fetchVariables = async function (ritm_sys_id) {
    const res = await apiGet(`/api/variables/${ritm_sys_id}`);
    return { rows: res.rows || [], cat_item: res.cat_item || null };
  };
  data.fetchCIRelations = async function (sys_id) {
    const res = await apiGet(`/api/related/cmdb/${sys_id}`);
    return {
      upstream:   (res.upstream   || []).map(r => ({ ...flatten(r), ci: flatten(r.ci) })),
      downstream: (res.downstream || []).map(r => ({ ...flatten(r), ci: flatten(r.ci) })),
    };
  };
  data.fetchSearch = async function (q, types) {
    const params = new URLSearchParams({ q });
    if (types && types.length) params.set('types', types.join(','));
    const res = await apiGet(`/api/search?${params}`);
    return (res.rows || []).map(r => ({ ...flatten(r), _table: r._table }));
  };

  // HR gate
  data.fetchHrStatus = async function () {
    const s = await apiGet('/api/hr-status');
    data.hrStatus = s;
    notify();
    return s;
  };
  data.unlockHr = async function (password) {
    const res = await fetch('/api/hr-unlock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
      credentials: 'same-origin',
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    data.hrStatus = { ...data.hrStatus, unlocked: true };
    notify();
    return true;
  };
  data.lockHr = async function () {
    await fetch('/api/hr-lock', { method: 'POST', credentials: 'same-origin' });
    data.hrStatus = { ...data.hrStatus, unlocked: false };
    notify();
  };

  // ---- post-load processing ----------------------------------------------

  function postProcess() {
    for (const c of data.sys_choice) {
      if (!c.table && c.name) c.table = c.name;
    }
    const groupMembers = new Map();
    for (const m of data.sys_user_grmember) {
      const g = m.group, u = m.user;
      if (!g || !u) continue;
      let arr = groupMembers.get(g);
      if (!arr) { arr = []; groupMembers.set(g, arr); }
      arr.push(u);
    }
    for (const g of data.sys_user_group) {
      if (!g.member_sys_ids) g.member_sys_ids = groupMembers.get(g.sys_id) || [];
    }
  }

  // ---- load orchestration ------------------------------------------------

  // One job = (label, work-fn). All jobs after manifest run in parallel via
  // Promise.allSettled — boot is bounded by the slowest single fetch
  // (typically cmdb_ci_lookup), not the sum of all of them.
  function makeJobs() {
    const jobs = [];
    for (const [table, alias] of EAGER_TABLES) {
      jobs.push([table, async () => {
        try {
          const res = await apiGet(`/api/${table}?limit=2000000&offset=0`);
          data[alias] = (res.rows || []).map(flatten);
        } catch (e) {
          console.warn(`[historicalwow] ${table} eager-load failed:`, e.message);
          data[alias] = [];
        }
      }]);
    }
    jobs.push(['sys_user_lookup', async () => {
      try {
        const map = await apiGet('/api/sys_user_lookup');
        data.sys_user_lookup = new Map(Object.entries(map));
      } catch (e) {
        console.warn('[historicalwow] sys_user_lookup failed:', e.message);
        data.sys_user_lookup = new Map();
      }
    }]);
    jobs.push(['cmdb_ci_lookup', async () => {
      try {
        const map = await apiGet('/api/cmdb_ci_lookup');
        data.cmdb_ci_lookup = new Map(Object.entries(map));
      } catch (e) {
        console.warn('[historicalwow] cmdb_ci_lookup failed:', e.message);
        data.cmdb_ci_lookup = new Map();
      }
    }]);
    jobs.push(['hr_status', async () => {
      try {
        data.hrStatus = await apiGet('/api/hr-status');
      } catch (e) {
        console.warn('[historicalwow] hr-status failed:', e.message);
      }
    }]);
    return jobs;
  }

  async function loadAll() {
    // Manifest fires in parallel with everything else — nothing in the load
    // path depends on manifest data, only the loading-screen label does.
    data.loadStatus.table = 'manifest';
    notify();
    const manifestP = apiGet('/api/manifest').then(m => {
      data.manifest = m;
      data.loadStatus.source = 'export';
    }).catch(e => {
      console.warn('[historicalwow] /api/manifest failed:', e.message);
      data.loadStatus.error = e.message;
    }).finally(() => {
      data.loadStatus.loaded += 1;
      notify();
    });

    const jobs = makeJobs();
    await Promise.allSettled([
      manifestP,
      ...jobs.map(([label, fn]) => fn().finally(() => {
        data.loadStatus.loaded += 1;
        data.loadStatus.table = label;
        notify();
      })),
    ]);

    postProcess();
    data.loadStatus.table = null;
    data.loadStatus.ready = true;
    notify();
  }

  data.ready = loadAll();
  return data;
})();

  const h = window.location.hash.replace(/^#/, '') || '/';
  const [path, qs] = h.split('?');
  const parts = path.split('/').filter(Boolean);
  // /                            -> { view: 'home' }
  // /<friendly>                  -> { view: 'list', table }
  // /<friendly>/:sys_id          -> { view: 'record', table, sys_id }
  // /tasks/<sntable>             -> { view: 'list', table }   (fallback for tables without a friendly slug)
  // /tasks/<sntable>/:sys_id     -> { view: 'record', table, sys_id }
  if (parts.length === 0) return { view: 'home' };

  if (parts[0] === 'tasks') {

    const t = parts[1];

  const table = window.URL_TO_TABLE[parts[0]];

  const [q, setQ] = React.useState('');
  const [debouncedQ, setDebouncedQ] = React.useState('');
  const [activeIdx, setActiveIdx] = React.useState(0);

      return [
        { group: 'Browse', items: [
          { kind: 'go', target: '/incidents',     label: 'All incidents',         sub: tcount('incident').toLocaleString() + ' records',         icon: 'incident' },
          { kind: 'go', target: '/changes',       label: 'All change requests',   sub: tcount('change_request').toLocaleString() + ' records',  icon: 'change' },
          { kind: 'go', target: '/problems',      label: 'Problems',              sub: tcount('problem').toLocaleString() + ' records',          icon: 'flag' },
          { kind: 'go', target: '/requests',      label: 'Service catalog requests', sub: tcount('sc_request').toLocaleString() + ' records',     icon: 'folder' },
          { kind: 'go', target: '/users',         label: 'Users',                 sub: tcount('sys_user').toLocaleString() + ' records',         icon: 'user' },

          { kind: 'go', target: '/cis',           label: 'Configuration items',   sub: tcount('cmdb_ci').toLocaleString() + ' records',          icon: 'ci' },

        if (cis.length >= 6) return;
        if ((info.name || '').toLowerCase().includes(ql)) {
          cis.push({ kind: 'ci', sys_id, label: info.name, sub: info.sys_class_name });
        }
      });
    }

    const groups = [];
    // Incidents and changes get prominent placement when matched.
    if (tasksByTable.incident)        groups.push({ group: 'Incidents', items: tasksByTable.incident });
    if (tasksByTable.change_request)  groups.push({ group: 'Change requests', items: tasksByTable.change_request });
    for (const [t, items] of Object.entries(tasksByTable)) {
      if (t === 'incident' || t === 'change_request') continue;
      groups.push({ group: window.taskLabel(t, 'plural'), items });
    }
    if (cis.length)   groups.push({ group: 'Configuration items', items: cis });
    if (users.length) groups.push({ group: 'Users', items: users });
    return groups;
  }, [debouncedQ, taskMatches]);

  const flat = React.useMemo(() => results.flatMap(g => g.items), [results]);

  React.useEffect(() => { setActiveIdx(0); }, [q]);

  const go = (item) => {
    onClose();
    if (item.kind === 'go') { window.navigate(item.target); return; }
    if (item.kind === 'incident') window.navigate(`/incidents/${item.sys_id}`);
    if (item.kind === 'change')   window.navigate(`/changes/${item.sys_id}`);
    if (item.kind === 'task')     window.navigate(window.recordUrl(item.table, item.sys_id));
    if (item.kind === 'user')     window.navigate(`/users/${item.sys_id}`);
    if (item.kind === 'ci')       window.navigate(`/cis/${item.sys_id}`);
    if (item.kind === 'group')    window.navigate(`/groups/${item.sys_id}`);
  };

  const onKey = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); onClose(); }
    if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, flat.length - 1)); }
    if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(0, i - 1)); }
    if (e.key === 'Enter') { e.preventDefault(); if (flat[activeIdx]) go(flat[activeIdx]); }
  };

  if (!open) return null;
  let runningIdx = -1;
  return (
    <div className="kpalette-overlay" onClick={onClose}>
      <div className="kpalette" onClick={e => e.stopPropagation()}>
        <div className="input-row">
          <window.Icon name="search" size={16} />
          <input
            ref={inputRef}
            value={q}
            onChange={e => setQ(e.target.value)}
            onKeyDown={onKey}
            placeholder="Search incidents, changes, users, CIs, journal entries…"
            spellCheck={false}
          />
          <span className="kbd-inline">esc</span>
        </div>
        <div className="results-list">
          {results.length === 0 && (
            <div style={{ padding: 24, textAlign: 'center', color: 'var(--fg-4)', fontSize: 13 }}>
              No matches in this snapshot.
            </div>
          )}
          {results.map((g, gi) => (
            <div key={gi}>
              <div className="group-label">{g.group}</div>
              {g.items.map((it, ii) => {
                runningIdx++;
                const active = runningIdx === activeIdx;
                const myIdx = runningIdx;
                return (
                  <div key={ii} className={'result' + (active ? ' active' : '')}
                       onMouseEnter={() => setActiveIdx(myIdx)}
                       onClick={() => go(it)}>
                    <div className="icon">
                      <window.Icon name={it.icon || (
                        it.kind === 'incident' ? 'incident' :
                        it.kind === 'change' ? 'change' :
                        it.kind === 'task' ? 'check' :
                        it.kind === 'user' ? 'user' :
                        it.kind === 'ci' ? 'ci' :
                        it.kind === 'group' ? 'users' : 'arrow_right'
                      )} size={13} />
                    </div>
                    <div className="label">
                      {it.kind !== 'go' && it.kind !== 'user' && it.kind !== 'ci' && (
                        <span className="num mono">{it.label.split(' · ')[0]}</span>
                      )}
                      {(it.kind === 'go' || it.kind === 'user' || it.kind === 'ci') ? it.label : it.sub}
                    </div>
                    {(it.kind !== 'go') && <span className="meta">{
                      it.kind === 'incident' ? 'incident' :
                      it.kind === 'change' ? 'change_request' :
                      it.kind === 'task' ? (it.meta || it.table) :
                      it.kind === 'user' ? 'sys_user' :
                      it.kind === 'ci' ? 'cmdb_ci' : ''
                    }</span>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        <div className="footer">
          <span className="hint"><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
          <span className="hint"><kbd>↵</kbd> open</span>
          <span className="hint"><kbd>esc</kbd> close</span>
          <span style={{ marginLeft: 'auto', color: 'var(--fg-4)' }}>Reads from snapshot · {window.HistoricalWowData.manifest.label}</span>
        </div>
      </div>
    </div>
  );
};
  </script>

window.taskLabel = function (table, mode = 'plural') {

  <script type="text/babel">

// Record detail page — works for any task table (incident, change_request,
// problem, sc_request, sc_req_item, sc_task, sysapproval_group, …).

// Parent → child relationship map for the "Tasks" section. The link field
// varies by parent: incident uses generic `parent`, but the catalog flow
// uses `request` (sc_request → sc_req_item) and `request_item`
// (sc_req_item → sc_task). Without this, opening an RITM showed no child
// catalog tasks because we were filtering on `parent` (which is empty).
const CHILD_REL = {
  incident:        { table: 'incident_task', field: 'parent' },
  change_request:  { table: 'change_task',   field: 'parent' },
  problem:         { table: 'problem_task',  field: 'parent' },
  sc_request:      { table: 'sc_req_item',   field: 'request' },
  sc_req_item:     { table: 'sc_task',       field: 'request_item' },
};

window.RecordPage = function RecordPage({ table, sys_id, showRaw }) {
  const data = window.HistoricalWowData;
  const [tab, setTab] = React.useState('journal');
  // All record data fetched via API on mount. No eager-loaded incident list,
  // so we don't have a "slim" until the API responds.
  const [fullRec, setFullRec]   = React.useState(null);
  const [journals, setJournals] = React.useState(null);
  const [audits, setAudits]     = React.useState(null);
  const [atts, setAtts]         = React.useState(null);
  const [tasks, setTasks]       = React.useState([]);
  const [ciLinks, setCILinks]   = React.useState([]);
  const [slas, setSLAs]         = React.useState([]);
  const [approvals, setApprovals] = React.useState([]);
  const [variables, setVariables] = React.useState({ rows: [], cat_item: null });

  React.useEffect(() => {
    let cancel = false;
    setFullRec(null); setJournals(null); setAudits(null); setAtts(null);
    setTasks([]); setCILinks([]); setSLAs([]); setApprovals([]);
    setVariables({ rows: [], cat_item: null });

    data.fetchRecord(table, sys_id).then(r => {
      if (cancel) return;
      setFullRec(r);
      if (r) window.AuditLog.push('view', `${table}/${r.number}`, r.short_description);
    }).catch(e => {
      if (cancel) return;
      // 403 → HR gate. Render a friendly message rather than the loading
      // spinner forever.
      if (e && /403/.test(e.message || '')) {
        setFullRec({ __hr_locked: true, sys_id });
      } else {
        setFullRec(false);
      }
    });
    data.fetchJournalFor(sys_id).then(r => { if (!cancel) setJournals(r); }).catch(() => setJournals([]));
    data.fetchAuditFor(sys_id).then(r => { if (!cancel) setAudits(r); }).catch(() => setAudits([]));
    data.fetchAttachmentsFor(sys_id).then(r => { if (!cancel) setAtts(r); }).catch(() => setAtts([]));

    // Per-record relationships (each is a small filtered query — was eager-
    // loaded as 422k+90k+75k rows, now 0–N rows per record).
    const rel = CHILD_REL[table];
    if (rel) {
      data.fetchTaskList(rel.table, { filters: { [rel.field]: sys_id }, limit: 200, slim: 1 })
        .then(r => { if (!cancel) setTasks(r.rows || []); }).catch(() => {});
    }
    data.fetchTaskList('task_ci', { filters: { task: sys_id }, limit: 200 })
      .then(r => { if (!cancel) setCILinks(r.rows || []); }).catch(() => {});
    data.fetchTaskList('task_sla', { filters: { task: sys_id }, limit: 50 })
      .then(r => { if (!cancel) setSLAs(r.rows || []); }).catch(() => {});
    data.fetchTaskList('sysapproval_approver', { filters: { sysapproval: sys_id }, limit: 50 })
      .then(r => { if (!cancel) setApprovals(r.rows || []); }).catch(() => {});
    if (table === 'sc_req_item') {
      data.fetchVariables(sys_id)
        .then(r => { if (!cancel) setVariables(r); }).catch(() => {});
    }

    return () => { cancel = true; };
  }, [table, sys_id]);

  const rec = fullRec;
  if (rec === null) {
    return <div className="empty"><div className="dot-pulse" style={{ marginBottom: 12 }} />loading…</div>;
  }
  if (rec && rec.__hr_locked) {
    const label = data.hrStatus.group_label || 'this group';
    return (
      <div className="empty">
        <div className="glyph"><window.Icon name="lock" /></div>
        <div style={{ fontWeight: 600, marginBottom: 6 }}>This record is restricted</div>
        <div style={{ maxWidth: 360, color: 'var(--fg-3)', fontSize: 13 }}>
          It belongs to <strong>{label}</strong>. Click <strong>Unlock HR data</strong> in the
          top bar to enter the access password and view it.
        </div>
      </div>
    );
  }
  if (!rec) {
    return <div className="empty"><div className="glyph"><window.Icon name="info" /></div>Record not found in this snapshot.</div>;
  }

  const journalCount = journals == null ? '…' : journals.length;
  const auditCount   = audits   == null ? '…' : audits.length;
  const attCount     = atts     == null ? '…' : atts.length;

  return (
    <div className="record">
      <div className="left">
        <RecordHeader rec={rec} table={table} />
        <FieldsSection rec={rec} table={table} showRaw={showRaw} />
        <VariablesSection rows={variables.rows} cat_item={variables.cat_item} />
        {tasks.length > 0 && <TasksSection tasks={tasks} table={table} />}
        {slas.length > 0 && <SLAsSection slas={slas} />}
        {ciLinks.length > 0 && <AffectedCIsSection ciLinks={ciLinks} />}
        {approvals.length > 0 && <ApprovalsSection approvals={approvals} />}
        <ManifestFooter rec={rec} />
      </div>
      <div className="right">
        <div className="tabs">
          <button className={'tab' + (tab === 'journal' ? ' active' : '')} onClick={() => setTab('journal')}>
            Journal <span className="badge">{journalCount}</span>
          </button>
          <button className={'tab' + (tab === 'audit' ? ' active' : '')} onClick={() => setTab('audit')}>
            History <span className="badge">{auditCount}</span>
          </button>
          <button className={'tab' + (tab === 'attachments' ? ' active' : '')} onClick={() => setTab('attachments')}>
            Attachments <span className="badge">{attCount}</span>
          </button>
          <button className={'tab' + (tab === 'related' ? ' active' : '')} onClick={() => setTab('related')}>
            Related
          </button>
        </div>
        {tab === 'journal'     && <JournalTab     entries={journals} />}
        {tab === 'audit'       && <AuditTab       entries={audits} table={table} />}
        {tab === 'attachments' && <AttachmentsTab entries={atts} />}
        {tab === 'related'     && <RelatedTab     rec={rec} table={table} journals={journals} />}
      </div>
    </div>
  );
};

function RefLink({ kind, sys_id, fallback }) {
  if (!sys_id) return <span style={{ color: 'var(--fg-4)', fontStyle: 'italic' }}>—</span>;
  // `fallback` is typically the __display_<field> from the record envelope:
  // ServiceNow's display_value at export time. We use it whenever the local
  // lookup map doesn't have the sys_id (e.g. user deactivated and not exported).
  const renderUnresolved = () => (
    <span className="ref-link" title={`Reference (sys_id ${sys_id.slice(0, 8)}…) not in lookup`}>
      {fallback || sys_id.slice(0, 8) + '…'}
    </span>
  );
  if (kind === 'user') {
    const u = window.findUser(sys_id);
    if (!u) return renderUnresolved();
    return <span className="ref-link" onClick={() => window.navigate(`/users/${sys_id}`)}>{u.name || fallback || sys_id.slice(0, 8) + '…'}</span>;
  }
  if (kind === 'group') {
    const g = window.findGroup(sys_id);
    if (!g) return renderUnresolved();
    return <span className="ref-link" onClick={() => window.navigate(`/groups/${sys_id}`)}>{g.name || fallback}</span>;
  }
  if (kind === 'ci') {
    const c = window.findCI(sys_id);
    if (!c) return renderUnresolved();
    return <span className="ref-link" onClick={() => window.navigate(`/cis/${sys_id}`)}>{c.name || fallback}</span>;
  }
  return <span>{fallback || ''}</span>;
}

// Catalog variables — render the form fields a user typed when submitting
// an RITM. Variable definitions vary per catalog item (sc_cat_item), so
// we drive the layout off the joined item_option_new rows and don't try
// to be clever about types beyond a few known cases:
//   1=string, 2=text, 5=select, 6=multi-line, 7=reference, 8=checkbox,
//   9=date, 17=tree picker, 21=email, 22=URL, 24=lookup, 26=lookup select.
function VariablesSection({ rows, cat_item }) {
  if (!rows || rows.length === 0) return null;
  const renderValue = (v, type, reference) => {
    const val = v == null || v === '' ? '—' : String(v);
    if (val === '—') return <span style={{ color: 'var(--fg-4)', fontStyle: 'italic' }}>—</span>;
    const typeNum = parseInt(type, 10);
    // Reference variable → try to resolve via lookup maps. The `reference`
    // column tells us which table the sys_id points at.
    if ((typeNum === 7 || typeNum === 24 || typeNum === 26) && /^[a-f0-9]{32}$/.test(val)) {
      if (reference === 'sys_user') {
        return <window.UserCell sys_id={val} />;
      }
      if (reference === 'sys_user_group') {
        const g = window.findGroup(val);
        return g ? <span className="ref-link" onClick={() => window.navigate(`/groups/${val}`)}>{g.name}</span>
                 : <span className="mono" style={{ fontSize: 11.5 }}>{val.slice(0, 8)}…</span>;
      }
      if (reference === 'cmdb_ci') {
        const c = window.findCI(val);
        return c ? <span className="ref-link" onClick={() => window.navigate(`/cis/${val}`)}>{c.name}</span>
                 : <span className="mono" style={{ fontSize: 11.5 }}>{val.slice(0, 8)}…</span>;
      }
      // Unknown reference table — just show the sys_id.
      return <span className="mono" style={{ fontSize: 11.5 }}>{val.slice(0, 8)}…</span>;
    }
    // Checkbox: ServiceNow stores 'true'/'false'.
    if (typeNum === 8) {
      return <span>{(val === 'true' || val === '1') ? 'Yes' : 'No'}</span>;
    }
    // Multi-line / long text — preserve newlines.
    if (typeNum === 2 || typeNum === 6) {
      return <span style={{ whiteSpace: 'pre-wrap' }}>{val}</span>;
    }
    return <span>{val}</span>;
  };
  return (
    <div className="section">
      <h3>
        Variables
        <span className="count">{rows.length}</span>
        {cat_item && <span style={{
          marginLeft: 10, fontSize: 11.5, color: 'var(--fg-3)',
          fontWeight: 400, fontFamily: 'var(--font-mono)',
        }}>{cat_item}</span>}
      </h3>
      <div className="kv-block" style={{
        display: 'grid', gridTemplateColumns: '180px 1fr', rowGap: 6, columnGap: 14,
        padding: '10px 12px',
      }}>
        {rows.map(v => (
          <React.Fragment key={v.opt_sys_id || v.def_sys_id || v.var_name}>
            <div style={{ color: 'var(--fg-3)', fontSize: 12 }}>
              {v.label || v.var_name || '(unnamed)'}
            </div>
            <div style={{ fontSize: 12.5 }}>
              {renderValue(v.value, v.type, v.reference)}
            </div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function JournalTab({ entries }) {
  if (entries == null) return <_LoadingTab label="loading journal…" />;
  if (!entries.length) {
    return <div className="empty"><div className="glyph"><window.Icon name="book" /></div>No journal entries.</div>;
  }
  // Lookup user by username (sys_created_by) since the journal record may not
  // have a sys_id-resolved field server-side.
  const userByUsername = new Map();
  for (const u of window.HistoricalWowData.sys_user) {
    if (u.user_name) userByUsername.set(u.user_name, u);
  }
  return (
    <div className="journal">
      {entries.map(e => {
        const u = window.findUser(e.sys_created_by_sys_id) ||
                  userByUsername.get(e.sys_created_by);
        return (
          <div key={e.sys_id} className="entry">
            <div><window.Avatar name={u?.name || e.sys_created_by} /></div>
            <div>
              <div className="head">
                <span className="who">{u?.name || e.sys_created_by}</span>
                <span className={`kind ${e.element}`}>{e.element === 'work_notes' ? 'work notes' : 'comment'}</span>
                <span className="when" title={e.sys_created_on}>{window.fmtRelative(e.sys_created_on)} · {e.sys_created_on}</span>
              </div>
              <div className="body">{e.value}</div>
            </div>
          </div>
        );

function AuditTab({ entries, table }) {
  if (entries == null) return <_LoadingTab label="loading history…" />;
  if (!entries.length) {
    return <div className="empty"><div className="glyph"><window.Icon name="history" /></div>No audit entries.</div>;
  }
  const renderVal = (a, val) => {
    if (val == null || val === '') return <span style={{ color: 'var(--fg-4)' }}>—</span>;
    if (a.fieldname === 'state') return window.decodeChoice(table, 'state', val).label;
    if (a.fieldname === 'priority') return window.decodeChoice('incident', 'priority', val).label;
    if (a.fieldname === 'close_code') return window.decodeChoice('incident', 'close_code', val).label;
    if (a.fieldname === 'assigned_to' || a.fieldname === 'caller_id') {
      const u = window.findUser(val);
      return u ? u.name : <span className="mono" style={{ fontSize: 11.5 }}>{val.slice(0, 12)}…</span>;
    }
    if (a.fieldname === 'assignment_group') {
      const g = window.findGroup(val);
      return g ? g.name : val;
    }
    return String(val);
  };
  return (
    <div className="audit">
      {entries.map(a => (
        <div key={a.sys_id} className="audit-row">
          <span className="when">{a.sys_created_on}</span>
          <span className="field">{a.fieldlabel}<span className="label">{a.fieldname}</span></span>
          <span className="from">{renderVal(a, a.oldvalue)}</span>
          <span className="to"><span className="arrow">→</span>{renderVal(a, a.newvalue)} <span style={{ color: 'var(--fg-4)', fontSize: 11.5, marginLeft: 8 }}>by {a.user}</span></span>
        </div>
      ))}
    </div>
  );
}

function AttachmentsTab({ entries }) {
  if (entries == null) return <_LoadingTab label="loading attachments…" />;
  if (!entries.length) {
    return <div className="empty"><div className="glyph"><window.Icon name="paperclip" /></div>No attachments.</div>;
  }
  const ext = (n) => ((n || '').split('.').pop() || '').toUpperCase().slice(0, 4);
  // Mirror the exporter's _safe_name(): replace anything outside [A-Za-z0-9._-]
  // with '_', cap at 200 chars. Falls back to 'file' for empty input.
  const safeFilename = (n) => {
    if (!n) return 'file';
    const s = n.replace(/[^A-Za-z0-9._-]/g, '_').slice(0, 200);
    return s || 'file';
  };
  // Mirror the exporter's two-char hex sharding (first 2 chars of sys_id).
  const shard = (sid) => (sid?.slice(0, 2) || '__').toLowerCase();
  return (
    <div className="attachments-list">
      {entries.map(a => (
        <div key={a.sys_id} className="attachment">
          <div className="icon">{ext(a.file_name)}</div>
          <div className="meta">
            <div className="name">{a.file_name}</div>
            <div className="sub">{window.fmtBytes(a.size_bytes)} · {a.content_type} · uploaded {window.fmtRelative(a.sys_created_on)} by {a.sys_created_by}</div>
          </div>

}

function RelatedTab(props) {
  const { rec, table } = props;
  const data = window.HistoricalWowData;
  // Other records on the same CI — search across every loaded task table,
  // not just incidents, since a CI is referenced from any task type.
  let items = [];
  if (rec.cmdb_ci) {
    const buckets = window.TASK_TABLES || ['incident', 'change_request'];
    for (const t of buckets) {
      const arr = window.getTaskRecords(t);
      for (const r of arr) {
        if (r.cmdb_ci === rec.cmdb_ci && r.sys_id !== rec.sys_id) {
          items.push({ rec: r, table: t });
          if (items.length >= 8) break;
        }
      }
      if (items.length >= 8) break;
    }
  }
  // Journal mentions: any of ServiceNow's standard prefixes for a task or KB.
  // `journals` is passed in by RecordPage (already fetched via API). Null
  // while loading; treat as empty until then.
  const allJournals = props.journals || [];
  const refs = new Set();
  for (const j of allJournals) {
    const m = (j.value || '').match(/(INC\d+|CHG\d+|PRB\d+|RITM\d+|REQ\d+|SCTASK\d+|TASK\d+|KB\d+)/g);
    if (m) m.forEach(x => refs.add(x));
  }
  // Resolve each reference against any loaded task table.
  const findByNumber = (num) => {
    const tables = window.TASK_TABLES || ['incident', 'change_request'];
    for (const t of tables) {
      const arr = window.getTaskRecords(t);
      const hit = arr.find(r => r.number === num);
      if (hit) return { rec: hit, table: t };
    }
    return null;
  };
  return (
    <div className="related-list">
      <div style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--fg-3)', margin: '4px 0 8px' }}>Same CI · {items.length}</div>
      {items.length === 0 && <div style={{ color: 'var(--fg-4)', fontSize: 12.5, padding: '6px 0' }}>No other records on this CI in snapshot.</div>}
      {items.map(({ rec: i, table: t }) => (
        <div key={i.sys_id} className="related-item" onClick={() => window.navigate(window.recordUrl(t, i.sys_id))}>
          <span className="num">{i.number}</span>
          <span className="desc">{i.short_description}</span>
          <span className={`chip ${window.stateChipClass('incident', i.state)}`}>{window.decodeChoice('incident', 'state', i.state).label || i.state}</span>
        </div>
      ))}
      {refs.size > 0 && (
        <>
          <div style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--fg-3)', margin: '16px 0 8px' }}>Mentioned in journal · {refs.size}</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {[...refs].map(r => {
              const found = findByNumber(r);
              const target = found?.rec;
              const targetTable = found?.table;
              return (
                <span key={r} className="chip" style={{ cursor: target ? 'pointer' : 'default' }}
                  onClick={() => target && window.navigate(window.recordUrl(targetTable, target.sys_id))}>
                  <window.Icon name="link" size={10} />
                  {r}{!target && <span style={{ color: 'var(--fg-4)' }}> · not loaded</span>}
                </span>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// Helper: bucket task records by their table for a sys_id-based field
// (e.g. `assignment_group`, `cmdb_ci`). Eager-loaded tables filter in memory;
// `incident` (lazy) gets a paginated API call. Returns a promise resolving
// to an ordered list of {table, items} buckets (only non-empty buckets).
async function bucketTaskRecordsAsync(field, sys_id) {
  const buckets = [];
  const tables = window.TASK_TABLES || ['incident', 'change_request'];
  for (const t of tables) {
    if (t === 'incident') {
      // Lazy: fetch via API
      try {
        const res = await window.HistoricalWowData.fetchTaskList(t, {
          limit: 12, filters: { [field]: sys_id },
          order_by: 'sys_updated_on', dir: 'desc',
        });
        if (res.rows && res.rows.length) {
          buckets.push({ table: t, items: res.rows, total: res.total });
        }
      } catch (_) { /* skip on error */ }
    } else {
      const arr = window.getTaskRecords(t);
      const matches = arr.filter(r => r[field] === sys_id);
      if (matches.length) {
        matches.sort((a, b) => (b.sys_updated_on || '').localeCompare(a.sys_updated_on || ''));
        buckets.push({ table: t, items: matches, total: matches.length });
      }
    }
  }
  return buckets;
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>

}

function TweakRow({ label, value, children, inline = false }) {

      <div className="twk-lbl">
