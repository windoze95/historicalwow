<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HistoricalNow · ServiceNow Historical Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* HistoricalWow — ServiceNow Historical Archive Viewer */

:root {
  /* Surface — warm dark, "library at dusk" feel. Hue 70 (amber) keeps a
     subtle warmth in the dark surface so it reads as ink-on-leather,
     not pure black. Lightness ~21% — enough to settle the eye but not
     overwhelmingly dark. */
  --bg: oklch(21% 0.012 70);
  --bg-2: oklch(24% 0.013 70);
  --bg-3: oklch(27% 0.015 70);
  --bg-elev: oklch(25% 0.014 70);
  --hover: oklch(29% 0.018 70);
  --selected: oklch(32% 0.055 155);

  /* Borders — visible but soft. The contrast budget on dark themes is
     tighter than light themes; over-bright borders read as harsh. */
  --border: oklch(33% 0.018 70);
  --border-2: oklch(40% 0.022 70);
  --border-strong: oklch(52% 0.025 70);

  /* Text — warm bone tones. Body text at ~91% lightness pairs with the
     21% bg for readable but not screaming contrast. */
  --fg: oklch(91% 0.012 70);
  --fg-2: oklch(76% 0.012 70);
  --fg-3: oklch(60% 0.012 70);
  --fg-4: oklch(48% 0.012 70);

  /* Accent — green stays the brand hue but lifted in lightness so it
     pops against the dark surface without burning the eye. */
  --accent: oklch(72% 0.13 155);
  --accent-2: oklch(78% 0.13 155);
  --accent-bg: oklch(28% 0.055 155);
  --accent-border: oklch(42% 0.090 155);
  --accent-fg: oklch(82% 0.11 155);

  /* Status / priority hues. Backgrounds drop to ~28% (above page bg);
     foreground chip text is light and saturated. Gray gets a warm tint
     so it sits in the same family as the rest of the palette. */
  --c-red:        oklch(74% 0.16 25);
  --c-red-bg:     oklch(28% 0.055 25);
  --c-red-border: oklch(42% 0.100 25);
  --c-amber:      oklch(80% 0.14 75);
  --c-amber-bg:   oklch(28% 0.060 75);
  --c-amber-border: oklch(42% 0.110 75);
  --c-blue:       oklch(74% 0.13 245);
  --c-blue-bg:    oklch(28% 0.055 245);
  --c-blue-border: oklch(42% 0.090 245);
  --c-violet:     oklch(74% 0.13 295);
  --c-violet-bg:  oklch(28% 0.055 295);
  --c-violet-border: oklch(42% 0.090 295);
  --c-gray:       oklch(72% 0.012 70);
  --c-gray-bg:    oklch(28% 0.012 70);
  --c-gray-border: oklch(40% 0.014 70);

  /* Type */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Menlo', monospace;

  /* Sizing */
  --radius: 6px;
  --radius-sm: 4px;
  --radius-lg: 10px;
  --topbar-h: 44px;
  --banner-h: 28px;
  --sidebar-w: 244px;

  /* Shadows */
  /* Shadows — true black with higher alpha. On dark surfaces a tinted
     shadow lifts a card; same alpha as the light theme would be invisible. */
  --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.25);
  --shadow: 0 2px 4px oklch(0% 0 0 / 0.30), 0 6px 14px oklch(0% 0 0 / 0.25);
  --shadow-lg: 0 6px 14px oklch(0% 0 0 / 0.40), 0 18px 44px oklch(0% 0 0 / 0.35);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: 13.5px;
  line-height: 1.5;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  -webkit-font-smoothing: antialiased;
}

#root { height: 100%; }

/* Scrollbars — themed to the surface palette so they don't show up as
   chrome-default white slabs against the warm dark bg. The thumb uses
   --border-2 at rest and brightens to --border-strong on hover; the
   track is the page bg so it visually disappears until the thumb shows. */
* {
  scrollbar-width: thin;                                /* Firefox */
  scrollbar-color: var(--border-2) transparent;
}
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb {
  background: var(--border-2);
  border-radius: 8px;
  border: 2px solid var(--bg);                          /* gives the thumb breathing room from the edge */
}
*::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
*::-webkit-scrollbar-corner { background: transparent; }

button {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}

input, textarea {
  font-family: inherit;
  color: inherit;
}

a { color: inherit; text-decoration: none; }

::selection { background: var(--accent-bg); }

.mono { font-family: var(--font-mono); font-feature-settings: 'zero', 'ss01'; }

/* App shell */
.app {
  display: grid;
  grid-template-rows: var(--banner-h) var(--topbar-h) 1fr;
  height: 100%;
}

.banner {
  height: var(--banner-h);
  background: var(--accent-bg);
  border-bottom: 1px solid var(--accent-border);
  color: var(--accent-fg);
  font-size: 11.5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  letter-spacing: 0.01em;
}
.banner .left { display: flex; align-items: center; gap: 12px; }
.banner .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px oklch(58% 0.11 155 / 0.18);
}
.banner .right { display: flex; align-items: center; gap: 14px; font-family: var(--font-mono); font-size: 11px; }
.banner .right span { opacity: 0.85; }

.topbar {
  height: var(--topbar-h);
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr auto;
  align-items: center;
  padding: 0;
}
.topbar .brand {
  display: flex; align-items: center; gap: 9px;
  padding: 0 16px;
  border-right: 1px solid var(--border);
  height: 100%;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.topbar .brand .logo {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--accent) 0%, oklch(45% 0.1 155) 100%);
  display: grid; place-items: center;
  color: white; font-weight: 700; font-size: 12px;
  box-shadow: inset 0 1px 0 oklch(100% 0 0 / 0.25);
}
.topbar .search-wrap {
  padding: 0 16px;
  display: flex; align-items: center;
  height: 100%;
}
.topbar .search-trigger {
  width: 100%;
  max-width: 520px;
  height: 30px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex; align-items: center;
  padding: 0 10px;
  gap: 8px;
  color: var(--fg-3);
  font-size: 13px;
  cursor: text;
  transition: border-color 0.12s, background 0.12s;
}
.topbar .search-trigger:hover { border-color: var(--border-2); background: var(--bg-3); }
.topbar .search-trigger .kbd {
  margin-left: auto;
  display: flex; gap: 2px;
}
.topbar .search-trigger .kbd kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  background: var(--bg-elev);
  border: 1px solid var(--border-2);
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--fg-3);
}
.topbar .controls {
  display: flex; align-items: center; gap: 4px;
  padding: 0 12px;
  height: 100%;
}
.topbar .controls .toggle {
  display: flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 10px;
  border-radius: var(--radius);
  font-size: 12px; color: var(--fg-2);
  border: 1px solid transparent;
}
.topbar .controls .toggle:hover { background: var(--hover); }
.topbar .controls .toggle.on { background: var(--accent-bg); color: var(--accent-fg); border-color: var(--accent-border); }
.topbar .controls .icon-btn {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  border-radius: var(--radius);
  color: var(--fg-2);
}
.topbar .controls .icon-btn:hover { background: var(--hover); color: var(--fg); }

/* App-shell grid: sidebar + main. Scoped to a unique class so the generic
   `display: grid` doesn't bleed into nested elements that also use a
   `body` class (the audit-log panel and journal entries), where it would
   lay children out in two columns. */
.app-shell-body {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  overflow: hidden;
  min-height: 0;
}

.sidebar {
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 10px 8px 24px;
  display: flex; flex-direction: column; gap: 14px;
}
.sidebar .section-label {
  text-transform: uppercase;
  font-size: 10.5px;
  letter-spacing: 0.07em;
  color: var(--fg-4);
  font-weight: 600;
  padding: 0 10px;
  margin-bottom: 4px;
}
.sidebar .nav-item {
  display: flex; align-items: center; gap: 9px;
  width: 100%;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  color: var(--fg-2);
  font-size: 13px;
  font-weight: 450;
  position: relative;
}
.sidebar .nav-item:hover { background: var(--hover); color: var(--fg); }
.sidebar .nav-item.active { background: var(--bg-3); color: var(--fg); font-weight: 500; }
.sidebar .nav-item.active::before {
  content: '';
  position: absolute; left: -8px; top: 4px; bottom: 4px;
  width: 2px; background: var(--accent); border-radius: 2px;
}
.sidebar .nav-item .count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-4);
  letter-spacing: -0.02em;
}
.sidebar .nav-item .icon {
  width: 14px; height: 14px;
  color: var(--fg-3);
  display: grid; place-items: center;
}

.main {
  overflow: auto;
  background: var(--bg);
  min-width: 0;
}

/* Tags / chips */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 20px;
  padding: 0 7px;
  border-radius: 4px;
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.005em;
  border: 1px solid var(--c-gray-border);
  background: var(--c-gray-bg);
  color: var(--c-gray);
  white-space: nowrap;
}
.chip .swatch { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.chip.red    { color: var(--c-red);    border-color: var(--c-red-border);    background: var(--c-red-bg); }
.chip.amber  { color: var(--c-amber);  border-color: var(--c-amber-border);  background: var(--c-amber-bg); }
.chip.blue   { color: var(--c-blue);   border-color: var(--c-blue-border);   background: var(--c-blue-bg); }
.chip.violet { color: var(--c-violet); border-color: var(--c-violet-border); background: var(--c-violet-bg); }
.chip.green  { color: var(--accent);   border-color: var(--accent-border);   background: var(--accent-bg); }

.priority-bar {
  display: inline-flex;
  align-items: center;
  gap: 1.5px;
  height: 12px;
}
.priority-bar .b {
  width: 3px; background: var(--c-gray-border); border-radius: 1px;
}
.priority-bar .b.on { background: currentColor; }
.priority-bar.crit  { color: var(--c-red); }
.priority-bar.high  { color: var(--c-amber); }
.priority-bar.med   { color: var(--c-blue); }
.priority-bar.low   { color: var(--fg-4); }

/* Generic page header */
.page-header {
  padding: 22px 28px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 5;
}
.page-header h1 {
  margin: 0; font-size: 20px; font-weight: 600;
  letter-spacing: -0.015em;
  display: flex; align-items: center; gap: 10px;
}
.page-header h1 .count {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-4);
  background: var(--bg-2);
  padding: 2px 7px;
  border-radius: 10px;
}
.page-header .sub {
  font-size: 12.5px; color: var(--fg-3); margin-top: 4px;
}

.toolbar {
  display: flex; align-items: center; gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.toolbar .filter-pill {
  display: inline-flex; align-items: center; gap: 6px;
  height: 26px; padding: 0 9px;
  border: 1px solid var(--border-2);
  border-radius: 14px;
  background: var(--bg-elev);
  font-size: 12px;
  color: var(--fg-2);
}
.toolbar .filter-pill:hover { background: var(--hover); }
.toolbar .filter-pill.active { background: var(--accent-bg); color: var(--accent-fg); border-color: var(--accent-border); }
.toolbar .spacer { flex: 1; }
.toolbar .results {
  font-size: 12px; color: var(--fg-3); font-family: var(--font-mono);
}

/* Tables */
.dt {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.dt thead th {
  position: sticky; top: 0;
  background: var(--bg);
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
  padding: 9px 12px;
  border-bottom: 1px solid var(--border-2);
  white-space: nowrap;
}
.dt tbody tr {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.06s;
}
.dt tbody tr:hover { background: var(--bg-2); }
.dt tbody tr.selected { background: var(--selected); }
.dt tbody td {
  padding: 10px 12px;
  vertical-align: middle;
  color: var(--fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dt td.num, .dt th.num { font-family: var(--font-mono); font-size: 12.5px; color: var(--fg-2); }
.dt td.muted { color: var(--fg-3); }
.dt td.short { max-width: 0; }
.dt td.short .truncate {
  overflow: hidden; text-overflow: ellipsis; display: block;
}

/* Avatars */
.avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: inline-grid; place-items: center;
  font-size: 10.5px; font-weight: 600;
  color: white;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.avatar.sm { width: 18px; height: 18px; font-size: 9.5px; }
.avatar.lg { width: 36px; height: 36px; font-size: 13px; }
.avatar.xl { width: 56px; height: 56px; font-size: 19px; }

.user-cell {
  display: inline-flex; align-items: center; gap: 7px;
  min-width: 0;
}
.user-cell .name { color: var(--fg); }
.user-cell .name.muted { color: var(--fg-3); }

/* Cmd-K palette */
.kpalette-overlay {
  position: fixed; inset: 0;
  background: oklch(20% 0.01 95 / 0.28);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: grid;
  place-items: start center;
  padding-top: 12vh;
}
.kpalette {
  width: min(640px, 92vw);
  background: var(--bg-elev);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
  max-height: 70vh;
}
.kpalette .input-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.kpalette input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 15px;
  background: transparent;
}
.kpalette input::placeholder { color: var(--fg-4); }
.kpalette .results-list {
  overflow-y: auto;
  padding: 6px;
}
.kpalette .group-label {
  padding: 8px 10px 4px;
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--fg-4);
}
.kpalette .result {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
}
.kpalette .result.active { background: var(--bg-3); }
.kpalette .result .icon {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  border-radius: 5px;
  background: var(--bg-2);
  color: var(--fg-2);
  flex-shrink: 0;
}
.kpalette .result .label {
  flex: 1; min-width: 0;
  font-size: 13.5px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.kpalette .result .label .num { font-family: var(--font-mono); color: var(--fg-3); margin-right: 8px; font-size: 12px; }
.kpalette .result .meta { font-size: 11.5px; color: var(--fg-4); }
.kpalette .footer {
  border-top: 1px solid var(--border);
  padding: 8px 14px;
  font-size: 11px; color: var(--fg-4);
  display: flex; gap: 14px; align-items: center;
}
.kpalette .footer .hint { display: flex; align-items: center; gap: 5px; }
.kpalette .footer kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 4px;
}

/* Record detail */
.record {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  height: 100%;
  min-height: 0;
}
.record .left, .record .right { overflow-y: auto; min-height: 0; }
.record .left { border-right: 1px solid var(--border); }
.record.single { grid-template-columns: minmax(0, 1fr); }
.record.single .left { border-right: none; }

.record-header {
  padding: 22px 28px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 4;
}
.record-header .crumbs {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--fg-3);
  margin-bottom: 8px;
}
.record-header .crumbs a:hover { color: var(--accent); }
.record-header h1 {
  margin: 0;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.35;
  display: flex; align-items: baseline; gap: 12px;
  flex-wrap: wrap;
}
.record-header h1 .num {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--fg-3);
  font-weight: 500;
  letter-spacing: 0;
}
.record-header .title-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--fg-3);
  margin-top: 8px;
  flex-wrap: wrap;
}
.record-header .title-row .dot { color: var(--fg-4); }

.section {
  padding: 16px 28px 8px;
  border-bottom: 1px solid var(--border);
}
.section h3 {
  margin: 0 0 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-3);
  display: flex; align-items: center; gap: 8px;
}
.section h3 .count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-4);
  background: var(--bg-2);
  padding: 1px 6px;
  border-radius: 8px;
  letter-spacing: 0;
  text-transform: none;
  font-weight: 500;
}

/* Field grid */
.fields {
  display: grid;
  grid-template-columns: 130px 1fr;
  row-gap: 9px;
  column-gap: 14px;
  padding-bottom: 14px;
}
.fields .label {
  font-size: 12px;
  color: var(--fg-3);
  font-weight: 450;
  padding-top: 1px;
}
.fields .value {
  font-size: 13px;
  color: var(--fg);
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap;
  min-width: 0;
  word-break: break-word;
}
.fields .value.muted { color: var(--fg-3); font-style: italic; }
.fields .value .raw {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--fg-4);
  background: var(--bg-2);
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 4px;
}
.fields .ref-link {
  color: var(--fg);
  border-bottom: 1px dashed var(--border-2);
  padding-bottom: 0;
  cursor: pointer;
}
.fields .ref-link:hover { color: var(--accent); border-bottom-color: var(--accent); }

.kv-block {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-size: 12.5px;
  white-space: pre-wrap;
  font-family: var(--font-sans);
  color: var(--fg);
  line-height: 1.55;
}
.kv-block.mono { font-family: var(--font-mono); font-size: 12px; }

/* Tabs */
.tabs {
  display: flex; gap: 2px;
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  background: var(--bg);
  position: sticky; top: 0; z-index: 4;
  height: 40px; align-items: stretch;
}
.tabs .tab {
  padding: 0 12px;
  font-size: 12.5px;
  color: var(--fg-3);
  border-bottom: 2px solid transparent;
  display: flex; align-items: center; gap: 6px;
  margin-bottom: -1px;
  font-weight: 500;
}
.tabs .tab:hover { color: var(--fg); }
.tabs .tab.active { color: var(--fg); border-bottom-color: var(--accent); }
.tabs .tab .badge {
  font-family: var(--font-mono);
  font-size: 10.5px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  padding: 0 5px; height: 16px;
  border-radius: 8px;
  display: inline-flex; align-items: center;
  color: var(--fg-3);
  font-weight: 500;
}

/* Journal */
.journal { padding: 16px 28px 40px; }
.journal .entry {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px dashed var(--border);
  position: relative;
}
.journal .entry:last-child { border-bottom: none; }
.journal .entry .head {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 5px;
  font-size: 12.5px;
  flex-wrap: wrap;
}
.journal .entry .head .who { font-weight: 600; color: var(--fg); }
.journal .entry .head .kind {
  font-size: 11px; padding: 1px 6px;
  border-radius: 3px; font-weight: 500;
  letter-spacing: 0.01em;
}
.journal .entry .head .kind.work_notes { background: var(--c-amber-bg); color: var(--c-amber); border: 1px solid var(--c-amber-border); }
.journal .entry .head .kind.comments { background: var(--c-blue-bg); color: var(--c-blue); border: 1px solid var(--c-blue-border); }
.journal .entry .head .when {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-4);
}
.journal .entry .body {
  font-size: 13.5px;
  color: var(--fg);
  white-space: pre-wrap;
  line-height: 1.55;
}

/* Audit table */
.audit { padding: 8px 28px 40px; }
.audit-row {
  display: grid;
  grid-template-columns: 150px 130px 1fr 1fr;
  font-size: 12.5px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.audit-row:hover { background: var(--bg-2); }
.audit-row .when { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-3); }
.audit-row .field { color: var(--fg-2); font-weight: 500; }
.audit-row .field .label { font-size: 11px; color: var(--fg-4); display: block; font-weight: 400; font-family: var(--font-mono); }
.audit-row .from { color: var(--fg-3); }
.audit-row .from .strike { text-decoration: line-through; opacity: 0.7; }
.audit-row .to { color: var(--fg); }
.audit-row .arrow { color: var(--fg-4); margin: 0 6px; }

/* Attachments */
.attachments-list { padding: 12px 28px 40px; display: flex; flex-direction: column; gap: 6px; }
.attachment {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elev);
}
.attachment:hover { background: var(--bg-2); border-color: var(--border-2); }
.attachment .icon {
  width: 32px; height: 32px;
  border-radius: 5px;
  background: var(--bg-3);
  display: grid; place-items: center;
  color: var(--fg-2);
  font-family: var(--font-mono);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.attachment .meta { flex: 1; min-width: 0; }
.attachment .name { font-size: 13px; color: var(--fg); font-weight: 500; }
.attachment .sub { font-size: 11.5px; color: var(--fg-3); font-family: var(--font-mono); margin-top: 2px; }
.attachment .download {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  border-radius: 5px;
  color: var(--fg-3);
}
.attachment .download:hover { background: var(--bg-3); color: var(--fg); }

/* Related list */
.related-list { padding: 12px 28px 40px; display: flex; flex-direction: column; gap: 4px; }
.related-item {
  display: grid;
  grid-template-columns: 90px 1fr auto;
  gap: 12px;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elev);
  font-size: 13px;
  align-items: center;
  cursor: pointer;
}
.related-item:hover { border-color: var(--border-2); background: var(--bg-2); }
.related-item .num { font-family: var(--font-mono); color: var(--fg-2); font-size: 12.5px; }
.related-item .desc { color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Reference page */
.ref-page { padding: 28px; max-width: 920px; margin: 0 auto; }
.ref-page .head {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 22px;
}
.ref-page .head .info h1 {
  margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.01em;
}
.ref-page .head .info .meta {
  font-size: 12.5px; color: var(--fg-3);
  margin-top: 3px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.ref-page .head .info .meta .mono { font-size: 11.5px; color: var(--fg-4); }

.ref-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}
.ref-grid .cell {
  background: var(--bg-elev);
  padding: 12px 14px;
}
.ref-grid .cell .label {
  font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
  margin-bottom: 4px;
}
.ref-grid .cell .val {
  font-size: 13px; color: var(--fg);
}

.ref-section { margin-bottom: 22px; }
.ref-section h2 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-3);
  margin: 0 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.ref-section h2 .count {
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--bg-2);
  padding: 1px 6px;
  border-radius: 8px;
  text-transform: none;
  letter-spacing: 0;
  color: var(--fg-3);
  font-weight: 500;
}

/* Empty state */
.empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 28px;
  color: var(--fg-3);
  font-size: 13px;
  text-align: center;
}
.empty .glyph {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-2);
  display: grid; place-items: center;
  color: var(--fg-4);
  margin-bottom: 12px;
}

/* Audit log overlay */
.audit-log-overlay {
  position: fixed; inset: 0;
  background: oklch(20% 0.01 95 / 0.28);
  z-index: 90;
  display: flex; justify-content: flex-end;
}
.audit-log-panel {
  width: min(520px, 92vw);
  background: var(--bg-elev);
  border-left: 1px solid var(--border-2);
  box-shadow: -8px 0 32px oklch(20% 0.01 95 / 0.12);
  display: flex; flex-direction: column;
  height: 100%;
}
.audit-log-panel .head {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.audit-log-panel .head h3 { margin: 0; font-size: 14px; font-weight: 600; }
.audit-log-panel .head .sub { font-size: 11.5px; color: var(--fg-3); margin-left: 8px; }
.audit-log-panel .head .close { margin-left: auto; }
.audit-log-panel .body { flex: 1; overflow-y: auto; padding: 6px 0; }
.audit-log-panel .entry {
  padding: 8px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 12.5px;
}
.audit-log-panel .entry .when { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }
.audit-log-panel .entry .what { margin-top: 2px; color: var(--fg); }
.audit-log-panel .entry .what .target { color: var(--accent); }

/* Misc */
.kbd-inline {
  font-family: var(--font-mono);
  font-size: 10.5px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--fg-3);
}

.divider-v { width: 1px; height: 14px; background: var(--border-2); margin: 0 4px; }

/* Spinner */
.dot-pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 0 oklch(58% 0.11 155 / 0.5);
  animation: pulse 1.6s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 oklch(58% 0.11 155 / 0.5); }
  70% { box-shadow: 0 0 0 8px oklch(58% 0.11 155 / 0); }
  100% { box-shadow: 0 0 0 0 oklch(58% 0.11 155 / 0); }
}

/* Mark for search highlight */
mark {
  background: var(--c-amber-bg);
  color: var(--c-amber);
  padding: 0 1px;
  border-radius: 2px;
}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
/* eslint-disable */
// HistoricalWow data layer.
//
// Architecture: this is a thin async API client, NOT a "load everything into
// memory" cache. The viewer fetches what each view needs, when the view needs
// it. Only small reference tables get eager-loaded so component code can do
// synchronous lookups (window.findUser, decodeChoice, etc.).
//
// What's critical (blocks UI render — all small, parallel, gzipped):
//   sys_choice, core_company, cmn_department, cmn_location, cmn_cost_center,
//   sys_user_group, sys_user_grmember, manifest, hr_status.
//
// What's background (loads after `ready=true`; components fall back to
// the envelope's __display_<field> until the map arrives):
//   sys_user_lookup (sys_id → {name, user_name, title, …}, ~5 MB gz),
//   cmdb_ci_lookup  (sys_id → {name, sys_class_name, …},  ~33 MB gz).
//
// What's lazy (fetched per view via API helpers):
//   every task table (incident, change_request, problem, sc_request, …)
//   full sys_user / cmdb_ci records (UserRefPage / CIRefPage detail)
//   sys_audit, sys_journal_field (per-record on tab open)
//   sys_attachment metadata (per-record)
//   cmdb_rel_ci (per-CI on CIRefPage)

window.HistoricalWowData = (function () {
  // Tables eager-loaded ONLY because the JSX uses them in synchronous lookups
  // (findCI, findGroup, decodeChoice, etc.) and they're small enough to keep
  // in memory. Anything bigger is fetched per-view via API.
  const EAGER_TABLES = [
    ['sys_choice',          'sys_choice'],     // decodeChoice
    ['core_company',        'companies'],      // findCompany
    ['cmn_department',      'departments'],    // findDepartment
    ['cmn_location',        'locations'],      // findLocation
    ['cmn_cost_center',     'cost_centers'],   // findCostCenter
    ['sys_user_group',      'sys_user_group'], // findGroup (~200 records)
    ['sys_user_grmember',   'sys_user_grmember'], // group membership pivot (small)
  ];

  // Mirrors the exporter — used by UI code to inspect "is this a task table?"
  // and to drive bucketTaskRecordsAsync's display order on the group page.
  // Catalog flow ordered SCTASK → RITM → REQ (richer detail first) to match
  // the user-page USER_TABLE_ORDER convention.
  window.TASK_TABLES = [
    'incident', 'change_request', 'problem', 'problem_task',
    'sc_task', 'sc_req_item', 'sc_request',
    'incident_task', 'change_task',
    'sysapproval_group', 'asset_task',
    'sn_contract_renewal_task',
  ];

  const data = {
    // Eagerly loaded (or empty until ready)
    companies: [], departments: [], locations: [], cost_centers: [],
    sys_user_group: [], sys_user_grmember: [],
    sys_choice: [],
    // Lookup maps — compact projections used by sync find* helpers.
    cmdb_ci_lookup: new Map(),  // sys_id → { name, sys_class_name, operational_status }
    sys_user_lookup: new Map(), // sys_id → { name, user_name, title, department, location }
    // Lazy: components fetch what they need via the API helpers below.
    sys_user: [],         // populated only by callers that need full envelope (rare)
    cmdb_ci: [],          // legacy compat — empty
    cmdb_rel_ci: [],
    incidents: [], changes: [],
    problem: [], problem_task: [],
    sc_request: [], sc_req_item: [], sc_task: [],
    incident_task: [], change_task: [],
    sysapproval_group: [], asset_task: [],
    task_ci: [], task_sla: [], sysapproval_approver: [],
    journal: [],
    audit: [],
    attachments: [],
    manifest: {
      label: 'loading…', snapshot_date: '', instance: '', captured_at: '',
      tables: [], integrity: { sha256_manifest: '', acl_skips: 0, missing_attachments: 0 },
    },
    // HR gate — populated by /api/hr-status on boot. enabled=true means the
    // server is filtering HR-assigned incidents on locked sessions; the
    // viewer surfaces an unlock button when so.
    hrStatus: { enabled: false, unlocked: false, group_sys_id: '', group_label: '' },
    // Caller identity-by-network-position, populated by /api/whoami on boot.
    // There is no auth in front of this service; `host` is the server's
    // reverse-DNS lookup of the request's client IP (best-effort, cached
    // server-side), `ip` is the raw client IP, and `access_log` reports
    // whether the server is recording requests to its rotating log file.
    whoami: { ip: null, host: null, access_log: false },
    loadStatus: {
      ready: false, source: null, table: null,
      // Critical jobs the loading screen blocks on: manifest + EAGER_TABLES
      // + hr_status + whoami. The two big lookup maps (sys_user_lookup,
      // cmdb_ci_lookup — together 38 MB gzipped) load in the background
      // after `ready=true` so they don't block the UI on slow networks.
      total: EAGER_TABLES.length + 3,
      loaded: 0,
      error: null,
    },
  };

  // Subscriber pattern for re-render on load progress.
  const listeners = new Set();
  data.subscribe = (fn) => { listeners.add(fn); return () => listeners.delete(fn); };
  const notify = () => { for (const fn of listeners) { try { fn(data); } catch (_) {} } };

  function flatten(row) {
    if (!row) return row;
    const out = {};
    for (const k in row) {
      const v = row[k];
      if (v && typeof v === 'object' && !Array.isArray(v) && 'value' in v) {
        let val = v.value;
        if (val === 'true') val = true;
        else if (val === 'false') val = false;
        out[k] = val;
        if (v.display_value != null && v.display_value !== v.value) {
          out['__display_' + k] = v.display_value;
        }
      } else {
        out[k] = v;
      }
    }
    return out;
  }

  // ---- IndexedDB cache --------------------------------------------------
  // Lookup maps are deterministic functions of the snapshot — the same
  // input (manifest.captured_at) always produces the same output. So we
  // store them in IndexedDB keyed on the snapshot id, and only refetch
  // when the snapshot changes (i.e. when a new export was ingested
  // server-side). For 33 MB cmdb_ci_lookup over a slow VPN, this cuts
  // repeat-visit boot time from "stream + parse 33 MB" to "open IDB,
  // structured-clone-deserialize directly into a Map" — typically
  // 100-500 ms vs 5-30 s.
  const IDB_NAME = 'historicalwow';
  const IDB_STORE = 'lookups';

  function openIDB() {
    return new Promise((resolve, reject) => {
      try {
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = () => {
          if (!req.result.objectStoreNames.contains(IDB_STORE)) {
            req.result.createObjectStore(IDB_STORE);
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      } catch (e) { reject(e); }
    });
  }

  function idbGet(db, key) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function idbPut(db, key, value) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      const req = tx.objectStore(IDB_STORE).put(value, key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  // Fetch-with-IDB-cache. snapshotId comes from manifest.captured_at;
  // if the stored entry's snapshotId matches, return it immediately and
  // skip the network entirely. Otherwise fetch fresh and overwrite.
  async function fetchWithIdbCache(key, snapshotId, fetcher) {
    let db;
    try { db = await openIDB(); } catch (e) {
      console.warn(`[historicalwow] IDB open failed (${e.message}); falling back to network for ${key}`);
      return fetcher();
    }
    try {
      const stored = await idbGet(db, key);
      if (stored && stored.snapshotId === snapshotId && stored.value) {
        return stored.value;
      }
    } catch (e) {
      console.warn(`[historicalwow] IDB read failed for ${key}; refetching:`, e.message);
    }
    const value = await fetcher();
    try {
      await idbPut(db, key, { snapshotId, value });
    } catch (e) {
      console.warn(`[historicalwow] IDB write failed for ${key} (cache disabled this session):`, e.message);
    }
    return value;
  }

  async function apiGet(path) {
    let lastErr = null;
    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error(`${path}: HTTP ${res.status}`);
        return await res.json();
      } catch (e) {
        lastErr = e;
        if (attempt === 0) await new Promise(r => setTimeout(r, 250));
      }
    }
    throw lastErr;
  }
  data.apiGet = apiGet;

  // ---- async helpers exposed to React components --------------------------

  data.fetchRecord = async function (table, sys_id) {
    return flatten(await apiGet(`/api/${table}/${sys_id}`));
  };

  // Paginated list. opts: { limit, offset, q, filters, order_by, dir, slim }.
  data.fetchTaskList = async function (table, opts = {}) {
    const params = new URLSearchParams();
    if (opts.limit) params.set('limit', opts.limit);
    if (opts.offset) params.set('offset', opts.offset);
    if (opts.q) params.set('q', opts.q);
    if (opts.order_by) params.set('order_by', opts.order_by);
    if (opts.dir) params.set('dir', opts.dir);
    if (opts.slim) params.set('slim', '1');
    if (opts.filters) {
      for (const [k, v] of Object.entries(opts.filters)) {
        if (v != null && v !== '') params.set(k, v);
      }
    }
    const res = await apiGet(`/api/${table}?${params}`);
    return { ...res, rows: (res.rows || []).map(flatten) };
  };

  data.fetchJournalFor = async function (sys_id) {
    const res = await apiGet(`/api/journal/${sys_id}`);
    return (res.rows || []).map(flatten);
  };
  data.fetchAuditFor = async function (sys_id) {
    const res = await apiGet(`/api/audit/${sys_id}`);
    return (res.rows || []).map(flatten);
  };
  data.fetchAttachmentsFor = async function (sys_id) {
    const res = await apiGet(`/api/attachments/${sys_id}`);
    return (res.rows || []).map(flatten);
  };
  data.fetchVariables = async function (ritm_sys_id) {
    const res = await apiGet(`/api/variables/${ritm_sys_id}`);
    return { rows: res.rows || [], cat_item: res.cat_item || null };
  };
  data.fetchCIRelations = async function (sys_id) {
    const res = await apiGet(`/api/related/cmdb/${sys_id}`);
    return {
      upstream:   (res.upstream   || []).map(r => ({ ...flatten(r), ci: flatten(r.ci) })),
      downstream: (res.downstream || []).map(r => ({ ...flatten(r), ci: flatten(r.ci) })),
    };
  };
  data.fetchSearch = async function (q, types) {
    const params = new URLSearchParams({ q });
    if (types && types.length) params.set('types', types.join(','));
    const res = await apiGet(`/api/search?${params}`);
    return (res.rows || []).map(r => ({ ...flatten(r), _table: r._table }));
  };

  // HR gate
  data.fetchHrStatus = async function () {
    const s = await apiGet('/api/hr-status');
    data.hrStatus = s;
    notify();
    return s;
  };
  data.unlockHr = async function (password) {
    const res = await fetch('/api/hr-unlock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
      credentials: 'same-origin',
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    data.hrStatus = { ...data.hrStatus, unlocked: true };
    notify();
    return true;
  };
  data.lockHr = async function () {
    await fetch('/api/hr-lock', { method: 'POST', credentials: 'same-origin' });
    data.hrStatus = { ...data.hrStatus, unlocked: false };
    notify();
  };

  // ---- post-load processing ----------------------------------------------

  function postProcess() {
    for (const c of data.sys_choice) {
      if (!c.table && c.name) c.table = c.name;
    }
    const groupMembers = new Map();
    for (const m of data.sys_user_grmember) {
      const g = m.group, u = m.user;
      if (!g || !u) continue;
      let arr = groupMembers.get(g);
      if (!arr) { arr = []; groupMembers.set(g, arr); }
      arr.push(u);
    }
    for (const g of data.sys_user_group) {
      if (!g.member_sys_ids) g.member_sys_ids = groupMembers.get(g.sys_id) || [];
    }
  }

  // ---- load orchestration ------------------------------------------------

  // Critical jobs — block UI render. Small reference data + manifest +
  // hr_status. All firing in parallel; total is bounded by the slowest
  // single fetch (~few hundred KB compressed each).
  function makeCriticalJobs() {
    const jobs = [];
    for (const [table, alias] of EAGER_TABLES) {
      jobs.push([table, async () => {
        try {
          const res = await apiGet(`/api/${table}?limit=2000000&offset=0`);
          data[alias] = (res.rows || []).map(flatten);
        } catch (e) {
          console.warn(`[historicalwow] ${table} eager-load failed:`, e.message);
          data[alias] = [];
        }
      }]);
    }

      try {
        data.hrStatus = await apiGet('/api/hr-status');
      } catch (e) {
        console.warn('[historicalwow] hr-status failed:', e.message);

      try {
        data.whoami = await apiGet('/api/whoami');
      } catch (e) {
        console.warn('[historicalwow] whoami failed:', e.message);

  // envelope's __display_<field> until the lookup map arrives, so the
  // page renders immediately and progressively enhances.

  // visit (and every visit after) skips the network entirely — IDB
  // hands back the parsed object via structured clone in a few hundred
  // ms instead of streaming + parsing 38 MB of gzipped JSON.
  function loadBackgroundLookups() {
    const snapshotId = (data.manifest && data.manifest.captured_at) || 'unknown';
    fetchWithIdbCache('sys_user_lookup', snapshotId, () => apiGet('/api/sys_user_lookup'))
      .then(map => { data.sys_user_lookup = new Map(Object.entries(map)); notify(); })
      .catch(e => console.warn('[historicalwow] sys_user_lookup failed:', e.message));

      .then(map => { data.cmdb_ci_lookup = new Map(Object.entries(map)); notify(); })
      .catch(e => console.warn('[historicalwow] cmdb_ci_lookup failed:', e.message));

    data.loadStatus.table = 'manifest';

      data.manifest = m;
      data.loadStatus.source = 'export';
    }).catch(e => {
      console.warn('[historicalwow] /api/manifest failed:', e.message);

      manifestP,
      ...jobs.map(([label, fn]) => fn().finally(() => {
        data.loadStatus.loaded += 1;
        data.loadStatus.table = label;
        notify();
      })),
    ]);

    postProcess();
    data.loadStatus.table = null;
    data.loadStatus.ready = true;
    notify();

    // notify subscribers individually as they finish.
    loadBackgroundLookups();
  }

  data.ready = loadAll();
  return data;
})();

      ];
    }

    // Group task results by table.
    const tasksByTable = {};
    for (const r of taskMatches) {
      const t = r._table;
      if (!tasksByTable[t]) tasksByTable[t] = [];
      if (tasksByTable[t].length >= 6) continue;
      tasksByTable[t].push({
        kind: t === 'incident' ? 'incident' : t === 'change_request' ? 'change' : 'task',
        table: t, sys_id: r.sys_id,
        label: r.number || (r.sys_id || '').slice(0, 8) + '…',
        sub: r.short_description || '—',
        meta: t,
      });
    }

    // Assignment groups — eager (sys_user_group, ~200 records).
    const groupHits = data.sys_user_group.filter((g) =>
      (g.name || '').toLowerCase().includes(ql) ||
      (g.description || '').toLowerCase().includes(ql)
    ).slice(0, 6).map(g => ({
      kind: 'group', sys_id: g.sys_id, label: g.name,
      sub: g.description || `${(g.member_sys_ids || []).length} member${(g.member_sys_ids || []).length === 1 ? '' : 's'}`,
    }));

    // Users — background-loaded lookup Map (sys_id → projection).
    const userHits = [];
    if (data.sys_user_lookup && data.sys_user_lookup.forEach) {
      data.sys_user_lookup.forEach((info, sys_id) => {
        if (userHits.length >= 6) return;
        if ((info.name || '').toLowerCase().includes(ql) ||
            (info.user_name || '').toLowerCase().includes(ql) ||
            (info.title || '').toLowerCase().includes(ql)) {
          userHits.push({ kind: 'user', sys_id, label: info.name, sub: info.title });
        }
      });
    }

    const cis = [];
    if (data.cmdb_ci_lookup && data.cmdb_ci_lookup.forEach) {
      data.cmdb_ci_lookup.forEach((info, sys_id) => {
        if (cis.length >= 6) return;
        if ((info.name || '').toLowerCase().includes(ql)) {
          cis.push({ kind: 'ci', sys_id, label: info.name, sub: info.sys_class_name });
        }
      });
    }

    const groups = [];
    // Groups and users lead — they're who/what the search is usually about.
    if (groupHits.length) groups.push({ group: 'Groups', items: groupHits });
    if (userHits.length)  groups.push({ group: 'Users',  items: userHits });
    // Incidents and changes get prominent placement when matched.
    if (tasksByTable.incident)        groups.push({ group: 'Incidents', items: tasksByTable.incident });
    if (tasksByTable.change_request)  groups.push({ group: 'Change requests', items: tasksByTable.change_request });
    for (const [t, items] of Object.entries(tasksByTable)) {
      if (t === 'incident' || t === 'change_request') continue;
      groups.push({ group: window.taskLabel(t, 'plural'), items });
    }
    if (cis.length)   groups.push({ group: 'Configuration items', items: cis });
    return groups;
    // Background lookups (sys_user_lookup, cmdb_ci_lookup) get a fresh
    // reference on arrival, so depending on them re-runs the memo once
    // they land — otherwise a query typed before they load shows empty
    // sections until the user edits the input.
  }, [debouncedQ, taskMatches, data.sys_user_lookup, data.cmdb_ci_lookup, data.sys_user_group]);

  const flat = React.useMemo(() => results.flatMap(g => g.items), [results]);

  React.useEffect(() => { setActiveIdx(0); }, [q]);

  const go = (item) => {
    onClose();
    if (item.kind === 'go') { window.navigate(item.target); return; }
    if (item.kind === 'incident') window.navigate(`/incidents/${item.sys_id}`);
    if (item.kind === 'change')   window.navigate(`/changes/${item.sys_id}`);
    if (item.kind === 'task')     window.navigate(window.recordUrl(item.table, item.sys_id));
    if (item.kind === 'user')     window.navigate(`/users/${item.sys_id}`);
    if (item.kind === 'ci')       window.navigate(`/cis/${item.sys_id}`);
    if (item.kind === 'group')    window.navigate(`/groups/${item.sys_id}`);
  };

  const onKey = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); onClose(); }
    if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, flat.length - 1)); }
    if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(0, i - 1)); }
    if (e.key === 'Enter') { e.preventDefault(); if (flat[activeIdx]) go(flat[activeIdx]); }
  };

  if (!open) return null;
  let runningIdx = -1;
  return (
    <div className="kpalette-overlay" onClick={onClose}>
      <div className="kpalette" onClick={e => e.stopPropagation()}>
        <div className="input-row">
          <window.Icon name="search" size={16} />
          <input
            ref={inputRef}
            value={q}
            onChange={e => setQ(e.target.value)}
            onKeyDown={onKey}
            placeholder="Search incidents, changes, users, groups, CIs, journal entries…"
            spellCheck={false}
          />
          <span className="kbd-inline">esc</span>
        </div>
        <div className="results-list">
          {results.length === 0 && (
            <div style={{ padding: 24, textAlign: 'center', color: 'var(--fg-4)', fontSize: 13 }}>
              No matches in this snapshot.
            </div>
          )}
          {results.map((g, gi) => (
            <div key={gi}>
              <div className="group-label">{g.group}</div>
              {g.items.map((it, ii) => {
                runningIdx++;
                const active = runningIdx === activeIdx;
                const myIdx = runningIdx;
                return (
                  <div key={ii} className={'result' + (active ? ' active' : '')}
                       onMouseEnter={() => setActiveIdx(myIdx)}
                       onClick={() => go(it)}>
                    <div className="icon">
                      <window.Icon name={it.icon || (
                        it.kind === 'incident' ? 'incident' :
                        it.kind === 'change' ? 'change' :
                        it.kind === 'task' ? 'check' :
                        it.kind === 'user' ? 'user' :
                        it.kind === 'ci' ? 'ci' :
                        it.kind === 'group' ? 'users' : 'arrow_right'
                      )} size={13} />
                    </div>
                    <div className="label">
                      {it.kind !== 'go' && it.kind !== 'user' && it.kind !== 'ci' && it.kind !== 'group' && (
                        <span className="num mono">{it.label.split(' · ')[0]}</span>
                      )}
                      {(it.kind === 'go' || it.kind === 'user' || it.kind === 'ci' || it.kind === 'group') ? it.label : it.sub}
                    </div>
                    {(it.kind !== 'go') && <span className="meta">{
                      it.kind === 'incident' ? 'incident' :
                      it.kind === 'change' ? 'change_request' :
                      it.kind === 'task' ? (it.meta || it.table) :
                      it.kind === 'user' ? 'sys_user' :
                      it.kind === 'ci' ? 'cmdb_ci' :
                      it.kind === 'group' ? 'sys_user_group' : ''
                    }</span>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        <div className="footer">
          <span className="hint"><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
          <span className="hint"><kbd>↵</kbd> open</span>
          <span className="hint"><kbd>esc</kbd> close</span>
          <span style={{ marginLeft: 'auto', color: 'var(--fg-4)' }}>Reads from snapshot · {window.HistoricalWowData.manifest.label}</span>
        </div>
      </div>
    </div>
  );
};
  </script>

};

const PAGE_SIZE = 50;

// ---- generic paginated task list (fetches via /api/<table>) ---------------

function TaskList({ table }) {
  const data = window.HistoricalWowData;
  const [q, setQ] = React.useState('');
  const [debouncedQ, setDebouncedQ] = React.useState('');
  const [page, setPage] = React.useState(0);
  const [resp, setResp] = React.useState({ rows: null, total: 0 });
  const [loading, setLoading] = React.useState(true);

  // Debounce q so we don't fire a query on every keystroke
  React.useEffect(() => {
    const t = setTimeout(() => setDebouncedQ(q), 250);
    return () => clearTimeout(t);
  }, [q]);

  // Reset to page 0 on q change
  React.useEffect(() => { setPage(0); }, [debouncedQ, table]);

  React.useEffect(() => {
    let cancelled = false;
    setLoading(true);
    data.fetchTaskList(table, {
      limit: PAGE_SIZE,
      offset: page * PAGE_SIZE,
      q: debouncedQ,
      // Full envelope (not slim) so reference fields carry __display_<field>
      // for cases where findUser/findGroup miss in the lookup map.
      order_by: 'sys_updated_on',
      dir: 'desc',
    }).then(r => {
      if (cancelled) return;
      setResp(r);
      setLoading(false);
    }).catch(e => {
      if (cancelled) return;
      console.warn('TaskList fetch failed:', e);
      setResp({ rows: [], total: 0 });
      setLoading(false);
    });
    return () => { cancelled = true; };
  }, [table, debouncedQ, page]);

  const label = window.taskLabel(table, 'plural');
  const manifestEntry = data.manifest.tables.find(t => t.table === table);
  const sourceCount = manifestEntry ? manifestEntry.source_rows.toLocaleString() : '?';
  const total = resp.total || 0;
  const lastPage = Math.max(0, Math.ceil(total / PAGE_SIZE) - 1);

  return (
    <div>
      <div className="page-header">
        <h1>{label} <span className="count mono">{sourceCount}</span></h1>
        <div className="sub">
          <span className="mono" style={{ color: 'var(--fg-4)' }}>{table}</span> ·
          {' '}{total.toLocaleString()} matching · page {page + 1} of {lastPage + 1}
        </div>
        <div className="toolbar">
          <div className="spacer" />
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search number or short description…"
            style={{ height: 26, padding: '0 10px', border: '1px solid var(--border-2)', borderRadius: 14, background: 'var(--bg-elev)', fontSize: 12, outline: 'none', width: 280 }} />
          <Pager page={page} setPage={setPage} lastPage={lastPage} />
        </div>
      </div>
      <table className="dt">
        <thead>
          <tr>
            <th style={{ width: 130 }}>Number</th>
            <th>Short description</th>
            <th style={{ width: 110 }}>Priority</th>
            <th style={{ width: 130 }}>State</th>
            <th style={{ width: 180 }}>Assigned to</th>
            <th style={{ width: 170 }}>Group</th>
            <th style={{ width: 130 }} className="num">Updated</th>
          </tr>
        </thead>
        <tbody>
          {loading && (resp.rows == null) && (
            <tr><td colSpan={7} style={{ padding: '60px 20px', color: 'var(--fg-4)', textAlign: 'center' }}>
              <span className="dot-pulse" style={{ display: 'inline-block', marginRight: 8 }} />
              loading…
            </td></tr>
          )}
          {!loading && resp.rows && resp.rows.length === 0 && (
            <tr><td colSpan={7} style={{ padding: '40px 20px', color: 'var(--fg-4)', textAlign: 'center' }}>
              No matching records.
            </td></tr>
          )}
          {(resp.rows || []).map(r => {
            const stDec = window.decodeChoice('incident', 'state', r.state);
            const prDec = window.decodeChoice('incident', 'priority', r.priority);
            const bars = window.priorityBars(r.priority);
            return (
              <tr key={r.sys_id} onClick={() => window.navigate(window.recordUrl(table, r.sys_id))}>
                <td className="num">{r.number || r.sys_id?.slice(0, 8)}</td>
                <td className="short"><span className="truncate">{r.short_description || '—'}</span></td>
                <td>
                  {r.priority ? (
                    <span className={`chip ${window.priorityChipClass(r.priority)}`} title={prDec.label}>
                      <span className={`priority-bar ${bars.cls}`}>
                        {[0,1,2,3,4].map(i => <span key={i} className={'b' + (i < bars.filled ? ' on' : '')} style={{ height: 4 + i * 2 }} />)}
                      </span>
                      {prDec.label.split(' — ')[0] || `P${r.priority}`}
                    </span>
                  ) : <span className="muted">—</span>}
                </td>
                <td>
                  {r.state
                    ? <span className={`chip ${window.stateChipClass('incident', r.state)}`}>{stDec.label || r.state}</span>
                    : <span className="muted">—</span>}
                </td>
                <td>{r.assigned_to ? <window.UserCell sys_id={r.assigned_to} displayName={r.__display_assigned_to} /> : <span className="muted">—</span>}</td>
                <td className="muted">{window.findGroup(r.assignment_group)?.name || r.__display_assignment_group || '—'}</td>
                <td className="num muted" title={r.sys_updated_on}>{window.fmtRelative(r.sys_updated_on)}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function Pager({ page, setPage, lastPage }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12 }}>
      <button className="filter-pill" disabled={page === 0}
        onClick={() => setPage(0)}>« first</button>
      <button className="filter-pill" disabled={page === 0}
        onClick={() => setPage(p => Math.max(0, p - 1))}>‹ prev</button>
      <button className="filter-pill" disabled={page >= lastPage}
        onClick={() => setPage(p => Math.min(lastPage, p + 1))}>next ›</button>
      <button className="filter-pill" disabled={page >= lastPage}
        onClick={() => setPage(lastPage)}>last »</button>
    </div>
  );
}

function UserList() {
  const data = window.HistoricalWowData;
  const [q, setQ] = React.useState('');
  // sys_user isn't eager-loaded as an array anymore (saves ~5 MB of envelope
  // payload at boot); the compact projection lives in data.sys_user_lookup
  // (Map of sys_id → {name, user_name, title, department, location}). Walk
  // it to build the list rows.
  const allRows = React.useMemo(() => {
    const out = [];
    for (const [sys_id, info] of data.sys_user_lookup) {
      out.push({ sys_id, ...info });
    }
    return out;
  }, [data.sys_user_lookup]);

  let rows = allRows;
  if (q.trim()) {
    const ql = q.toLowerCase();
    rows = rows.filter(r =>
      (r.name || '').toLowerCase().includes(ql) ||
      (r.user_name || '').toLowerCase().includes(ql) ||
      (r.title || '').toLowerCase().includes(ql)
    );
  }
  rows = rows.slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  const display = rows.slice(0, 500);  // cap render for perf

  return (
    <div>
      <div className="page-header">
        <h1>Users <span className="count mono">{data.manifest.tables.find(t => t.table === 'sys_user')?.source_rows?.toLocaleString() || '—'}</span></h1>

// problem, sc_request, sc_req_item, sc_task, sysapproval_group, …).

// Parent → child relationship map for the "Tasks" section. The link field
// varies by parent: incident uses generic `parent`, but the catalog flow
// uses `request` (sc_request → sc_req_item) and `request_item`
// (sc_req_item → sc_task). Without this, opening an RITM showed no child
// catalog tasks because we were filtering on `parent` (which is empty).
const CHILD_REL = {
  incident:        { table: 'incident_task', field: 'parent' },
  change_request:  { table: 'change_task',   field: 'parent' },
  problem:         { table: 'problem_task',  field: 'parent' },
  sc_request:      { table: 'sc_req_item',   field: 'request' },
  sc_req_item:     { table: 'sc_task',       field: 'request_item' },
};

const ASSET_TABLES_SET = new Set([
  'alm_asset', 'alm_hardware', 'alm_software_license',
  'alm_consumable', 'alm_facility', 'alm_stockroom',
  'sn_ent_facility_asset',
]);

window.RecordPage = function RecordPage({ table, sys_id, showRaw }) {
  const data = window.HistoricalWowData;
  const [tab, setTab] = React.useState('journal');
  // All record data fetched via API on mount. No eager-loaded incident list,
  // so we don't have a "slim" until the API responds.
  const [fullRec, setFullRec]   = React.useState(null);
  const [journals, setJournals] = React.useState(null);
  const [audits, setAudits]     = React.useState(null);
  const [atts, setAtts]         = React.useState(null);
  const [emails, setEmails]     = React.useState(null);
  const [tasks, setTasks]       = React.useState([]);
  const [ciLinks, setCILinks]   = React.useState([]);
  const [slas, setSLAs]         = React.useState([]);
  const [approvals, setApprovals] = React.useState([]);
  const [variables, setVariables] = React.useState({ rows: [], cat_item: null });
  const [assetCITickets, setAssetCITickets] = React.useState(null); // tickets that reference this asset's linked CI
  const [groupApprovals, setGroupApprovals] = React.useState(null); // sysapproval_group rows under this parent
  const isAsset = ASSET_TABLES_SET.has(table);
  const isGroupApproval = table === 'sysapproval_group';

  React.useEffect(() => {
    let cancel = false;
    setFullRec(null); setJournals(null); setAudits(null); setAtts(null); setEmails(null);
    setTasks([]); setCILinks([]); setSLAs([]); setApprovals([]);
    setVariables({ rows: [], cat_item: null });
    setAssetCITickets(null);
    setGroupApprovals(null);

    data.fetchRecord(table, sys_id).then(r => {
      if (cancel) return;
      setFullRec(r);
      if (r) {
        const audit_label = r.short_description || r.display_name || r.name || '';
        const audit_target = r.number || r.asset_tag || sys_id.slice(0, 8);
        window.AuditLog.push('view', `${table}/${audit_target}`, audit_label);
      }
      // Asset → CI → tickets: when viewing a hardware/asset, also pull the
      // tickets that reference the linked CI so the user gets the implicit
      // "what tickets touched this laptop" view in one place.
      if (r && isAsset && r.ci) {
        Promise.all([
          data.fetchTaskList('incident',       { filters: { cmdb_ci: r.ci }, limit: 25, slim: 1, order_by: 'sys_updated_on', dir: 'desc' }).catch(() => ({ rows: [] })),
          data.fetchTaskList('change_request', { filters: { cmdb_ci: r.ci }, limit: 25, slim: 1, order_by: 'sys_updated_on', dir: 'desc' }).catch(() => ({ rows: [] })),
          data.fetchTaskList('problem',        { filters: { cmdb_ci: r.ci }, limit: 25, slim: 1, order_by: 'sys_updated_on', dir: 'desc' }).catch(() => ({ rows: [] })),
        ]).then(([inc, chg, prb]) => {
          if (cancel) return;
          const merged = [
            ...(inc.rows || []).map(x => ({ ...x, _table: 'incident' })),
            ...(chg.rows || []).map(x => ({ ...x, _table: 'change_request' })),
            ...(prb.rows || []).map(x => ({ ...x, _table: 'problem' })),
          ].sort((a, b) => (b.sys_updated_on || '').localeCompare(a.sys_updated_on || ''));
          setAssetCITickets(merged);
        });
      } else if (cancel || !r || !isAsset) {
        // leave assetCITickets null so we just hide the section
      }
      // sysapproval_group needs its parent + group sys_ids to find the
      // spawned approvers (they point at parent, not at the group record).
      if (r && isGroupApproval) {
        const grp = r.assignment_group || r.group;
        const filters = grp ? { sysapproval: r.parent, group: grp } : { sysapproval: r.parent };
        if (r.parent) {
          data.fetchTaskList('sysapproval_approver', { filters, limit: 100 })
            .then(res => { if (!cancel) setApprovals(res.rows || []); }).catch(() => {});
        }
      }
    }).catch(e => {
      if (cancel) return;
      // 403 → HR gate. Render a friendly message rather than the loading
      // spinner forever.
      if (e && /403/.test(e.message || '')) {
        setFullRec({ __hr_locked: true, sys_id });
      } else {
        setFullRec(false);
      }
    });
    data.fetchJournalFor(sys_id).then(r => { if (!cancel) setJournals(r); }).catch(() => setJournals([]));
    data.fetchAuditFor(sys_id).then(r => { if (!cancel) setAudits(r); }).catch(() => setAudits([]));
    data.fetchAttachmentsFor(sys_id).then(r => { if (!cancel) setAtts(r); }).catch(() => setAtts([]));
    // Emails tied to this record (sys_email.instance == sys_id). Metadata-only
    // by design; HR-gated at the API. Keep total to flag truncation.
    data.fetchTaskList('sys_email', { filters: { instance: sys_id }, order_by: 'sys_created_on', dir: 'desc', limit: 200, slim: 1 })
      .then(r => { if (!cancel) setEmails(r); }).catch(() => { if (!cancel) setEmails({ rows: [], total: 0 }); });

    // Per-record relationships (each is a small filtered query — was eager-
    // loaded as 422k+90k+75k rows, now 0–N rows per record). Asset records
    // skip these — they don't have parent/task_ci/sla/approver relations.
    if (!isAsset) {
      const rel = CHILD_REL[table];
      if (rel) {
        data.fetchTaskList(rel.table, { filters: { [rel.field]: sys_id }, limit: 200, slim: 1 })
          .then(r => { if (!cancel) setTasks(r.rows || []); }).catch(() => {});
      }
      data.fetchTaskList('task_ci', { filters: { task: sys_id }, limit: 200 })
        .then(r => { if (!cancel) setCILinks(r.rows || []); }).catch(() => {});
      data.fetchTaskList('task_sla', { filters: { task: sys_id }, limit: 50 })
        .then(r => { if (!cancel) setSLAs(r.rows || []); }).catch(() => {});
      // sysapproval_approver normally points to the parent task via
      // `sysapproval`. For a sysapproval_group record we'd usually find
      // zero direct matches; the dedicated isGroupApproval block below
      // handles those by filtering on parent+group instead — skip the
      // direct lookup here so we don't race with it (first call returns
      // [] before the second resolves).
      if (!isGroupApproval) {
        data.fetchTaskList('sysapproval_approver', { filters: { sysapproval: sys_id }, limit: 50 })
          .then(r => { if (!cancel) setApprovals(r.rows || []); }).catch(() => {});
      }
      if (table === 'sc_req_item') {
        data.fetchVariables(sys_id)
          .then(r => { if (!cancel) setVariables(r); }).catch(() => {});
      }
      // Group approvals routed for this parent task. Only meaningful for
      // tables that actually receive approvals (change_request,
      // sc_request, sc_req_item) — but querying for everything else
      // returns 0 cheaply, so don't bother gating.
      if (!isGroupApproval) {
        data.fetchTaskList('sysapproval_group', { filters: { parent: sys_id }, limit: 25, slim: 1 })
          .then(r => { if (!cancel) setGroupApprovals(r.rows || []); }).catch(() => {});
      }
    }

    return () => { cancel = true; };
  }, [table, sys_id]);

  const rec = fullRec;
  if (rec === null) {
    return <div className="empty"><div className="dot-pulse" style={{ marginBottom: 12 }} />loading…</div>;
  }
  if (rec && rec.__hr_locked) {
    const label = data.hrStatus.group_label || 'this group';
    return (
      <div className="empty">
        <div className="glyph"><window.Icon name="lock" /></div>
        <div style={{ fontWeight: 600, marginBottom: 6 }}>This record is restricted</div>
        <div style={{ maxWidth: 360, color: 'var(--fg-3)', fontSize: 13 }}>
          It belongs to <strong>{label}</strong>. Click <strong>Unlock HR data</strong> in the
          top bar to enter the access password and view it.
        </div>
      </div>
    );
  }
  if (!rec) {
    return <div className="empty"><div className="glyph"><window.Icon name="info" /></div>Record not found in this snapshot.</div>;
  }

  const journalCount = journals == null ? '…' : journals.length;
  const auditCount   = audits   == null ? '…' : audits.length;
  const attCount     = atts     == null ? '…' : atts.length;
  const emailCount   = emails    == null ? '…' : emails.total;

  return (
    <div className="record">
      <div className="left">
        {isAsset
          ? <AssetRecordHeader rec={rec} table={table} />
          : <RecordHeader rec={rec} table={table} />}
        {isAsset
          ? <AssetFieldsSection rec={rec} table={table} showRaw={showRaw} />
          : <FieldsSection rec={rec} table={table} showRaw={showRaw} />}
        {isAsset && assetCITickets && assetCITickets.length > 0 && (
          <AssetCITicketsSection rows={assetCITickets} ci={rec.ci} ci_display={rec.__display_ci} />
        )}
        <VariablesSection rows={variables.rows} cat_item={variables.cat_item} />
        {isGroupApproval && (
          <GroupApprovalContextSection rec={rec} />
        )}
        {tasks.length > 0 && <TasksSection tasks={tasks} table={table} />}
        {slas.length > 0 && <SLAsSection slas={slas} />}
        {ciLinks.length > 0 && <AffectedCIsSection ciLinks={ciLinks} />}
        {approvals.length > 0 && <ApprovalsSection approvals={approvals} />}
        {groupApprovals && groupApprovals.length > 0 && (
          <GroupApprovalsSection rows={groupApprovals} />
        )}
        <ManifestFooter rec={rec} />
      </div>
      <div className="right">
        <div className="tabs">
          <button className={'tab' + (tab === 'journal' ? ' active' : '')} onClick={() => setTab('journal')}>
            Journal <span className="badge">{journalCount}</span>
          </button>
          <button className={'tab' + (tab === 'audit' ? ' active' : '')} onClick={() => setTab('audit')}>
            History <span className="badge">{auditCount}</span>
          </button>
          <button className={'tab' + (tab === 'attachments' ? ' active' : '')} onClick={() => setTab('attachments')}>
            Attachments <span className="badge">{attCount}</span>
          </button>
          <button className={'tab' + (tab === 'emails' ? ' active' : '')} onClick={() => setTab('emails')}>
            Emails <span className="badge">{emailCount}</span>
          </button>
          <button className={'tab' + (tab === 'related' ? ' active' : '')} onClick={() => setTab('related')}>
            Related
          </button>
        </div>
        {tab === 'journal'     && <JournalTab     entries={journals} />}
        {tab === 'audit'       && <AuditTab       entries={audits} table={table} />}
        {tab === 'attachments' && <AttachmentsTab entries={atts} />}
        {tab === 'emails'      && <EmailsTab      resp={emails} />}
        {tab === 'related'     && <RelatedTab     rec={rec} table={table} journals={journals} />}
      </div>
    </div>
  );
};

}

// ---- Group approvals -----------------------------------------------------
// Maps a record number prefix (CHG / RITM / REQ / INC / PRB) to the
// task table that owns it. Used to navigate from a sysapproval_group
// up to the parent task without having to query every candidate table —
// ServiceNow's own number prefixes carry the type in the leading
// alphabetic chars.
const NUMBER_PREFIX_TABLE = {
  INC:    'incident',
  CHG:    'change_request',
  PRB:    'problem',
  PTASK:  'problem_task',
  CTASK:  'change_task',
  ITASK:  'incident_task',
  REQ:    'sc_request',
  RITM:   'sc_req_item',
  SCTASK: 'sc_task',
  ATASK:  'asset_task',
};

function tableFromNumber(num) {
  if (!num) return null;
  const m = String(num).match(/^([A-Z]+)\d/);
  return m ? NUMBER_PREFIX_TABLE[m[1]] : null;
}

function ParentTaskLink({ parent_sys_id, parent_display, fallback_label }) {
  if (!parent_sys_id) {
    return <span style={{ color: 'var(--fg-4)', fontStyle: 'italic' }}>{fallback_label || '—'}</span>;
  }
  const tbl = tableFromNumber(parent_display);
  const url = tbl ? window.recordUrl(tbl, parent_sys_id) : `/tasks/${tbl || 'task'}/${parent_sys_id}`;
  return (
    <span className="ref-link" onClick={() => window.navigate(url)}>
      <span className="mono" style={{ marginRight: 4 }}>{parent_display || sys_id_short(parent_sys_id)}</span>
      {tbl && <span style={{ color: 'var(--fg-4)', fontSize: 11.5 }}>· {window.taskLabel(tbl, 'singular')}</span>}
    </span>
  );
}

function stateChipColor(state) {
  // sysapproval_group / approver state values are mostly: requested,
  // approved, rejected, cancelled, no_longer_required, duplicate.
  const s = (state || '').toLowerCase();
  if (s === 'approved') return 'green';
  if (s === 'rejected') return 'red';
  if (s === 'cancelled' || s === 'no_longer_required' || s === 'duplicate') return 'gray';
  return 'amber'; // requested / pending / etc.
}

// On a parent task page, list the group-level approval records routed
// for it (one card per `sysapproval_group` whose `parent` = this).
function GroupApprovalsSection({ rows }) {
  return (
    <div className="section">
      <h3>Group approvals <span className="count">{rows.length}</span></h3>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4, paddingBottom: 14 }}>
        {rows.map(g => {
          const grp = g.assignment_group;
          const grpDisplay = g.__display_assignment_group || (grp && window.findGroup(grp)?.name) || sys_id_short(grp);
          return (
            <div key={g.sys_id}
                 onClick={() => window.navigate(window.recordUrl('sysapproval_group', g.sys_id))}
                 style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px',
                          border: '1px solid var(--border)', borderRadius: 6,
                          background: 'var(--bg-elev)', cursor: 'pointer' }}>
              <window.Icon name="users" size={12} />
              <span>{grpDisplay}</span>
              <span style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
                <span className={`chip ${stateChipColor(g.state)}`}>{g.__display_state || g.state || '—'}</span>
                <span className="mono" style={{ fontSize: 11, color: 'var(--fg-4)' }}>{g.number || g.sys_id.slice(0, 8) + '…'}</span>
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// On a sysapproval_group page, surface what we're approving (parent task
// link) and which group it was routed to. The existing ApprovalsSection
// already shows individual approver decisions once we've loaded them.
function GroupApprovalContextSection({ rec }) {
  const grp = rec.assignment_group || rec.group;
  const grpDisplay = rec.__display_assignment_group || rec.__display_group ||
                     (grp && window.findGroup(grp)?.name) || sys_id_short(grp);
  return (
    <div className="section">
      <h3>Approval context</h3>
      <div className="fields">
        <Field label="Approving" showRaw={false}>
          <ParentTaskLink
            parent_sys_id={rec.parent}
            parent_display={rec.__display_parent}
            fallback_label="(no parent)"
          />
        </Field>
        <Field label="Routed to group" showRaw={false}>
          {grp
            ? <RefLink kind="group" sys_id={grp} fallback={grpDisplay} />
            : <span style={{ color: 'var(--fg-4)', fontStyle: 'italic' }}>—</span>}
        </Field>
        <Field label="Approval state" showRaw={false}>
          <span className={`chip ${stateChipColor(rec.state)}`}>
            {rec.__display_state || rec.state || '—'}
          </span>
        </Field>
        <Field label="Requested by" showRaw={false}>
          {rec.requested_by
            ? <RefLink kind="user" sys_id={rec.requested_by} fallback={rec.__display_requested_by} />
            : <span style={{ color: 'var(--fg-4)', fontStyle: 'italic' }}>—</span>}
        </Field>
      </div>
      {rec.comments && (
        <div className="kv-block" style={{ marginTop: 10, whiteSpace: 'pre-wrap' }}>
          {rec.comments}
        </div>
      )}
    </div>
  );
}

        <span className="chip">{statusLabel}</span>

function sys_id_short(s) { return s ? s.slice(0, 8) + '…' : '—'; }

// Render any sys_id-shaped reference field with a sensible link target
// based on the field's name and the ServiceNow `__display_<field>`
// envelope value. Falls back to the plain display value (or the sys_id
// short form) when the target table isn't one we render.
function AssetRef({ rec, field, kind, fallback }) {
  const v = rec[field];
  const display = fallback || rec['__display_' + field];
  if (!v) return <span style={{ color: 'var(--fg-4)', fontStyle: 'italic' }}>—</span>;
  if (kind === 'user') return <RefLink kind="user" sys_id={v} fallback={display} />;
  if (kind === 'group') return <RefLink kind="group" sys_id={v} fallback={display} />;
  if (kind === 'ci') return <RefLink kind="ci" sys_id={v} fallback={display} />;
  if (kind === 'company') {
    const c = window.findCompany?.(v);
    return c ? <span>{c.name}</span> : <span>{display || sys_id_short(v)}</span>;
  }
  if (kind === 'department') {
    const d = window.findDepartment?.(v);
    return d ? <span>{d.name}</span> : <span>{display || sys_id_short(v)}</span>;
  }
  if (kind === 'location') {
    const l = window.findLocation?.(v);
    return l ? <span>{l.name}</span> : <span>{display || sys_id_short(v)}</span>;
  }
  if (kind === 'cost_center') {
    const cc = window.HistoricalWowData.cost_centers.find(c => c.sys_id === v);
    return cc ? <span>{cc.name || cc.code}</span> : <span>{display || sys_id_short(v)}</span>;
  }
  return <span>{display || sys_id_short(v)}</span>;
}

function AssetFieldsSection({ rec, table, showRaw }) {
  // Per-table custom layouts. Hardware gets the most fields; software
  // license / consumable / facility / stockroom tweak a few. Anything not
  // listed here falls back to a generic dump of the envelope.
  const sections = ASSET_FIELD_LAYOUT[table] || ASSET_FIELD_LAYOUT.alm_asset;
  return (
    <>
      {rec.short_description && (
        <div className="section">
          <h3>Description</h3>
          <div className="kv-block">{rec.short_description}</div>
        </div>
      )}
      {sections.map((sec, i) => (
        <div className="section" key={i}>
          <h3>{sec.heading}</h3>
          <div className="fields">
            {sec.fields.map(f => {
              const visible = f.always || rec[f.key] !== undefined;
              if (!visible) return null;
              return (
                <Field key={f.key} label={f.label} showRaw={showRaw} raw={rec[f.key]}>
                  {f.render ? f.render(rec) : <AssetRef rec={rec} field={f.key} kind={f.kind} />}
                </Field>
              );
            })}
          </div>
        </div>
      ))}
    </>
  );
}

const ASSET_FIELD_LAYOUT = {
  alm_hardware: [
    {
      heading: 'Identification', fields: [
        { key: 'asset_tag',     label: 'Asset tag',    render: (r) => <span className="mono">{r.asset_tag || '—'}</span> },
        { key: 'sys_id',        label: 'sys_id',       render: (r) => <span className="mono" style={{ color: 'var(--fg-3)', fontSize: 12 }}>{r.sys_id}</span> },
        { key: 'display_name',  label: 'Name',         render: (r) => <span>{r.display_name || '—'}</span> },
        { key: 'sys_class_name',label: 'Class',        render: (r) => <span className="mono" style={{ fontSize: 12 }}>{r.sys_class_name || '—'}</span> },
      ],
    },

function RefLink({ kind, sys_id, fallback }) {
  if (!sys_id) return <span style={{ color: 'var(--fg-4)', fontStyle: 'italic' }}>—</span>;
  // `fallback` is typically the __display_<field> from the record envelope:
  // ServiceNow's display_value at export time. We use it whenever the local
  // lookup map doesn't have the sys_id (e.g. user deactivated and not exported).
  const renderUnresolved = () => (
    <span className="ref-link" title={`Reference (sys_id ${sys_id.slice(0, 8)}…) not in lookup`}>
      {fallback || sys_id.slice(0, 8) + '…'}
    </span>
  );
  if (kind === 'user') {
    const u = window.findUser(sys_id);
    if (!u) return renderUnresolved();
    return <span className="ref-link" onClick={() => window.navigate(`/users/${sys_id}`)}>{u.name || fallback || sys_id.slice(0, 8) + '…'}</span>;
  }
  if (kind === 'group') {
    const g = window.findGroup(sys_id);
    if (!g) return renderUnresolved();
    return <span className="ref-link" onClick={() => window.navigate(`/groups/${sys_id}`)}>{g.name || fallback}</span>;
  }
  if (kind === 'ci') {
    const c = window.findCI(sys_id);
    if (!c) return renderUnresolved();
    return <span className="ref-link" onClick={() => window.navigate(`/cis/${sys_id}`)}>{c.name || fallback}</span>;
  }
  return <span>{fallback || ''}</span>;
}
