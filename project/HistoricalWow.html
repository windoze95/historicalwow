            <div className="spacer" />
            <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search name or description…"
              style={{ height: 26, padding: '0 10px', border: '1px solid var(--border-2)', borderRadius: 14, background: 'var(--bg-elev)', fontSize: 12, outline: 'none', width: 280, color: 'var(--fg)' }} />
          </div>
        </div>
        <table className="dt">
          <thead><tr>
            <th>Name</th>
            <th style={{ width: 170 }}>Type</th>
            <th style={{ width: 200 }}>Category</th>
            <th style={{ width: 200 }}>Catalog</th>
            <th style={{ width: 100 }} className="num">Status</th>
          </tr></thead>
          <tbody>
            {items === null && (
              <tr><td colSpan={5}><Loading label="Loading 213 catalog items…" /></td></tr>
            )}
            {items && filtered.length === 0 && (
              <tr><td colSpan={5} style={{ padding: '40px 20px', color: 'var(--fg-4)', textAlign: 'center' }}>No matching items.</td></tr>
            )}
            {filtered.map(it => (
              <tr key={it.sys_id} onClick={() => window.navigate(`/catalog-items/${it.sys_id}`)}>
                <td>
                  <strong style={{ fontWeight: 500 }}>{it.name}</strong>
                  <div style={{ fontSize: 11, color: 'var(--fg-4)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 600 }}>
                    {it.short_description || '—'}
                  </div>
                </td>
                <td><KindChip it={it} /></td>
                <td>{dv(it, 'category') || <span style={{ color: 'var(--fg-4)' }}>—</span>}</td>
                <td>{dv(it, 'sc_catalogs') || <span style={{ color: 'var(--fg-4)' }}>—</span>}</td>
                <td>
                  {isTrue(dv(it, 'active'))
                    ? <span className="chip green">active</span>
                    : <span className="chip">inactive</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  };

  // =========================================================================
  // Catalog item record — the screen with the 12 related-list tabs
  // =========================================================================
  window.CatalogItemRecordPage = function CatalogItemRecordPage({ sys_id, showRaw }) {
    const [rec, setRec] = useState(null);  // null=loading, false=not-found
    const [tab, setTab] = useState('variables');
    const [related, setRelated] = useState({});  // tab id → { rows, total, missing }
    const [usage, setUsage] = useState(null);
    const [created, setCreated] = useState(null);  // producer-created records

    useEffect(() => {
      let cancel = false;
      setRec(null); setRelated({}); setUsage(null); setCreated(null);
      C.fetchItem(sys_id).then(r => {
        if (cancel) return;
        if (!r) { setRec(false); return; }
        setRec(r);
        window.AuditLog.push('view', `sc_cat_item/${flat(r.name) || sys_id.slice(0, 8)}`, flat(r.name) || '');
        // For Standard Change templates, follow producer → proposal → change.
        // For other producer subtypes, target table varies and isn't always
        // recoverable from the envelope, so we only run the join for std_chg.
        const k = C.kindOf(r);
        if (k.kind === 'std_chg') {
          C.fetchProducerCreatedRecords(flat(r.name))
            .then(cr => { if (!cancel) setCreated(cr); })
            .catch(() => { if (!cancel) setCreated({ proposals: [], changes: [], total: 0, missing: true }); });
        } else if (C.PRODUCER_KINDS.has(k.kind)) {
          // Other producers: surface a "Created records" tab but explain why
          // we can't enumerate the spawned records.
          setCreated({ proposals: [], changes: [], total: 0, unknownTarget: true });
        }
      }).catch(e => {
        if (cancel) return;
        if (e && /403/.test(e.message || '')) setRec({ __hr_locked: true, sys_id });
        else setRec(false);
      });
      // Fan out related-list queries in parallel — every tab gets its data
      // available immediately on switch, no per-tab spinner round-trip.
      const fetchAll = [
        ['variables', C.fetchVariablesFor(sys_id)],
        ['vsets',     C.fetchVariableSetsFor(sys_id)],
        ['policies',  C.fetchUIPoliciesFor(sys_id)],
        ['actions',   C.fetchUIPolicyActionsFor(sys_id)],
        ['scripts',   C.fetchClientScriptsFor(sys_id)],
        ['available', C.fetchAvailableFor(sys_id)],
        ['notavail',  C.fetchNotAvailableFor(sys_id)],
      ];
      for (const [k, p] of fetchAll) {
        p.then(r => { if (!cancel) setRelated(prev => ({ ...prev, [k]: r })); })
          .catch(() => { if (!cancel) setRelated(prev => ({ ...prev, [k]: { rows: [], total: 0, missing: true } })); });
      }
      // Recent RITMs that reference this catalog item
      data.fetchTaskList('sc_req_item', { limit: 25, filters: { cat_item: sys_id }, order_by: 'sys_updated_on', dir: 'desc' })
        .then(r => { if (!cancel) setUsage(r); })
        .catch(() => { if (!cancel) setUsage({ rows: [], total: 0 }); });
      return () => { cancel = true; };
    }, [sys_id]);

    if (rec === null) {
      return <div className="empty"><div className="dot-pulse" style={{ marginBottom: 12 }} />loading catalog item…</div>;
    }
    if (rec === false) {
      return <div className="empty"><div className="glyph"><window.Icon name="info" /></div>Catalog item not in snapshot.</div>;
    }
    if (rec.__hr_locked) {
      return <div className="empty"><div className="glyph"><window.Icon name="lock" /></div>Restricted.</div>;
    }

    const name = flat(rec.name) || '(unnamed)';
    const desc = flat(rec.description) || flat(rec.short_description) || '';
    const cat = dv(rec, 'category') || dv(rec, 'topic') || '—';
    const cata = dv(rec, 'sc_catalogs') || '—';
    const active = isTrue(dv(rec, 'active'));
    const type = dv(rec, 'type') || flat(rec.sys_class_name) || 'Item';

    // Each tab row uses the related[<key>] envelope; missing=true marks
    // tabs whose backing table isn't pulled by the exporter yet.
    const r = (key) => related[key] || { rows: [], total: 0, missing: false, loading: true };
    const itemKind = C.kindOf(rec);
    const isProducer = C.PRODUCER_KINDS.has(itemKind.kind);
    const tabs = [
      // For producer items, lead with "Created records" since variables
      // typically aren't relevant to record producers (the producer's
      // template defines the spawned record's fields directly).
      ...(isProducer ? [{
        id: 'created',
        label: itemKind.kind === 'std_chg' ? 'Changes Created' : 'Created Records',
        r: created == null
          ? { loading: true, total: 0 }
          : { total: created.total ?? created.changes.length, missing: created.missing, unknownTarget: created.unknownTarget },
      }] : []),
      { id: 'variables',  label: 'Variables',                 r: r('variables') },
      { id: 'vsets',      label: 'Variable Sets',             r: r('vsets') },
      { id: 'policies',   label: 'Catalog UI Policies',       r: r('policies') },
      { id: 'scripts',    label: 'Catalog Client Scripts',    r: r('scripts') },
      { id: 'available',  label: 'Available For',             r: r('available') },
      { id: 'notavail',   label: 'Not Available For',         r: r('notavail') },
      { id: 'categories', label: 'Categories',                r: { rows: cat !== '—' ? [{ name: cat }] : [], total: cat !== '—' ? 1 : 0 } },
      { id: 'catalogs',   label: 'Catalogs',                  r: { rows: cata !== '—' ? [{ name: cata }] : [], total: cata !== '—' ? 1 : 0 } },
      { id: 'lookups',    label: 'Catalog Data Lookup Definitions', r: { rows: [], total: 0, missing: true, table: 'sc_cat_item_data_lookup_definitions' } },
      { id: 'articles',   label: 'Related Articles',          r: { rows: [], total: 0, missing: true, table: 'm2m_kb_to_sc_cat_item' } },
      { id: 'relitems',   label: 'Related Catalog Items',     r: { rows: [], total: 0, missing: true, table: 'sc_cat_item_related_items' } },
      { id: 'topics',     label: 'Assigned Topics',           r: { rows: [], total: 0, missing: true, table: 'topic_item' } },
    ];
    // When the active tab disappears (e.g. user nav-changes from a producer
    // item to a regular item and back), default to the first tab so we
    // don't render nothing.
    const visibleIds = new Set(tabs.map(t => t.id));
    const activeTab = visibleIds.has(tab) ? tab : tabs[0].id;

    return (
      <div className="record">
        <div className="left">
          <div className="record-header">
            <div className="crumbs">
              <a onClick={() => window.navigate('/service-catalog')}>Service catalog</a>
              <window.Icon name="chevron_right" size={11} />
              <a onClick={() => window.navigate('/catalog-items')}>Catalog items</a>
              <window.Icon name="chevron_right" size={11} />
              <span className="mono">{name}</span>
            </div>
            <h1>
              <window.Icon name="file" size={22} />
              <span style={{ flex: 1, minWidth: 0 }}>{name}</span>
            </h1>
            <div className="title-row">
              {active ? <span className="chip green">active</span> : <span className="chip">inactive</span>}
              <KindChip it={rec} />
              <span style={chip}>{cat}</span>
              <span style={chip}>{cata}</span>
              {dv(rec, 'delivery_time') && <><span className="dot">·</span><span>delivery {dv(rec, 'delivery_time')}</span></>}
              {flat(rec.price) && <><span className="dot">·</span><span>{flat(rec.price)}{flat(rec.recurring_price) ? ' / ' + flat(rec.recurring_price) : ''}</span></>}
              <span style={{ marginLeft: 'auto', fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--fg-4)' }}>
                sys_id {sys_id.slice(0, 8)}…
              </span>
            </div>
          </div>

          {desc && (
            <div className="section">
              <h3>Description</h3>
              <div className="kv-block" style={{ whiteSpace: 'pre-wrap' }}
                dangerouslySetInnerHTML={{ __html: stripUnsafe(desc) }} />
            </div>
          )}

          <div className="section">
            <h3>Item details</h3>
            <div className="fields" style={{ display: 'grid', gridTemplateColumns: '180px 1fr', rowGap: 8, columnGap: 16 }}>
              <Field label="Name">{name}</Field>
              <Field label="Catalog">{cata}</Field>
              <Field label="Category">{cat}</Field>
              <Field label="Type">{type}</Field>
              <Field label="Active">{active ? 'true' : 'false'}</Field>
              <Field label="Delivery time">{dv(rec, 'delivery_time') || '—'}</Field>
              <Field label="Price">{flat(rec.price) || '—'}</Field>
              <Field label="Recurring price">{flat(rec.recurring_price) || '—'}</Field>
              <Field label="Workflow">{dv(rec, 'workflow') || '—'}</Field>
              <Field label="Availability">{dv(rec, 'availability') || '—'}</Field>
              <Field label="Created">{flat(rec.sys_created_on) || '—'} <span style={{ color: 'var(--fg-4)' }}>by {flat(rec.sys_created_by) || '—'}</span></Field>
              <Field label="Updated">{flat(rec.sys_updated_on) || '—'} <span style={{ color: 'var(--fg-4)' }}>by {flat(rec.sys_updated_by) || '—'}</span></Field>
            </div>
          </div>

          <div className="section">
            <CatalogTabs tabs={tabs} active={activeTab} onChange={setTab} />
            <div style={{ paddingTop: 8 }}>
              {activeTab === 'created'    && <CreatedRecordsTab created={created} kind={itemKind.kind} />}
              {activeTab === 'variables'  && <VariablesTab r={r('variables')} />}
              {activeTab === 'vsets'      && <VariableSetsTab r={r('vsets')} />}
              {activeTab === 'policies'   && <UIPoliciesTab r={r('policies')} actions={r('actions')} />}
              {activeTab === 'scripts'    && <ClientScriptsTab r={r('scripts')} />}
              {activeTab === 'available'  && <UserCriteriaTab r={r('available')} kind="allow" />}
              {activeTab === 'notavail'   && <UserCriteriaTab r={r('notavail')} kind="deny" />}
              {activeTab === 'categories' && <CategoriesTab name={cat} sys_id={flat(rec.category)} />}
              {activeTab === 'catalogs'   && <CatalogsTab name={cata} sys_id={flat(rec.sc_catalogs)} />}
              {activeTab === 'lookups'    && <NotInSnapshot table="sc_cat_item_data_lookup_definitions" />}
              {activeTab === 'articles'   && <NotInSnapshot table="m2m_kb_to_sc_cat_item" />}
              {activeTab === 'relitems'   && <NotInSnapshot table="sc_cat_item_related_items" />}
              {activeTab === 'topics'     && <NotInSnapshot table="topic_item" />}
            </div>
          </div>

          <ManifestFooterCat />
        </div>

        {/* Right pane — usage panel */}
        <div className="right">
          <div className="section" style={{ padding: '12px 14px' }}>
            <h3 style={{ marginBottom: 8 }}>Usage</h3>
            {usage == null ? <Loading /> : (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                {[
                  ['RITMs (matching)', usage.total.toLocaleString()],
                  ['Loaded', usage.rows.length.toLocaleString()],
                  ['Variables', r('variables').total.toLocaleString()],
                  ['UI policies', r('policies').missing ? '—' : r('policies').total.toLocaleString()],
                  ['Client scripts', r('scripts').missing ? '—' : r('scripts').total.toLocaleString()],
                  ['Variable sets', r('vsets').missing ? '—' : r('vsets').total.toLocaleString()],
                  ['Available For', r('available').missing ? '—' : r('available').total.toLocaleString()],
                  ['Not Available', r('notavail').missing ? '—' : r('notavail').total.toLocaleString()],
                ].map(([k, v]) => (
                  <div key={k} style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 6, padding: '6px 8px' }}>
                    <div style={{ fontSize: 10.5, color: 'var(--fg-3)' }}>{k}</div>
                    <div style={{ fontFamily: 'var(--font-mono)', fontSize: 14 }}>{v}</div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="section" style={{ padding: '12px 14px' }}>
            <h3 style={{ marginBottom: 8 }}>Recent RITMs</h3>
            {usage == null && <Loading />}
            {usage && usage.rows.length === 0 && (
              <div style={{ color: 'var(--fg-4)', fontSize: 12 }}>
                No requested items reference this catalog item.
              </div>
            )}
            {(usage?.rows || []).map(r => (
              <div key={r.sys_id}
                   onClick={() => window.navigate(window.recordUrl('sc_req_item', r.sys_id))}
                   style={{
                     background: 'var(--bg-elev)', border: '1px solid var(--border)',
                     borderRadius: 6, padding: '8px 10px', cursor: 'pointer',
                     marginBottom: 4, display: 'flex', alignItems: 'center', gap: 8,
                   }}>
                <span className="mono" style={{ fontSize: 12 }}>{flat(r.number)}</span>
                <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontSize: 12 }}>
                  {flat(r.short_description) || '—'}
                </span>
                <span style={{ fontSize: 11, color: 'var(--fg-4)' }}>{window.fmtRelative(flat(r.sys_updated_on))}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  };

  // ServiceNow descriptions sometimes carry HTML. Strip script/style/event
  // handlers and let the rest render — formatting (bold, lists, links)
  // is part of how the catalog UI looks.
  function stripUnsafe(html) {
    return String(html || '')
      .replace(/<script[\s\S]*?<\/script>/gi, '')
      .replace(/<style[\s\S]*?<\/style>/gi, '')
      .replace(/\son\w+="[^"]*"/gi, '')
      .replace(/javascript:/gi, '');
  }

  function CatalogTabs({ tabs, active, onChange }) {
    return (
      <div style={{
        display: 'flex', flexWrap: 'wrap', gap: 2, borderBottom: '1px solid var(--border-2)',
        marginBottom: 6,
      }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => onChange(t.id)}
            style={{
              padding: '6px 12px', fontSize: 12.5, fontWeight: 500,
              border: 'none', cursor: 'pointer', background: 'transparent',
              color: active === t.id ? 'var(--accent-fg)' : (t.r.missing ? 'var(--fg-4)' : 'var(--fg-2)'),
              borderBottom: active === t.id ? '2px solid var(--accent)' : '2px solid transparent',
              marginBottom: -1,
            }}>
            {t.label}{' '}
            <span style={{ color: 'var(--fg-4)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>
              {t.r.missing ? '(?)' : `(${t.r.total ?? t.r.rows?.length ?? 0})`}
            </span>
          </button>
        ))}
      </div>
    );
  }

  function ManifestFooterCat() {
    const m = data?.manifest || {};
    const tag = [m.snapshot_date, m.label].filter(Boolean).join(' ') || 'unlabeled snapshot';
    return (
      <div className="section" style={{ borderBottom: 'none', color: 'var(--fg-4)', fontSize: 11.5, paddingTop: 14, paddingBottom: 30 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-mono)' }}>
          <window.Icon name="archive" size={11} />
          <span>archived from snapshot {tag}</span>
        </div>
      </div>
    );
  }

  function Field({ label, children }) {
    return (
      <>
        <div style={{ color: 'var(--fg-3)', fontSize: 12 }}>{label}</div>
        <div style={{ fontSize: 12.5 }}>{children}</div>
      </>
    );
  }

  // ---- Tab bodies ------------------------------------------------------

  // ServiceNow variable type IDs → human label (subset).
  const VAR_TYPE_LABEL = {
    1: 'Single-line text', 2: 'Multi-line text', 5: 'Select box',
    6: 'Long text', 7: 'Reference', 8: 'Checkbox', 9: 'Date',
    11: 'Email', 16: 'Tree picker', 17: 'Tree picker', 18: 'Date/time',
    21: 'Email', 22: 'URL', 24: 'Lookup select', 26: 'Lookup multi-select',
    31: 'Label', 32: 'Container start', 33: 'Container end',
  };
  function variableTypeLabel(rec) {
    const t = flat(rec.type);
    if (t == null || t === '') return '—';
    const n = parseInt(t, 10);
    if (!isNaN(n) && VAR_TYPE_LABEL[n]) return VAR_TYPE_LABEL[n];
    return rec.__display_type || t;
  }

  // ---- Created Records (producer-spawned) ------------------------------
  // For std change templates: shows the change_request rows that came out
  // of the template (joined via std_change_proposal). For other producer
  // subtypes the target table isn't recoverable from the envelope, so we
  // explain the mapping and link to ServiceNow's std change usage shape.
  function CreatedRecordsTab({ created, kind }) {
    if (created == null) return <Loading label="Joining change_request → std_change_proposal…" />;
    if (created.unknownTarget) {
      return (
        <Empty
          icon="info"
          text="This producer's target table isn't recorded in the envelope."
          hint="Generic Record Producers can spawn into incident, change_request, problem, rm_defect, etc. The target is set by a server-side script on order, so the spawned record doesn't carry a back-reference to the producer. To enumerate created records, scan the target table's source / origin field per producer."
        />
      );
    }
    if (created.missing) return <NotInSnapshot table="std_change_proposal" />;
    if (!created.changes.length) return <Empty text="No change_requests have been created from this template (yet)." />;

    const showProposals = (created.proposals || []).length > 1;
    return (
      <div>
        {showProposals && (
          <div style={{ marginBottom: 10, padding: '8px 12px', background: 'var(--accent-bg)', border: '1px solid var(--accent-border)', borderRadius: 6, fontSize: 12, color: 'var(--accent-fg)' }}>
            This template has {created.proposals.length} versions.{' '}
            Counts below combine all of them.
          </div>
        )}
        <table className="dt">
          <thead><tr>
            <th style={{ width: 130 }}>Number</th>
            <th>Short description</th>
            <th style={{ width: 120 }}>State</th>
            <th style={{ width: 130 }}>Assignment group</th>
            <th style={{ width: 110 }} className="num">Updated</th>
          </tr></thead>
          <tbody>
            {created.changes.slice(0, 100).map(cr => {
              const stDec = window.decodeChoice('change_request', 'state', flat(cr.state));
              const stCls = window.stateChipClass('change_request', flat(cr.state));
              return (
                <tr key={cr.sys_id} onClick={() => window.navigate(window.recordUrl('change_request', cr.sys_id))}>
                  <td className="num">{flat(cr.number)}</td>
                  <td><span className="truncate">{flat(cr.short_description) || '—'}</span></td>
                  <td>{flat(cr.state)
                    ? <span className={`chip ${stCls}`}>{stDec.label || flat(cr.state)}</span>
                    : <span className="muted">—</span>}</td>
                  <td className="muted" style={{ fontSize: 11.5 }}>{dv(cr, 'assignment_group') || '—'}</td>
                  <td className="num muted" title={flat(cr.sys_updated_on)}>{window.fmtRelative(flat(cr.sys_updated_on))}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {created.changes.length > 100 && (
          <div style={{ padding: '10px 0', textAlign: 'center', color: 'var(--fg-4)', fontSize: 11.5 }}>
            Showing first 100 of {created.changes.length.toLocaleString()} loaded.
            {created.total > created.changes.length && (
              <> Snapshot total: {created.total.toLocaleString()}.</>
            )}
            {created.capped && (
              <> Hit the page-through cap; some older rows may not be loaded.</>
            )}
          </div>
        )}
      </div>
    );
  }

  function VariablesTab({ r }) {
    if (r.loading) return <Loading />;
    if (r.missing) return <NotInSnapshot table="item_option_new" />;
    if (!r.rows.length) return <Empty text="No variables defined for this catalog item." />;
    return (
      <table className="dt">
        <thead><tr>
          <th style={{ width: 40 }} className="num">#</th>
          <th style={{ width: 220 }}>Question label</th>
          <th style={{ width: 140 }}>Variable name</th>
          <th style={{ width: 150 }}>Type</th>
          <th style={{ width: 90 }}>Mandatory</th>
          <th>Reference / details</th>
        </tr></thead>
        <tbody>
          {r.rows.map(v => (
            <tr key={v.sys_id}>
              <td className="num mono" style={{ color: 'var(--fg-4)' }}>{flat(v.order) || '—'}</td>
              <td><strong style={{ fontWeight: 500 }}>{flat(v.question_text) || '(unlabeled)'}</strong></td>
              <td className="mono" style={{ fontSize: 11.5 }}>{flat(v.name)}</td>
              <td><span style={chip}>{variableTypeLabel(v)}</span></td>
              <td>{isTrue(flat(v.mandatory)) ? <span className="chip amber">required</span> : <span style={{ color: 'var(--fg-4)' }}>—</span>}</td>
              <td style={{ fontSize: 12 }}>
                {flat(v.reference) && <div className="mono" style={{ fontSize: 11 }}>→ {flat(v.reference)}</div>}
                {flat(v.default_value) && <div style={{ color: 'var(--fg-3)' }}>default: <span className="mono">{flat(v.default_value)}</span></div>}
                {flat(v.help_text) && <div style={{ color: 'var(--fg-4)', fontStyle: 'italic' }}>{flat(v.help_text)}</div>}
                {!flat(v.reference) && !flat(v.default_value) && !flat(v.help_text) && (
                  <span style={{ color: 'var(--fg-4)' }}>—</span>
                )}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    );
  }

  function VariableSetsTab({ r }) {
    const [resolved, setResolved] = useState(null);
    useEffect(() => {
      if (!r || r.loading || r.missing || !r.rows.length) { setResolved([]); return; }
      let cancel = false;
      Promise.all(r.rows.map(row => C.fetchVariableSet(flat(row.variable_set))))
        .then(sets => { if (!cancel) setResolved(sets.filter(Boolean)); });
      return () => { cancel = true; };
    }, [r]);

    if (r.loading) return <Loading />;
    if (r.missing) return <NotInSnapshot table="io_set_item" />;
    if (!r.rows.length) return <Empty text="No variable sets attached to this catalog item." />;
    if (resolved === null) return <Loading label="Resolving variable sets…" />;

    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {resolved.map(s => (
          <div key={s.sys_id} style={{

  function UIPoliciesTab({ r, actions }) {
    // Compute the actions index unconditionally — the hooks-order rule

    // useMemo has to run before any conditional return. (Otherwise the
    // first "loading" render uses 0 hooks and the post-fetch render adds
    // one, blanking the tab with "Rendered more hooks than during the
    // previous render".)
    const actionsByPolicy = useMemo(() => {
      const m = new Map();
      for (const a of (actions?.rows || [])) {
        const k = flat(a.ui_policy);
        if (!k) continue;
        if (!m.has(k)) m.set(k, []);
        m.get(k).push(a);
      }
      return m;
    }, [actions]);

    if (r.loading) return <Loading />;
    if (r.missing) return <NotInSnapshot table="catalog_ui_policy" />;
    if (!r.rows.length) return <Empty text="No UI policies defined." />;

    return (
      <table className="dt">
        <thead><tr>

          <th style={{ width: 80 }} className="num">Order</th>

          <th style={{ width: 100 }}>Reverse</th>
          <th style={{ width: 90 }}>Status</th>

            const acts = actionsByPolicy.get(p.sys_id) || [];
            return (
              <tr key={p.sys_id}>
                <td>
                  <strong style={{ fontWeight: 500 }}>{flat(p.short_description) || '(no description)'}</strong>
                  {acts.length > 0 && (
                    <div style={{ marginTop: 4, display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                      {acts.map(a => {
                        const m = String(flat(a.mandatory) || 'leave_alone');
                        const v = String(flat(a.visible) || 'leave_alone');
                        const isReq = m === 'true';
                        return (
                          <span key={a.sys_id} style={{
                            ...chip,
                            background: isReq ? 'var(--c-amber-bg)' : 'var(--bg-3)',
                            borderColor: isReq ? 'var(--c-amber-border)' : 'var(--border)',
                            color: isReq ? 'var(--c-amber)' : 'var(--fg-2)',
                          }}>
                            {flat(a.variable) ? <span className="mono">{flat(a.variable).slice(0, 20)}</span> : '?'}: vis={v}, req={m}
                          </span>
                        );

                    </div>
                  )}
                </td>
                <td className="num mono">{flat(p.order) || '—'}</td>
                <td>{isTrue(flat(p.on_load)) ? <span className="chip green">yes</span> : <span className="chip">no</span>}</td>
                <td>{isTrue(flat(p.reverse_if_false)) ? <span className="chip">yes</span> : <span style={{ color: 'var(--fg-4)' }}>—</span>}</td>

  function ClientScriptsTab({ r }) {
    if (r.loading) return <Loading />;
    if (r.missing) return <NotInSnapshot table="catalog_script_client" />;
    if (!r.rows.length) return <Empty text="No client scripts defined." />;
    const typeColor = { onLoad: 'var(--c-blue)', onChange: 'var(--c-amber)', onSubmit: 'var(--c-violet)' };
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {r.rows.map(s => {
          const t = dv(s, 'type') || flat(s.type) || '—';
          const script = flat(s.script) || flat(s.script_preview) || '';
          return (
            <div key={s.sys_id} style={{
              background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ ...chip, color: typeColor[t] || 'var(--fg-2)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>{t}</span>
                <strong style={{ fontWeight: 500 }}>{flat(s.name) || '(unnamed)'}</strong>
                <span style={{ marginLeft: 'auto', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg-4)' }}>
                  {flat(s.cat_variable) ? `applies to: ${flat(s.cat_variable)}` : ''}
                </span>
              </div>
              {script && (
                <pre style={{
                  margin: '8px 0 0', padding: '8px 10px', background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 6,
                  fontFamily: 'var(--font-mono)', fontSize: 11.5, color: 'var(--fg-2)', overflowX: 'auto',
                  whiteSpace: 'pre-wrap', maxHeight: 320,
                }}>{script}</pre>
              )}
            </div>

        })}
      </div>
    );
  }

  function UserCriteriaTab({ r, kind }) {
    const [resolved, setResolved] = useState(null);
    useEffect(() => {
      if (!r || r.loading || r.missing || !r.rows.length) { setResolved([]); return; }
      let cancel = false;
      Promise.all(r.rows.map(row => C.fetchUserCriterion(flat(row.user_criteria))))
        .then(crits => { if (!cancel) setResolved(crits.filter(Boolean)); });
      return () => { cancel = true; };
    }, [r]);

    if (r.loading) return <Loading />;
    if (r.missing) return <NotInSnapshot table={kind === 'allow' ? 'sc_cat_item_user_criteria_mtom' : 'sc_cat_item_user_criteria_no_mtom'} />;
    if (!r.rows.length) return <Empty text={kind === 'allow' ? 'No "Available For" entries — visible to everyone in the catalog.' : 'No "Not Available For" entries.'} />;
    if (resolved === null) return <Loading label="Resolving user criteria…" />;

    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {resolved.map(uc => (
          <div key={uc.sys_id} style={{
            background: kind === 'deny' ? 'var(--c-red-bg)' : 'var(--accent-bg)',
            border: '1px solid ' + (kind === 'deny' ? 'var(--c-red-border)' : 'var(--accent-border)'),
            borderRadius: 8, padding: '8px 12px',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <window.Icon name={kind === 'deny' ? 'lock' : 'shield'} size={12} />
              <strong style={{ fontWeight: 500 }}>{flat(uc.name) || '(unnamed criterion)'}</strong>
              {isTrue(flat(uc.advanced)) && <span style={{ ...chip, marginLeft: 'auto' }}>advanced (script)</span>}
            </div>
            {flat(uc.description) && (
              <div style={{ fontSize: 12, color: 'var(--fg-3)', marginTop: 4 }}>{flat(uc.description)}</div>
            )}
          </div>
        ))}
      </div>
    );
  }

  function CategoriesTab({ name, sys_id }) {
    const [cat, setCat] = useState(null);
    useEffect(() => {
      if (!sys_id) { setCat(false); return; }
      C.fetchCategory(sys_id).then(setCat).catch(() => setCat(false));
    }, [sys_id]);
    if (!sys_id || name === '—') return <Empty text="Item is not assigned to a category." />;
    return (
      <div style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
          <strong style={{ fontWeight: 500 }}>{name}</strong>
          <span className="mono" style={{ fontSize: 11, color: 'var(--fg-4)' }}>sc_category</span>
          {cat === null && <span style={{ marginLeft: 'auto', color: 'var(--fg-4)', fontSize: 11 }}>loading…</span>}
        </div>
        {cat && cat !== false && flat(cat.description) && (
          <div style={{ fontSize: 12, color: 'var(--fg-3)', marginTop: 4 }}>{flat(cat.description)}</div>
        )}
        {cat === false && (
          <div style={{ fontSize: 11.5, color: 'var(--fg-4)', marginTop: 4, fontStyle: 'italic' }}>
            Category sys_id present on item, but the sc_category record isn't in this snapshot — pull sc_category from the exporter to enrich.
          </div>

  }

  function CatalogsTab({ name, sys_id }) {
    const [cat, setCat] = useState(null);
    useEffect(() => {
      if (!sys_id) { setCat(false); return; }
      C.fetchCatalog(sys_id).then(setCat).catch(() => setCat(false));
    }, [sys_id]);
    if (!sys_id || name === '—') return <Empty text="Item is not assigned to a catalog." />;
    return (
      <div style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
          <strong style={{ fontWeight: 500 }}>{name}</strong>
          <span className="mono" style={{ fontSize: 11, color: 'var(--fg-4)' }}>sc_catalog</span>
          {cat === null && <span style={{ marginLeft: 'auto', color: 'var(--fg-4)', fontSize: 11 }}>loading…</span>}
        </div>
        {cat && cat !== false && flat(cat.description) && (
          <div style={{ fontSize: 12, color: 'var(--fg-3)', marginTop: 4 }}>{flat(cat.description)}</div>
        )}
        {cat === false && (
          <div style={{ fontSize: 11.5, color: 'var(--fg-4)', marginTop: 4, fontStyle: 'italic' }}>
            Catalog sys_id present on item, but the sc_catalog record isn't in this snapshot — pull sc_catalog from the exporter to enrich.
          </div>
        )}
      </div>
    );
  }
})();
  </script>

  <script type="text/babel">
/* eslint-disable */
// Logic — business rules, client scripts, script includes, scheduled jobs,
// UI policies, data policies. Surfaces every server-side and client-side
// scripting record ingested from the ServiceNow instance, plus a per-table
// "what runs on this table" inspector reachable from anywhere in the app.
//
// Data layer: hits /api/sys_script, /api/sys_script_client,
// /api/sys_script_include, /api/sysauto_script, /api/sys_ui_policy,
// /api/sys_ui_policy_action, /api/sys_data_policy2, /api/sys_data_policy_rule
// — same shape as catalog.jsx, with the same fetchTable graceful-missing
// wrapper so tabs whose backing table isn't in this snapshot render
// "(not in this snapshot)" instead of blowing up.

(function () {
  const data = window.HistoricalWowData;

  const _cache = new Map();
  function fetchCached(key, fetcher, ttlMs = 60_000) {
    const e = _cache.get(key);
    const now = Date.now();
    if (e && (e.promise || (e.value && now - e.ts < ttlMs))) {
      return e.promise || Promise.resolve(e.value);
    }
    const p = fetcher().then(v => { _cache.set(key, { value: v, ts: Date.now() }); return v; });
    _cache.set(key, { promise: p });
    return p;
  }

  // Same wrapper as catalog.jsx: graceful "missing" handling so tabs
  // whose backing table hasn't been ingested yet don't crash the page.
  async function fetchTable(table, opts = {}) {
    try {
      const r = await data.fetchTaskList(table, opts);
      return { rows: r.rows || [], total: r.total || 0, missing: false };
    } catch (e) {
      const msg = (e && e.message) || '';
      if (/HTTP 404|HTTP 500|unknown table|no such table/i.test(msg)) {
        return { rows: [], total: 0, missing: true, error: msg };
      }
      return { rows: [], total: 0, missing: true, error: msg };
    }
  }

  // Page through every row matching opts. Used for the script-include
  // name index (we want every include name, not just the first 200).
  async function fetchAllRows(table, opts = {}, hardCap = 50_000) {
    const pageSize = Math.min(opts.limit || 5000, 5000);
    let rows = [];
    let total = null;
    let offset = 0;
    while (offset < hardCap) {
      const r = await fetchTable(table, { ...opts, limit: pageSize, offset });
      if (r.missing) return { rows: [], total: 0, missing: true };
      if (total === null) total = r.total || 0;
      rows = rows.concat(r.rows);
      if (r.rows.length < pageSize) break;
      if (rows.length >= total) break;
      offset += pageSize;
    }
    return { rows, total: total || rows.length, missing: false };
  }

  // Script-include name index. Loaded lazily on first record view that
  // needs it, then cached for the rest of the session.
  //
  // Two-pass scan. The previous eager-precompile approach kept one
  // RegExp per include in memory — at ~thousands of includes that's
  // enough compiled-pattern state to OOM the tab on a heavy table.
  // Instead:
  //
  //   (1) A single coarse alternation regex covers every include name,
  //       partitioned into a few buckets so any one regex stays under
  //       V8's pattern-size envelope. Test once per body to find any
  //       name occurrence anywhere — comments included, fine.
  //   (2) A name → include[] map turns each coarse hit into a
  //       candidate include set (a name can map to multiple records
  //       when the snapshot has duplicates across scopes).
  //   (3) Strict call-shape patterns are compiled *lazily* per
  //       candidate include — most includes are never candidates so
  //       their RegExp is never constructed.
  //
  // Result: peak compiled-regex memory is the coarse buckets (~a
  // dozen) plus however many candidate strict patterns the active
  // table happens to touch (typically <200), not thousands.
  //
  // What "call-shape" means: a match requires the include's name to
  // appear in a position that looks like an actual call (constructor,
  // dotted method, prototype extension, class/object extension,
  // gs.include / GlideAjax string literal). Bare mentions in comments
  // or unrelated identifiers don't qualify, which keeps the recursive
  // cascade from following the dictionary of common identifiers.
  // Names that match a JS or platform built-in we can never tell
  // apart from an override. If a customer has a script include named
  // `JSON`, every `JSON.parse(...)` in every body still resolves to
  // the native built-in at runtime — and the cascade scanner can't
  // distinguish. Treating those calls as references to the include
  // (which they technically are at the language level, sometimes)
  // sucks the entire dependency graph through a single high-traffic
  // node. Skip these names from the index entirely.
  //
  // Platform built-ins (GlideRecord, GlideSystem, GlideAjax, …) are
  // not script includes anyway — they live in Java — so no real
  // include should be named after them. Including them in the
  // blocklist is belt-and-suspenders in case a snapshot happens to
  // carry an override.
  const BUILTIN_NAME_BLOCKLIST = new Set([
    // ES + DOM globals
    'Array','ArrayBuffer','BigInt','Boolean','Date','Error','EvalError',
    'Function','Infinity','JSON','Map','Math','NaN','Number','Object',
    'Promise','Proxy','RangeError','ReferenceError','Reflect','RegExp',
    'Set','String','Symbol','SyntaxError','TypeError','URIError','WeakMap',
    'WeakSet','console','document','globalThis','navigator','undefined',
    'window',
    // ServiceNow platform classes commonly seen as identifiers
    'GlideAggregate','GlideAjax','GlideDate','GlideDateTime','GlideDuration',
    'GlideElement','GlideForm','GlideList','GlideRecord','GlideScheduleDateTime',
    'GlideScopedEvaluator','GlideSystem','GlideTime','GlideUser','GlideURI',
    'gs','g_form','g_user','g_scratchpad',
  ]);
  // Two builder groups so blocklisted names only contribute the
  // unambiguous string-literal forms. `gs.include('JSON')` and
  // `new GlideAjax('JSON')` are obvious references to a customer
  // include named JSON — the include name is in a quoted string,
  // can't be confused with the native built-in. Identifier-context
  // forms (`new JSON(`, `JSON.method(`, etc.) collide with the
  // native built-in and would over-pull.
  const IDENTIFIER_BUILDERS = [
    (e) => 'new\\s+' + e + '\\s*\\(',
    (e) => '\\b' + e + '\\.[A-Za-z_$][\\w$]*\\s*\\(',
    (e) => '\\b' + e + '\\.prototype\\b',
    (e) => '\\bextends\\s+' + e + '\\b',
    (e) => '\\bextendsObject\\s*\\(\\s*' + e + '\\b',
  ];
  const STRING_LITERAL_BUILDERS = [
    (e) => "gs\\.include\\(\\s*['\"]" + e + "['\"]\\s*\\)",
    (e) => "new\\s+GlideAjax\\s*\\(\\s*['\"]" + e + "['\"]",
  ];
  function escRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }
  function buildStrictPattern(allNames) {
    const parts = [];
    for (const n of allNames) {
      if (!n || n.length < 3) continue;
      const e = escRegex(n);
      const builders = BUILTIN_NAME_BLOCKLIST.has(n)
        ? STRING_LITERAL_BUILDERS
        : [...IDENTIFIER_BUILDERS, ...STRING_LITERAL_BUILDERS];
      for (const build of builders) parts.push(build(e));
    }
    if (!parts.length) return null;
    try { return new RegExp(parts.join('|')); }
    catch (_) { return null; }
  }
  // Partition into ~500-name buckets so the joined alternation stays
  // small. V8 will compile each into an efficient trie-like NFA; a
  // single 6800-way alternation can refuse to compile on some
  // versions.
  function buildCoarseBuckets(allNamesSorted) {
    const BUCKET = 500;
    const out = [];
    for (let i = 0; i < allNamesSorted.length; i += BUCKET) {
      const chunk = allNamesSorted.slice(i, i + BUCKET).map(escRegex);
      if (!chunk.length) continue;
      try { out.push(new RegExp('\\b(?:' + chunk.join('|') + ')\\b', 'g')); }
      catch (_) { /* skip bucket on compile failure rather than fail all */ }
    }
    return out;
  }
  // Out-of-box ServiceNow includes are authored by a small set of
  // platform users (admin, maint, glide.maint, the now.* system users
  // for Discovery / patterns / etc.). They're the bulk of every
  // instance and the cascade has no reason to walk them — the
  // customer-meaningful logic is in the includes a real human has
  // touched. An include is "user-touched" iff at least one of
  // sys_created_by / sys_updated_by is a real user; pure-system
  // includes are dropped from the index entirely.
  function isSystemAuthor(u) {
    if (!u) return true;
    const v = String(u).toLowerCase();
    return v === 'admin' || v === 'system' || v === 'maint' || v === 'guest'
        || v.startsWith('glide.')   // glide.maint, glide.installer
        || v.startsWith('now.')     // now.discovery_infra, now.patterns, now.cpg, …
        || v.startsWith('system.');
  }
  let _includeIndex = null;
  let _scanCtx = null;
  function getIncludeIndex() {
    if (_includeIndex) return _includeIndex;
    _includeIndex = fetchAllRows('sys_script_include', {
      order_by: 'name', dir: 'asc',
    }).then(r => {
      if (r.missing) { _scanCtx = { coarseBuckets: [], nameMap: new Map() }; return []; }
      const userTouched = r.rows.filter(row =>
        !isSystemAuthor(row.sys_created_by) || !isSystemAuthor(row.sys_updated_by)
      );
      const list = userTouched.map(row => {
        const sid = row.sys_id;
        const name = String(row.name || '').trim();
        const api  = String(row.api_name || '').trim();
        const names = new Set();
        if (name) names.add(name);
        if (api) {
          names.add(api);
          const tail = api.split('.').pop();
          if (tail) names.add(tail);
        }
        // Note: we keep blocklisted bare names in all_names. The
        // coarse pass still adds them as candidates, but the strict
        // pattern compiled by buildStrictPattern restricts those
        // names to string-literal call-shapes (gs.include('JSON'),
        // new GlideAjax('JSON')) — so an unambiguous reference still
        // resolves, while bare JSON.parse(...) doesn't drag the
        // override include into the cascade.
        return {
          sys_id: sid, name, api_name: api, all_names: [...names],
          _pattern: undefined,   // lazy-compiled in scanForIncludes
        };
      });
      // Collect every name worth scanning, deduped. Sort by length
      // descending so V8's regex alternation prefers longer matches
      // (avoids "Schedule" winning over "ScheduleEntry" on input
      // where both appear).
      const nameSet = new Set();
      const nameMap = new Map();
      for (const inc of list) {
        for (const n of inc.all_names) {
          if (!n || n.length < 3) continue;
          nameSet.add(n);
          if (!nameMap.has(n)) nameMap.set(n, []);
          nameMap.get(n).push(inc);
        }
      }
      const sorted = [...nameSet].sort((a, b) => b.length - a.length || a.localeCompare(b));
      _scanCtx = {
        coarseBuckets: buildCoarseBuckets(sorted),
        nameMap,
      };
      return list;
    }).catch(() => {
      _scanCtx = { coarseBuckets: [], nameMap: new Map() };
      return [];
    });
    return _includeIndex;
  }

  // Reverse index: include sys_id → list of scripts that reference it,
  // built by paging every business rule / client script / scheduled job
  // and running the same word-boundary scan that record pages use.
  // Required because `/api/<table>?q=` only searches indexed columns
  // (number / short_description / name / value), and we deliberately
  // don't index the `script` body — counts via `q=` would be 0 or hit
  // unrelated name matches. Lazy + session-cached: first include record
  // pays ~3 paged fetches and a regex scan, subsequent renders read
  // from the Map. Scripts are GC'd table-by-table so peak memory is
  // bounded to one table's body footprint at a time.
  let _reverseIncludeIndex = null;
  function getReverseIncludeIndex() {
    if (_reverseIncludeIndex) return _reverseIncludeIndex;
    _reverseIncludeIndex = (async () => {
      const includes = await getIncludeIndex();
      const out = { byId: new Map(), missing: {} };
      for (const inc of includes) out.byId.set(inc.sys_id, []);
      const sources = [
        { table: 'sys_script',        label: 'business rule', url: '/business-rules' },
        { table: 'sys_script_client', label: 'client script', url: '/client-scripts' },
        { table: 'sysauto_script',    label: 'scheduled job', url: '/scheduled-jobs' },
      ];
      for (const s of sources) {
        const r = await fetchAllRows(s.table, { order_by: 'sys_id', dir: 'asc' });
        if (r.missing) { out.missing[s.table] = true; continue; }
        for (const row of r.rows) {
          const body = row.script ? String(row.script) : '';
          if (!body) continue;
          const hits = scanForIncludes(body, includes);
          for (const inc of hits) {
            out.byId.get(inc.sys_id).push({
              table: s.table, label: s.label, url: s.url,
              sys_id: row.sys_id,
              name: row.name || '(unnamed)',
            });
          }
        }
      }
      return out;
    })();
    return _reverseIncludeIndex;
  }

  // Scan an arbitrary script body for include references using the
  // two-pass approach: bucketed coarse alternation finds candidates
  // by bare-name occurrence, then we lazy-compile and test each
  // candidate's strict call-shape pattern. Memory at any moment is
  // bounded by the candidate count (typically <200) rather than the
  // full include count (thousands).
  //
  // The `includes` parameter is accepted for back-compat with older
  // callers but ignored — the scan reads from the module-level
  // _scanCtx populated by getIncludeIndex().
  function scanForIncludes(text /*, includes */) {
    if (!text || !_scanCtx) return [];
    const candidates = new Set();
    for (const re of _scanCtx.coarseBuckets) {
      re.lastIndex = 0;
      let m;
      while ((m = re.exec(text)) !== null) {
        const incs = _scanCtx.nameMap.get(m[0]);
        if (incs) for (const inc of incs) candidates.add(inc);
      }
    }
    const hits = new Map();
    for (const inc of candidates) {
      if (inc._pattern === undefined) {
        // Lazy compile, cached on the include record itself. `false`
        // marks "tried and failed", `null` marks "no eligible names".
        inc._pattern = buildStrictPattern(inc.all_names) || false;
      }
      if (!inc._pattern) continue;
      try {
        if (inc._pattern.test(text)) hits.set(inc.sys_id, inc);
      } catch (_) {
        // Per-include failure — skip and keep scanning.
      }
    }
    return [...hits.values()];
  }

  // gs.getProperty('foo.bar') / gs.getProperty("foo.bar", default) — scrape
  // every literal property name out of a script body. Returns deduped names.
  // Matches the most common forms only; `gs.getProperty(varName)` and other
  // dynamic lookups are skipped on purpose (we can't know the value).
  // Regex is constructed per call so concurrent scans don't share lastIndex.
  function scanForProperties(text) {
    if (!text) return [];
    const rx = /gs\.getProperty\s*\(\s*['"]([^'"]+)['"]/g;
    const names = new Set();
    let m;
    while ((m = rx.exec(text)) !== null) {
      const n = String(m[1] || '').trim();
      if (n) names.add(n);
    }
    return [...names];
  }

  // Flow / subflow / action invocations from server scripts. Three
  // call shapes seen in the wild:
  //   sn_fd.FlowAPI.get('flow_name')           // also getRunner / startFlow / startSubflow / startActionFromRecord
  //   hub.executeFlow('flow_name')             // legacy wrapper
  //   new SubflowExecutor('flow_name')         // older orchestration helper
  // The captured string is matched against sys_hub_flow.name AND
  // sys_hub_flow.internal_name later. Regexes are per-call to avoid
  // concurrent-scan lastIndex races.
  function scanForFlows(text) {
    if (!text) return [];
    const rxs = [
      /sn_fd\.FlowAPI\.(?:get(?:Runner)?|startFlow|startSubflow|startActionFromRecord)\s*\(\s*['"]([^'"]+)['"]/g,
      /hub\.executeFlow\s*\(\s*['"]([^'"]+)['"]/g,
      /new\s+SubflowExecutor\s*\(\s*['"]([^'"]+)['"]/g,
    ];
    const names = new Set();
    for (const rx of rxs) {
      let m;
      while ((m = rx.exec(text)) !== null) {
        const n = String(m[1] || '').trim();
        if (n) names.add(n);
      }
    }
    return [...names];
  }

  const L = {
    fetchTable,
    fetchAllRows,
    getIncludeIndex,
    getReverseIncludeIndex,
    scanForIncludes,
    scanForProperties,
    scanForFlows,
    fetchRecord: (table, sys_id) => data.fetchRecord(table, sys_id),
    fetchTotalCount: (table) => fetchCached('count_' + table, async () => {
      const r = await fetchTable(table, { limit: 1 });
      return { total: r.total, missing: r.missing };
    }, 30_000),
    // Grouped counts for the home dashboard's "top tables" lists.
    // Pages every row of `table` and tallies by `groupBy` column, then
    // returns top N. group-by is fast enough at ~10k row scale because
    // the column is an indexed string. Cached so re-renders don't refetch.
    fetchTopTables: (table, groupBy, topN = 12) => fetchCached(
      `top_${table}_${groupBy}_${topN}`,
      async () => {
        const r = await fetchAllRows(table, { order_by: 'sys_id', dir: 'asc' });
        if (r.missing) return { missing: true, items: [] };
        const m = new Map();
        for (const row of r.rows) {
          const v = String(row[groupBy] || row['__display_' + groupBy] || '').trim();
          if (!v) continue;
          m.set(v, (m.get(v) || 0) + 1);
        }
        const items = [...m.entries()]
          .map(([name, count]) => ({ name, count }))
          .sort((a, b) => b.count - a.count)
          .slice(0, topN);
        return { items, total: r.rows.length, missing: false };
      },
      120_000,
    ),
  };
  L._cache = _cache;
  window.HistoricalWowLogic = L;
})();

  const PAGE_SIZE = 50;
  function LogicListShell({
    table, title, columns,
    extraFilters,            // [{ key, label, options: [{value,label}], default }]

    defaultOrderBy = 'name',
    defaultDir = 'asc',

        limit: PAGE_SIZE, offset: page * PAGE_SIZE,
        q: debouncedQ || undefined,
        filters: flt,
        order_by: defaultOrderBy, dir: defaultDir,
      }).then(r => {
        if (cancel) return;
        setResp(r);
        setLoading(false);
      }).catch(() => {
        if (cancel) return;
        setResp({ rows: [], total: 0, missing: true });
        setLoading(false);
      });
      return () => { cancel = true; };
    }, [table, debouncedQ, page, JSON.stringify(filters), activeOnly]);

    const click = onRowClick || ((r) => window.navigate(window.recordUrl(table, r.sys_id)));

          <input value={q} onChange={e => setQ(e.target.value)} placeholder={`Search ${(searchFields || ['name']).join(' / ')}…`}
            style={{ height: 26, padding: '0 10px', border: '1px solid var(--border-2)', borderRadius: 14, background: 'var(--bg-elev)', fontSize: 12, outline: 'none', width: 280, color: 'var(--fg)' }} />
          <Pager page={page} setPage={setPage} lastPage={lastPage} />
        </PageHeader>
        <table className="dt">
          <thead><tr>
            {columns.map(c => (
              <th key={c.key} style={{ width: c.w }} className={c.cls}>{c.label}</th>

          <tbody>
            {loading && resp.rows == null && (

                <span className="dot-pulse" style={{ display: 'inline-block', marginRight: 8 }} />

  // =========================================================================
  // Scheduled-job "next run" heuristic.
  // =========================================================================
  // ServiceNow stores schedule fields on sysauto_script: run_type, run_period,
  // run_time, run_dayofweek (1=Mon..7=Sun), run_dayofmonth, run_start.
  // We compute a *summary* string and a best-effort next-run datetime,
  // anchored at the snapshot's captured_at so the result is stable across
  // reloads. Day-of-week / day-of-month encoding follows what ServiceNow
  // actually writes; if we get an unrecognized run_type we just return
  // the raw value (the record page will still show the underlying fields).
  function summarizeSchedule(r) {
    const t = String(flat(r.run_type) || dv(r, 'run_type') || '').toLowerCase();
    if (!t) return '—';
    const time = flat(r.run_time) || flat(r.run_start) || '';
    const period = flat(r.run_period) || '';
    if (t === 'daily')   return 'daily' + (time ? ` at ${formatTimeBit(time)}` : '');
    if (t === 'weekly') {
      const d = flat(r.run_dayofweek);
      return 'weekly' + (d ? ` on ${dayName(d)}` : '') + (time ? ` at ${formatTimeBit(time)}` : '');
    }
    if (t === 'monthly') {
      const d = flat(r.run_dayofmonth);
      return 'monthly' + (d ? ` on day ${d}` : '') + (time ? ` at ${formatTimeBit(time)}` : '');
    }
    if (t === 'periodically') return 'every ' + (period ? formatTimeBit(period) : '?');
    if (t === 'once') return 'once' + (time ? ` at ${formatTimeBit(time)}` : '');
    if (t === 'on_demand') return 'on demand';
    if (t === 'business_calendar') return 'business calendar';
    return t;
  }
  function formatTimeBit(s) {
    if (!s) return '';
    const str = String(s);
    // ServiceNow stores time-of-day as "1970-01-01 HH:MM:SS" or just "HH:MM:SS".
    const m = str.match(/(\d{2}:\d{2})(?::\d{2})?$/);
    return m ? m[1] : str.split(' ').pop();
  }
  function dayName(d) {
    const n = parseInt(d, 10);
    const names = ['?', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    return names[n] || String(d);
  }

  // Heuristic next-run datetime, anchored at the snapshot captured_at.
  // Returns a JS Date or null. We deliberately don't try to handle all
  // ServiceNow edge cases (business calendars, multiple periods); the
  // summary string above is the authoritative human-readable view.
  function nextRunAfter(r, anchor) {
    const t = String(flat(r.run_type) || dv(r, 'run_type') || '').toLowerCase();
    const timeBit = formatTimeBit(flat(r.run_time) || flat(r.run_start) || '');
    const [hh, mm] = (timeBit.split(':').map(s => parseInt(s, 10)));
    if (isNaN(hh) || isNaN(mm)) return null;
    const setTime = (d) => { d.setHours(hh, mm, 0, 0); return d; };
    // ServiceNow timestamps are space-separated ("2026-04-28 06:12:33").
    // Convert to ISO so Safari and old engines don't return Invalid Date.
    const d0 = new Date(String(anchor || '').replace(' ', 'T'));
    if (isNaN(d0.getTime())) return null;
    if (t === 'daily') {
      let d = setTime(new Date(d0));
      if (d <= d0) d.setDate(d.getDate() + 1);
      return d;
    }
    if (t === 'weekly') {
      const dow = parseInt(flat(r.run_dayofweek), 10);
      if (isNaN(dow)) return null;
      let d = setTime(new Date(d0));
      // ServiceNow: 1=Mon..7=Sun. JS getDay(): 0=Sun..6=Sat. Convert.
      const jsTarget = dow === 7 ? 0 : dow;
      while (d.getDay() !== jsTarget || d <= d0) d.setDate(d.getDate() + 1);
      return d;
    }
    if (t === 'monthly') {
      const dom = parseInt(flat(r.run_dayofmonth), 10);
      if (isNaN(dom)) return null;
      let d = setTime(new Date(d0));
      d.setDate(dom);
      if (d <= d0) d.setMonth(d.getMonth() + 1);
      return d;
    }
    return null;
  }

  // =========================================================================
  // Script include record
  // =========================================================================
  window.ScriptIncludeRecordPage = function ScriptIncludeRecordPage({ sys_id }) {
    const [rec, setRec] = useState(null);
    const [referenced, setReferenced] = useState(null);
    useEffect(() => {
      let cancel = false;
      setRec(null); setReferenced(null);
      L.fetchRecord('sys_script_include', sys_id).then(r => {
        if (cancel) return;
        if (!r) { setRec(false); return; }
        setRec(r);
        window.AuditLog.push('view', `sys_script_include/${flat(r.name) || sys_id.slice(0, 8)}`, flat(r.name) || '');
        // Exact-reference list via the session-cached reverse index. The
        // index pages every BR / CS / SJ once per session, scans bodies
        // with the word-boundary regex, and persists the result. First
        // include view pays the build; subsequent views read from memory.
        L.getReverseIncludeIndex().then(idx => {
          if (cancel) return;
          const refs = idx.byId.get(sys_id) || [];
          setReferenced({
            refs,
            missing: idx.missing,
          });
        }).catch(() => { if (!cancel) setReferenced({ refs: [], missing: {} }); });
      }).catch(() => { if (!cancel) setRec(false); });
      return () => { cancel = true; };
    }, [sys_id]);

    if (rec === null) return <div className="empty"><div className="dot-pulse" style={{ marginBottom: 12 }} />loading script include…</div>;
    if (rec === false) return <div className="empty"><div className="glyph"><window.Icon name="info" /></div>Script include not in snapshot.</div>;

    const name = flat(rec.name) || '(unnamed)';
    const api  = flat(rec.api_name) || '';
    const desc = flat(rec.description) || '';
    const script = flat(rec.script) || '';
    const active = isTrue(flat(rec.active));

    return (
      <div className="record">
        <div className="left">
          <div className="record-header">
            <div className="crumbs">
              <a onClick={() => window.navigate('/logic')}>Logic</a>
              <window.Icon name="chevron_right" size={11} />
              <a onClick={() => window.navigate('/script-includes')}>Script includes</a>
              <window.Icon name="chevron_right" size={11} />
              <span className="mono">{name}</span>
            </div>
            <h1>
              <window.Icon name="book" size={22} />
              <span style={{ flex: 1, minWidth: 0 }}>{name}</span>
            </h1>
            <div className="title-row">
              {active ? <span className="chip green">active</span> : <span className="chip">inactive</span>}
              {isTrue(flat(rec.client_callable)) && <span className="chip blue">client-callable</span>}
              {api && <span className="mono" style={{ fontSize: 11.5, color: 'var(--fg-3)' }}>{api}</span>}
              <span style={{ marginLeft: 'auto', fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--fg-4)' }}>
                sys_id {sys_id.slice(0, 8)}…
              </span>
            </div>
          </div>

          {desc && (
            <div className="section">
              <h3>Description</h3>
              <div style={{ fontSize: 12.5, color: 'var(--fg-2)', whiteSpace: 'pre-wrap' }}>{desc}</div>
            </div>
          )}

          <div className="section">
            <h3>Include details</h3>
            <div className="fields" style={{ display: 'grid', gridTemplateColumns: '180px 1fr', rowGap: 8, columnGap: 16 }}>
              <Field label="Name">{name}</Field>
              <Field label="API name">{api || '—'}</Field>
              <Field label="Active">{active ? 'true' : 'false'}</Field>
              <Field label="Client-callable">{isTrue(flat(rec.client_callable)) ? 'true' : 'false'}</Field>
              <Field label="Access">{flat(rec.access) || '—'}</Field>
              <Field label="Created">{flat(rec.sys_created_on) || '—'} <span style={{ color: 'var(--fg-4)' }}>by {flat(rec.sys_created_by) || '—'}</span></Field>
              <Field label="Updated">{flat(rec.sys_updated_on) || '—'} <span style={{ color: 'var(--fg-4)' }}>by {flat(rec.sys_updated_by) || '—'}</span></Field>
            </div>
          </div>

          <div className="section">
            <h3>Script</h3>
            {script ? <CodeBlock maxHeight={600}>{script}</CodeBlock> : <Empty text="No script body on this include." />}
          </div>

          <ManifestFooter />
        </div>

        <div className="right">
          <div className="section" style={{ padding: '12px 14px' }}>
            <h3 style={{ marginBottom: 8 }}>Referenced by</h3>
            {referenced == null ? (
              <div style={{ color: 'var(--fg-4)', fontSize: 12, lineHeight: 1.55 }}>
                <span className="dot-pulse" style={{ display: 'inline-block', marginRight: 8 }} />
                Scanning script bodies (one-time per session)…
              </div>
            ) : (() => {
              const byTable = { sys_script: [], sys_script_client: [], sysauto_script: [] };
              for (const r of referenced.refs) byTable[r.table].push(r);
              const tiles = [
                ['Business rules',  'sys_script',        '/business-rules'],
                ['Client scripts',  'sys_script_client', '/client-scripts'],
                ['Scheduled jobs',  'sysauto_script',    '/scheduled-jobs'],
              ];
              return (
                <>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6 }}>
                    {tiles.map(([k, t]) => {
                      const miss = referenced.missing && referenced.missing[t];
                      return (
                        <div key={t} style={{
                          background: 'var(--bg-elev)', border: '1px solid var(--border)',
                          borderRadius: 6, padding: '6px 8px',
                        }}>
                          <div style={{ fontSize: 10, color: 'var(--fg-3)' }}>{k}</div>
                          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 14 }}>
                            {miss ? '—' : byTable[t].length.toLocaleString()}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {referenced.refs.length > 0 && (
                    <div style={{ marginTop: 12 }}>
                      {tiles.map(([k, t, url]) => byTable[t].length > 0 && (
                        <div key={t} style={{ marginBottom: 10 }}>
                          <div style={{ fontSize: 11, color: 'var(--fg-3)', textTransform: 'uppercase', letterSpacing: '.05em', marginBottom: 4 }}>
                            {k}
                          </div>
                          <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                            {byTable[t].slice(0, 30).map(r => (
                              <div key={r.sys_id}
                                   onClick={() => window.navigate(`${url}/${r.sys_id}`)}
                                   style={{
                                     padding: '4px 8px', cursor: 'pointer',
                                     borderRadius: 4, fontSize: 12,
                                     background: 'var(--bg-elev)', border: '1px solid var(--border)',
                                   }}>
                                {r.name}
                              </div>
                            ))}
                            {byTable[t].length > 30 && (
                              <div style={{ fontSize: 11, color: 'var(--fg-4)', textAlign: 'center', padding: '4px 0' }}>
                                + {byTable[t].length - 30} more
                              </div>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                  {referenced.refs.length === 0 && (
                    <div style={{ marginTop: 10, fontSize: 11.5, color: 'var(--fg-4)', fontStyle: 'italic' }}>
                      No scripts in the snapshot reference this include.
                    </div>
                  )}
                </>
              );
            })()}
          </div>
        </div>
      </div>
    );
  };
