// Catalog variables — render the form fields a user typed when submitting
// an RITM. Variable definitions vary per catalog item (sc_cat_item), so
// we drive the layout off the joined item_option_new rows and don't try
// to be clever about types beyond a few known cases:
//   1=string, 2=text, 5=select, 6=multi-line, 7=reference, 8=checkbox,
//   9=date, 17=tree picker, 21=email, 22=URL, 24=lookup, 26=lookup select.
function VariablesSection({ rows, cat_item }) {
  if (!rows || rows.length === 0) return null;
  const renderValue = (v, type, reference) => {
    const val = v == null || v === '' ? '—' : String(v);
    if (val === '—') return <span style={{ color: 'var(--fg-4)', fontStyle: 'italic' }}>—</span>;
    const typeNum = parseInt(type, 10);
    // Reference variable → try to resolve via lookup maps. The `reference`
    // column tells us which table the sys_id points at.
    if ((typeNum === 7 || typeNum === 24 || typeNum === 26) && /^[a-f0-9]{32}$/.test(val)) {
      if (reference === 'sys_user') {
        return <window.UserCell sys_id={val} />;
      }
      if (reference === 'sys_user_group') {
        const g = window.findGroup(val);
        return g ? <span className="ref-link" onClick={() => window.navigate(`/groups/${val}`)}>{g.name}</span>
                 : <span className="mono" style={{ fontSize: 11.5 }}>{val.slice(0, 8)}…</span>;
      }
      if (reference === 'cmdb_ci') {
        const c = window.findCI(val);
        return c ? <span className="ref-link" onClick={() => window.navigate(`/cis/${val}`)}>{c.name}</span>
                 : <span className="mono" style={{ fontSize: 11.5 }}>{val.slice(0, 8)}…</span>;
      }
      // Unknown reference table — just show the sys_id.
      return <span className="mono" style={{ fontSize: 11.5 }}>{val.slice(0, 8)}…</span>;
    }
    // Checkbox: ServiceNow stores 'true'/'false'.
    if (typeNum === 8) {
      return <span>{(val === 'true' || val === '1') ? 'Yes' : 'No'}</span>;
    }
    // Multi-line / long text — preserve newlines.
    if (typeNum === 2 || typeNum === 6) {
      return <span style={{ whiteSpace: 'pre-wrap' }}>{val}</span>;
    }
    return <span>{val}</span>;
  };
  return (
    <div className="section">
      <h3>
        Variables
        <span className="count">{rows.length}</span>
        {cat_item && <span style={{
          marginLeft: 10, fontSize: 11.5, color: 'var(--fg-3)',
          fontWeight: 400, fontFamily: 'var(--font-mono)',
        }}>{cat_item}</span>}
      </h3>
      <div className="kv-block" style={{
        display: 'grid', gridTemplateColumns: '180px 1fr', rowGap: 6, columnGap: 14,
        padding: '10px 12px',
      }}>
        {rows.map(v => (
          <React.Fragment key={v.opt_sys_id || v.def_sys_id || v.var_name}>
            <div style={{ color: 'var(--fg-3)', fontSize: 12 }}>
              {v.label || v.var_name || '(unnamed)'}
            </div>
            <div style={{ fontSize: 12.5 }}>
              {renderValue(v.value, v.type, v.reference)}
            </div>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function JournalTab({ entries }) {

  if (!entries.length) {

                <span className={`kind ${e.element}`}>{e.element === 'work_notes' ? 'work notes' : 'comment'}</span>
                <span className="when" title={e.sys_created_on}>{window.fmtRelative(e.sys_created_on)} · {e.sys_created_on}</span>

function AuditTab({ entries, table }) {
  if (entries == null) return <_LoadingTab label="loading history…" />;
  if (!entries.length) {
    return <div className="empty"><div className="glyph"><window.Icon name="history" /></div>No audit entries.</div>;
  }
  const renderVal = (a, val) => {
    if (val == null || val === '') return <span style={{ color: 'var(--fg-4)' }}>—</span>;
    if (a.fieldname === 'state') return window.decodeChoice(table, 'state', val).label;
    if (a.fieldname === 'priority') return window.decodeChoice('incident', 'priority', val).label;
    if (a.fieldname === 'close_code') return window.decodeChoice('incident', 'close_code', val).label;
    if (a.fieldname === 'assigned_to' || a.fieldname === 'caller_id') {
      const u = window.findUser(val);
      return u ? u.name : <span className="mono" style={{ fontSize: 11.5 }}>{val.slice(0, 12)}…</span>;
    }
    if (a.fieldname === 'assignment_group') {
      const g = window.findGroup(val);
      return g ? g.name : val;
    }
    return String(val);
  };
  return (
    <div className="audit">
      {entries.map(a => (
        <div key={a.sys_id} className="audit-row">
          <span className="when">{a.sys_created_on}</span>
          <span className="field">{a.fieldlabel}<span className="label">{a.fieldname}</span></span>
          <span className="from">{renderVal(a, a.oldvalue)}</span>
          <span className="to"><span className="arrow">→</span>{renderVal(a, a.newvalue)} <span style={{ color: 'var(--fg-4)', fontSize: 11.5, marginLeft: 8 }}>by {a.user}</span></span>
        </div>
      ))}
    </div>
  );
}

function EmailsTab({ resp }) {

  const rows = resp.rows || [];
  if (!rows.length) {

  }
  const truncated = rows.length < (resp.total || 0);
  const inbound = (t) => /rece/i.test(String(t || ''));  // received vs sent/ready
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {rows.map(e => (
        <div key={e.sys_id} style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>

            <span className="mono" style={{ fontSize: 11, color: 'var(--fg-4)', whiteSpace: 'nowrap' }}>{e.sys_created_on}</span>
          </div>
          {(e.recipients || e.state) && (

              {e.recipients ? `to ${e.recipients}` : ''}{e.recipients && e.state ? ' · ' : ''}{e.state || ''}

          )}

      ))}

function AttachmentsTab({ entries }) {
  if (entries == null) return <_LoadingTab label="loading attachments…" />;
  if (!entries.length) {
    return <div className="empty"><div className="glyph"><window.Icon name="paperclip" /></div>No attachments.</div>;
  }
  const ext = (n) => ((n || '').split('.').pop() || '').toUpperCase().slice(0, 4);
  // Mirror the exporter's _safe_name(): replace anything outside [A-Za-z0-9._-]
  // with '_', cap at 200 chars. Falls back to 'file' for empty input.
  const safeFilename = (n) => {
    if (!n) return 'file';
    const s = n.replace(/[^A-Za-z0-9._-]/g, '_').slice(0, 200);
    return s || 'file';
  };
  // Mirror the exporter's two-char hex sharding (first 2 chars of sys_id).
  const shard = (sid) => (sid?.slice(0, 2) || '__').toLowerCase();
  return (
    <div className="attachments-list">
      {entries.map(a => (
        <div key={a.sys_id} className="attachment">
          <div className="icon">{ext(a.file_name)}</div>
          <div className="meta">
            <div className="name">{a.file_name}</div>
            <div className="sub">{window.fmtBytes(a.size_bytes)} · {a.content_type} · uploaded {window.fmtRelative(a.sys_created_on)} by {a.sys_created_by}</div>
          </div>
          <a className="download"
             href={`data/attachments/${shard(a.sys_id)}/${a.sys_id}/${safeFilename(a.file_name)}`}
             download={a.file_name || 'file'}
             title="Download from archive"
             onClick={(e) => e.stopPropagation()}>
            <window.Icon name="download" size={14} />
          </a>
        </div>
      ))}
    </div>
  );
}

function RelatedTab(props) {
  const { rec, table } = props;
  const data = window.HistoricalWowData;
  // Other records on the same CI — search across every loaded task table,
  // not just incidents, since a CI is referenced from any task type.
  let items = [];
  if (rec.cmdb_ci) {
    const buckets = window.TASK_TABLES || ['incident', 'change_request'];
    for (const t of buckets) {
      const arr = window.getTaskRecords(t);
      for (const r of arr) {
        if (r.cmdb_ci === rec.cmdb_ci && r.sys_id !== rec.sys_id) {
          items.push({ rec: r, table: t });
          if (items.length >= 8) break;
        }
      }
      if (items.length >= 8) break;
    }
  }
  // Journal mentions: any of ServiceNow's standard prefixes for a task or KB.
  // `journals` is passed in by RecordPage (already fetched via API). Null
  // while loading; treat as empty until then.
  const allJournals = props.journals || [];
  const refs = new Set();
  for (const j of allJournals) {
    const m = (j.value || '').match(/(INC\d+|CHG\d+|PRB\d+|RITM\d+|REQ\d+|SCTASK\d+|TASK\d+|KB\d+)/g);
    if (m) m.forEach(x => refs.add(x));
  }
  // Resolve each reference against any loaded task table.
  const findByNumber = (num) => {
    const tables = window.TASK_TABLES || ['incident', 'change_request'];
    for (const t of tables) {
      const arr = window.getTaskRecords(t);
      const hit = arr.find(r => r.number === num);
      if (hit) return { rec: hit, table: t };
    }
    return null;
  };
  return (
    <div className="related-list">
      <div style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--fg-3)', margin: '4px 0 8px' }}>Same CI · {items.length}</div>
      {items.length === 0 && <div style={{ color: 'var(--fg-4)', fontSize: 12.5, padding: '6px 0' }}>No other records on this CI in snapshot.</div>}
      {items.map(({ rec: i, table: t }) => (
        <div key={i.sys_id} className="related-item" onClick={() => window.navigate(window.recordUrl(t, i.sys_id))}>
          <span className="num">{i.number}</span>
          <span className="desc">{i.short_description}</span>
          <span className={`chip ${window.stateChipClass('incident', i.state)}`}>{window.decodeChoice('incident', 'state', i.state).label || i.state}</span>
        </div>
      ))}
      {refs.size > 0 && (
        <>
          <div style={{ fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--fg-3)', margin: '16px 0 8px' }}>Mentioned in journal · {refs.size}</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {[...refs].map(r => {
              const found = findByNumber(r);
              const target = found?.rec;
              const targetTable = found?.table;
              return (
                <span key={r} className="chip" style={{ cursor: target ? 'pointer' : 'default' }}
                  onClick={() => target && window.navigate(window.recordUrl(targetTable, target.sys_id))}>
                  <window.Icon name="link" size={10} />
                  {r}{!target && <span style={{ color: 'var(--fg-4)' }}> · not loaded</span>}
                </span>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}
  </script>

  React.useEffect(() => {
    let cancel = false;
    // Recent — most recently updated incidents (the dominant table; fetching
    // top-N across every task table would mean N parallel API calls).
    data.fetchTaskList('incident', { limit: 8, order_by: 'sys_updated_on', dir: 'desc' })
      .then(r => { if (!cancel) setRecent((r.rows || []).map(x => ({ rec: x, table: 'incident' }))); })
      .catch(() => { if (!cancel) setRecent([]); });
    // "Open P1 / P2 at snapshot time" — historical lens: which high-priority
    // incidents were still open the moment we exported. The /api endpoint
    // doesn't support OR or NOT-IN, so we fan out two queries (P1 and P2)
    // with a generous limit and filter client-side. Sorting by opened_at
    // DESC biases toward newer tickets that are more likely to still be
    // open, so 200-row pages comfortably catch any open ones.
    Promise.all([
      data.fetchTaskList('incident', { limit: 200, filters: { priority: '1' }, order_by: 'opened_at', dir: 'desc' }).catch(() => ({ rows: [] })),
      data.fetchTaskList('incident', { limit: 200, filters: { priority: '2' }, order_by: 'opened_at', dir: 'desc' }).catch(() => ({ rows: [] })),

// or `sn_contract_renewal_task`.
const USER_RELATIONS = [
  { field: 'caller_id',     label: 'as caller',        tables: ['incident', 'sc_request', 'sc_req_item', 'sc_task', 'sn_contract_renewal_task'] },
  { field: 'requested_for', label: 'as requested for', tables: ['sc_request', 'sc_req_item', 'sc_task'] },
  { field: 'assigned_to',   label: 'as assignee',      tables: ['incident', 'sc_request', 'sc_req_item', 'sc_task', 'sn_contract_renewal_task'] },
];
// Stable display order for the per-table sections — top-down task volume,
// then catalog tasks first (richest detail) → requested items → requests
// last, then asset-task siblings.
const USER_TABLE_ORDER = ['incident', 'sc_task', 'sc_req_item', 'sc_request', 'sn_contract_renewal_task'];

// sys_user_delegate scope flags, in display order. ServiceNow lets a delegation
// cover any subset of these four. The viewer shows whichever are flagged on.
// Exposed on window so the standalone delegations list (lists.jsx) shares this
// one definition — the field names are instance-specific (plural here), so a
// second copy would be a divergence waiting to happen.
const DELEGATION_SCOPES = window.DELEGATION_SCOPES = [
  ['approvals',     'Approvals'],
  ['assignments',   'Assignments'],
  ['notifications', 'CC notifications'],
  ['invitations',   'Meeting invitations'],
];
// Robust truthiness for the scope flags: the merged envelope gives a real
// boolean (flatten coerces 'true'/'false'), but a row served straight from the
// indexed column would be the string '1'/'0' — and '0' is truthy. Normalise.
const delegationOn = window.delegationOn = v => v === true || v === 'true' || v === 1 || v === '1';

// One direction of a user's delegations. `otherField` is the column holding the
// *other* party — 'delegate' when this user is delegating out, 'user' when this
// user is receiving. Each card shows that party, the active window, and scopes.
function DelegationList({ rows, otherField }) {
  if (!rows || rows.length === 0) {
    return <div style={{ color: 'var(--fg-4)', fontSize: 12.5 }}>None.</div>;
  }
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {rows.map(d => {
        const scopes = DELEGATION_SCOPES.filter(([k]) => delegationOn(d[k]));
        return (
          <div key={d.sys_id}
               style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
              <window.UserCell sys_id={d[otherField]} displayName={d['__display_' + otherField]} />
              <span className="mono" style={{ marginLeft: 'auto', fontSize: 11.5, color: 'var(--fg-3)' }}>
                {d.starts || '—'} → {d.ends || 'open'}
              </span>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 8 }}>
              {scopes.length === 0
                ? <span style={{ color: 'var(--fg-4)', fontSize: 11.5 }}>no scopes flagged</span>
                : scopes.map(([k, label]) => (
                    <span key={k} className="chip" style={{ fontSize: 10.5 }}>{label}</span>
                  ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// Role grants for a user (sys_user_has_role) or group (sys_group_has_role).
// `resp` is the fetchTaskList response ({rows,total}); `inheritedField` is
// 'inherited' (user) or 'inherits' (group). Role names come from the reference
// display value. Shows direct + inherited (dimmed) chips, and flags truncation
// when more rows exist than were fetched (privileged accounts can have many).
function RolesSection({ resp, inheritedField, title }) {
  if (!resp || !resp.rows || resp.rows.length === 0) return null;
  const named = resp.rows
    .map(r => ({ name: r.__display_role || r.role, inherited: delegationOn(r[inheritedField]) }))
    .sort((a, b) => String(a.name).localeCompare(String(b.name)));
  const direct = named.filter(r => !r.inherited);
  const inh = named.filter(r => r.inherited);
  const truncated = resp.rows.length < (resp.total || 0);
  return (
    <div className="ref-section">
      <h2>{title} <span className="count">{(resp.total || resp.rows.length).toLocaleString()}</span></h2>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        {direct.map((r, i) => (
          <span key={'d' + i} className="chip" style={{ fontSize: 11.5 }}>
            <window.Icon name="shield" size={11} />{r.name}
          </span>
        ))}
        {inh.map((r, i) => (
          <span key={'i' + i} className="chip" title="inherited" style={{ fontSize: 11.5, color: 'var(--fg-4)' }}>{r.name}</span>
        ))}
      </div>
      {(inh.length > 0 || truncated) && (
        <div style={{ fontSize: 11, color: 'var(--fg-4)', marginTop: 6 }}>
          {direct.length} direct · {inh.length} inherited (dimmed){truncated ? ` · showing first ${resp.rows.length} of ${resp.total.toLocaleString()}` : ''}
        </div>
      )}
    </div>
  );
}

// A compact clickable row for the user-page "related records" sections.
function RefRow({ onClick, children }) {
  return (
    <div onClick={onClick}
         style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px',
                  background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 6,
                  cursor: onClick ? 'pointer' : 'default', fontSize: 12.5 }}>
      {children}
    </div>
  );
}

// User-page section: fetch <table> where <field> = the user, render each row
// via renderRow. Hidden while loading and when empty; keeps the API total to
// flag truncation.
function RelatedRecordsSection({ title, table, field, sys_id, slim, orderBy, renderRow }) {
  const data = window.HistoricalWowData;
  const [resp, setResp] = React.useState(null);
  React.useEffect(() => {
    let cancel = false; setResp(null);
    const opts = { limit: 100, filters: { [field]: sys_id } };
    if (orderBy) { opts.order_by = orderBy; opts.dir = 'desc'; }
    if (slim) opts.slim = 1;
    data.fetchTaskList(table, opts)
      .then(r => { if (!cancel) setResp(r); })
      .catch(() => { if (!cancel) setResp({ rows: [], total: 0 }); });
    return () => { cancel = true; };
  }, [table, field, sys_id]);
  if (!resp || !resp.rows || resp.rows.length === 0) return null;
  const truncated = resp.rows.length < (resp.total || 0);
  return (
    <div className="ref-section">
      <h2>{title} <span className="count">{(resp.total || resp.rows.length).toLocaleString()}</span></h2>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {resp.rows.map(renderRow)}
      </div>
      {truncated && <div style={{ fontSize: 11, color: 'var(--fg-4)', marginTop: 6 }}>showing first {resp.rows.length} of {resp.total.toLocaleString()}</div>}
    </div>
  );
}

// Record view for a sys_template — the generic RecordPage is task-shaped and
// renders blank for templates, so show the target table, owner, and the field
// values it pre-fills (parsed from the encoded `template` string).
window.TemplateRecordPage = function TemplateRecordPage({ sys_id }) {
  const data = window.HistoricalWowData;
  const [rec, setRec] = React.useState(undefined);
  React.useEffect(() => {
    let cancel = false;
    data.fetchRecord('sys_template', sys_id)
      .then(r => { if (!cancel) setRec(r || null); })
      .catch(() => { if (!cancel) setRec(null); });
    if (window.AuditLog) window.AuditLog.push('view', `sys_template/${sys_id}`, '');
    return () => { cancel = true; };
  }, [sys_id]);
  if (rec === undefined) return <div style={{ padding: 24, color: 'var(--fg-4)', fontSize: 12.5 }}><span className="dot-pulse" style={{ display: 'inline-block', marginRight: 8 }} />loading…</div>;
  if (!rec) return <div className="empty"><div className="glyph"><window.Icon name="info" /></div>Template not in this snapshot.</div>;
  // `template` encodes field=value pairs joined by `^` (with trailing query
  // operators like EQ). Parse into rows, skipping operator tokens.
  const pairs = String(rec.template || '').split('^')
    .map(s => s.trim())
    .filter(s => s.includes('=') && !/^(EQ|NQ|OR|ORDERBY|GOTO)\b/i.test(s))
    .map(s => { const i = s.indexOf('='); return [s.slice(0, i), s.slice(i + 1)]; });
  return (
    <div className="ref-page">
      <div className="crumbs" style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: 'var(--fg-3)', marginBottom: 14 }}>
        <span>Template</span>
        <window.Icon name="chevron_right" size={11} />
        <span className="mono">{rec.name}</span>
      </div>
      <div className="head" style={{ display: 'block' }}>
        <h1 style={{ marginBottom: 8 }}>{rec.name || '(unnamed)'}</h1>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          {rec.table && <span className="chip mono">{rec.table}</span>}
          {rec.active === false && <span className="chip" style={{ color: 'var(--fg-4)' }}>inactive</span>}
        </div>
      </div>
      <div className="ref-grid" style={{ marginTop: 14 }}>
        <div className="cell"><div className="label">Target table</div><div className="val mono">{rec.table || '—'}</div></div>
        <div className="cell"><div className="label">Owner</div><div className="val">{rec.user ? <window.UserCell sys_id={rec.user} displayName={rec.__display_user} /> : '—'}</div></div>
        <div className="cell"><div className="label">Short description</div><div className="val">{rec.short_description || '—'}</div></div>
        <div className="cell"><div className="label">Updated</div><div className="val">{rec.sys_updated_on || '—'}</div></div>
      </div>
      <div className="ref-section">
        <h2>Sets fields <span className="count">{pairs.length}</span></h2>
        {pairs.length === 0
          ? <div style={{ color: 'var(--fg-4)', fontSize: 12.5 }}>No field values parsed from this template.</div>
          : <table className="dt"><thead><tr><th style={{ width: 240 }}>Field</th><th>Value</th></tr></thead>
              <tbody>{pairs.map(([k, v], i) => (<tr key={i}><td className="mono" style={{ fontSize: 12 }}>{k}</td><td>{v || '—'}</td></tr>))}</tbody>
            </table>}
      </div>
    </div>
  );
};

window.UserRefPage = function UserRefPage({ sys_id }) {
  const data = window.HistoricalWowData;
  const u = window.findUser(sys_id);
  // relations: null while loading; otherwise { [field]: [{table, items, total}, ...] }
  const [relations, setRelations]   = React.useState(null);
  const [hwAssigned, setHwAssigned] = React.useState(null);
  const [hwOwned, setHwOwned]       = React.useState(null);
  // delegations: null while loading; otherwise { given: {rows,total}, received: {rows,total} }
  const [delegations, setDelegations] = React.useState(null);
  // roles: null while loading; otherwise this user's sys_user_has_role rows
  const [roles, setRoles] = React.useState(null);

  React.useEffect(() => {
    if (u) window.AuditLog.push('view', `sys_user/${u.user_name}`, u.name);
    let cancel = false;
    setRelations(null);
    setHwAssigned(null); setHwOwned(null);
    setDelegations(null);
    setRoles(null);
    // Fan out across (relation × table) in parallel. Each promise resolves to
    // [field, buckets[]]; collect into a {field: buckets[]} map.
    Promise.all(USER_RELATIONS.map(({ field, tables }) =>
      bucketTaskRecordsAsync(field, sys_id, { tables })
        .then(buckets => [field, buckets])
        .catch(() => [field, []])
    )).then(pairs => {
      if (cancel) return;
      setRelations(Object.fromEntries(pairs));
    });
    // Hardware this user is assigned / owns
    data.fetchTaskList('alm_hardware', { limit: 24, filters: { assigned_to: sys_id }, order_by: 'sys_updated_on', dir: 'desc' })
      .then(r => { if (!cancel) setHwAssigned(r); }).catch(() => { if (!cancel) setHwAssigned({ rows: [], total: 0 }); });
    data.fetchTaskList('alm_hardware', { limit: 24, filters: { owned_by: sys_id }, order_by: 'sys_updated_on', dir: 'desc' })
      .then(r => { if (!cancel) setHwOwned(r); }).catch(() => { if (!cancel) setHwOwned({ rows: [], total: 0 }); });
    // Delegations in both directions: `user`=this user → they delegate out;
    // `delegate`=this user → they receive someone else's delegation.
    const noRows = { rows: [], total: 0 };
    Promise.all([
      data.fetchTaskList('sys_user_delegate', { limit: 100, filters: { user: sys_id },     order_by: 'starts', dir: 'desc' }).catch(() => noRows),
      data.fetchTaskList('sys_user_delegate', { limit: 100, filters: { delegate: sys_id }, order_by: 'starts', dir: 'desc' }).catch(() => noRows),
    ]).then(([given, received]) => { if (!cancel) setDelegations({ given, received }); });
    // Roles held (direct + inherited). Non-slim so the role name arrives as the
    // reference display value (__display_role).
    data.fetchTaskList('sys_user_has_role', { limit: 1000, filters: { user: sys_id }, order_by: 'role', dir: 'asc' })
      .then(r => { if (!cancel) setRoles(r); }).catch(() => { if (!cancel) setRoles({ rows: [], total: 0 }); });
    return () => { cancel = true; };
  }, [sys_id]);

  if (!u) return <div className="empty"><div className="glyph"><window.Icon name="info" /></div>User not in snapshot.</div>;

  const groupMembership = data.sys_user_group.filter(g => (g.member_sys_ids || []).includes(sys_id));

  return (
    <div className="ref-page">
      <div className="crumbs" style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: 'var(--fg-3)', marginBottom: 14 }}>
        <a onClick={() => window.navigate('/users')}>Users</a>
        <window.Icon name="chevron_right" size={11} />
        <span className="mono">{u.user_name}</span>
      </div>
      <div className="head">
        <window.Avatar name={u.name} size="xl" />
        <div className="info">
          <h1>{u.name}</h1>
          <div className="meta">
            <span>{u.title}</span>
            <span style={{ color: 'var(--fg-4)' }}>·</span>
            <span className="mono">{u.user_name}</span>
            <span style={{ color: 'var(--fg-4)' }}>·</span>
            <span>{u.email}</span>
          </div>
        </div>
      </div>

      <div className="ref-grid">
        <div className="cell"><div className="label">Department</div><div className="val">{window.findDepartment(u.department)?.name || '—'}</div></div>
        <div className="cell"><div className="label">Location</div><div className="val">{window.findLocation(u.location)?.name || '—'}</div></div>
        <div className="cell"><div className="label">Company</div><div className="val">{window.findCompany(u.company)?.name || '—'}</div></div>
        {(() => {
          const cc = window.findCostCenter(u.cost_center) ||
                     window.findCostCenter(window.findDepartment(u.department)?.cost_center);
          return (
            <div className="cell">
              <div className="label">Cost center</div>
              <div className="val">{cc ? `${cc.name}${cc.code ? ` · ${cc.code}` : ''}` : '—'}</div>
            </div>
          );
        })()}
        <div className="cell"><div className="label">Active</div><div className="val">{u.active ? 'true' : 'false'}</div></div>
        <div className="cell"><div className="label">sys_id</div><div className="val mono" style={{ fontSize: 12, color: 'var(--fg-3)' }}>{u.sys_id}</div></div>
        <div className="cell"><div className="label">Last updated</div><div className="val">{u.sys_updated_on}</div></div>
      </div>

      <div className="ref-section">
        <h2>Group membership <span className="count">{groupMembership.length}</span></h2>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          {groupMembership.map(g => (
            <span key={g.sys_id} className="chip" style={{ cursor: 'pointer' }} onClick={() => window.navigate(`/groups/${g.sys_id}`)}>
              <window.Icon name="users" size={11} />{g.name}
            </span>
          ))}
          {groupMembership.length === 0 && <span style={{ color: 'var(--fg-4)', fontSize: 12.5 }}>None.</span>}
        </div>
      </div>

      {roles != null && <RolesSection resp={roles} inheritedField="inherited" title="Roles" />}

      {delegations != null && (delegations.given.total > 0 || delegations.received.total > 0) && (
        <div className="ref-section">
          <h2>Delegations <span className="count">{(delegations.given.total + delegations.received.total).toLocaleString()}</span></h2>
          {delegations.given.total > 0 && (
            <div style={{ marginTop: 10 }}>
              <div style={{ fontSize: 12.5, color: 'var(--fg-3)', marginBottom: 6, fontWeight: 500 }}>
                · delegating to others <span className="count">{delegations.given.total.toLocaleString()}</span>
              </div>
              <DelegationList rows={delegations.given.rows} otherField="delegate" />
            </div>
          )}
          {delegations.received.total > 0 && (
            <div style={{ marginTop: 10 }}>
              <div style={{ fontSize: 12.5, color: 'var(--fg-3)', marginBottom: 6, fontWeight: 500 }}>
                · receiving from others <span className="count">{delegations.received.total.toLocaleString()}</span>
              </div>
              <DelegationList rows={delegations.received.rows} otherField="user" />
            </div>
          )}
        </div>
      )}

      <RelatedRecordsSection title="Templates" table="sys_template" field="user" sys_id={sys_id} slim orderBy="sys_updated_on"
        renderRow={t => (
          <RefRow key={t.sys_id} onClick={() => window.navigate(window.recordUrl('sys_template', t.sys_id))}>
            <window.Icon name="file" size={13} />
            <span style={{ fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{t.name}</span>
            <span className="mono" style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--fg-4)' }}>{t.table || ''}</span>
          </RefRow>
        )} />

      <RelatedRecordsSection title="Knowledge authored" table="kb_knowledge" field="author" sys_id={sys_id} slim orderBy="sys_updated_on"
        renderRow={a => (
          <RefRow key={a.sys_id} onClick={() => window.navigate(`/knowledge/${a.sys_id}`)}>
            <span className="mono" style={{ fontSize: 11.5, color: 'var(--fg-3)' }}>{a.number}</span>
            <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{a.short_description}</span>
          </RefRow>
        )} />

      <RelatedRecordsSection title="Approvals" table="sysapproval_approver" field="approver" sys_id={sys_id} orderBy="sys_created_on"
        renderRow={a => (
          <RefRow key={a.sys_id}>
            <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{a.__display_sysapproval || a.sysapproval || '—'}</span>
            <span className="chip" style={{ marginLeft: 'auto', fontSize: 10.5 }}>{a.__display_state || a.state || '—'}</span>
          </RefRow>
        )} />

      <RelatedRecordsSection title="CIs owned" table="cmdb_ci" field="owned_by" sys_id={sys_id} slim orderBy="sys_updated_on"
        renderRow={c => (
          <RefRow key={c.sys_id} onClick={() => window.navigate(`/cis/${c.sys_id}`)}>
            <window.Icon name="ci" size={12} />
            <span style={{ fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{c.name}</span>
            <span className="mono" style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--fg-4)' }}>{c.sys_class_name || ''}</span>
          </RefRow>
        )} />

      {relations == null && (
        <div className="ref-section">
          <h2>Related work <span className="count">…</span></h2>
          <div style={{ color: 'var(--fg-4)', fontSize: 12.5 }}>
            <span className="dot-pulse" style={{ display: 'inline-block', marginRight: 8 }} />loading…
          </div>
        </div>
      )}
      {relations != null && (() => {
        // Pivot relations ({field: buckets[]}) into per-table view:
        //   byTable[t] = [{ label, total, items }, ...]   (one entry per non-empty relationship)
        const byTable = {};
        for (const { field, label } of USER_RELATIONS) {
          for (const bucket of (relations[field] || [])) {
            if (!byTable[bucket.table]) byTable[bucket.table] = [];
            byTable[bucket.table].push({ label, total: bucket.total, items: bucket.items });
          }
        }
        const tables = USER_TABLE_ORDER.filter(t => byTable[t]);
        if (tables.length === 0) {
          return (
            <div className="ref-section">
              <h2>Related work <span className="count">0</span></h2>
              <div style={{ color: 'var(--fg-4)', fontSize: 12.5 }}>None in this snapshot.</div>
            </div>
          );
        }
        return tables.map(t => (
          <div key={t} className="ref-section">
            <h2>{window.taskLabel(t, 'plural')}</h2>
            {byTable[t].map(({ label, total, items }) => (
              <div key={label} style={{ marginTop: 10 }}>
                <div style={{ fontSize: 12.5, color: 'var(--fg-3)', marginBottom: 6, fontWeight: 500 }}>
                  · {label} <span className="count">{total.toLocaleString()}</span>
                </div>
                <SmallIncTable incidents={items} table={t} />
              </div>
            ))}
          </div>
        ));
      })()}
      {hwAssigned && hwAssigned.total > 0 && (
        <div className="ref-section">
          <h2>Hardware · assigned <span className="count">{hwAssigned.total.toLocaleString()}</span></h2>
          <HardwareGrid rows={hwAssigned.rows} />
        </div>
      )}
      {hwOwned && hwOwned.total > 0 && (
        <div className="ref-section">
          <h2>Hardware · owned <span className="count">{hwOwned.total.toLocaleString()}</span></h2>
          <HardwareGrid rows={hwOwned.rows} />
        </div>
      )}
    </div>
  );
};

function HardwareGrid({ rows }) {

  }
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 8 }}>
      {rows.map(h => (
        <div key={h.sys_id}
             onClick={() => window.navigate(`/hardware/${h.sys_id}`)}
             style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px', cursor: 'pointer' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
            <window.Icon name="ci" size={12} />
            <span className="mono" style={{ fontSize: 12 }}>{h.asset_tag || h.sys_id.slice(0, 8) + '…'}</span>
            <span className="chip" style={{ marginLeft: 'auto', fontSize: 10.5 }}>
              {h.__display_install_status || h.install_status || h.state || '—'}
            </span>
          </div>
          <div style={{ fontSize: 12.5, color: 'var(--fg-2)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            {h.display_name || h.name || '—'}
          </div>
          {h.serial_number && (
            <div className="mono" style={{ fontSize: 11, color: 'var(--fg-4)', marginTop: 2 }}>SN {h.serial_number}</div>
          )}
        </div>
      ))}
    </div>
  );
}

// Compact tabular list of task records. Defaults to incident routing for
// backward compatibility — pass `table={...}` to navigate to other task types.
function SmallIncTable({ incidents, table = 'incident' }) {
  if (incidents == null) {
    return <div style={{ color: 'var(--fg-4)', fontSize: 12.5 }}>
      <span className="dot-pulse" style={{ display: 'inline-block', marginRight: 8 }} />loading…
    </div>;
  }
  if (!incidents.length) return <div style={{ color: 'var(--fg-4)', fontSize: 12.5 }}>None in this snapshot.</div>;
  return (
    <table className="dt" style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 6, overflow: 'hidden' }}>
      <tbody>
        {incidents.slice(0, 12).map(i => (
          <tr key={i.sys_id} onClick={() => window.navigate(window.recordUrl(table, i.sys_id))}>

// Helper: bucket task records by their table for a sys_id-based field
// (e.g. `assignment_group`, `cmdb_ci`, `caller_id`, `requested_for`).
// Issues one /api/<table>?<field>=<sys_id> query per table in parallel and
// returns the non-empty buckets in input order.
//
// History: an older version filtered eager-loaded arrays in memory for any
// non-`incident` table. That silently dropped every non-incident bucket
// because the eager arrays for sc_request/sc_req_item/sc_task/etc. are
// declared `[]` in data.js but never populated (lazy by design — see the
// EAGER_TABLES list there). Switching everything to the API also handles
// per-relationship fan-out from the user record page cleanly.
async function bucketTaskRecordsAsync(field, sys_id, { tables } = {}) {
  const ts = tables || window.TASK_TABLES || ['incident', 'change_request'];
  const data = window.HistoricalWowData;
  const results = await Promise.all(ts.map(t =>
    data.fetchTaskList(t, {
      limit: 12, filters: { [field]: sys_id },
      order_by: 'sys_updated_on', dir: 'desc',
    }).then(res => (res.rows && res.rows.length)
      ? { table: t, items: res.rows, total: res.total }
      : null
    ).catch(() => null)
  ));
  return results.filter(Boolean);
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
  </script>

  <script type="text/babel">
/* eslint-disable */
// Service catalog — overview dashboard, catalog item list, and a per-item
// record view that mirrors ServiceNow's "related lists" tabs (Variables,
// Variable Sets, Catalog UI Policies, Catalog Client Scripts, Available For,
// Not Available For, Categories, Catalogs, Catalog Data Lookup Definitions,
// Related Articles, Related Catalog Items, Assigned Topics).
//
// Data layer: fetches real records from /api/sc_cat_item and the catalog
// admin tables (catalog_ui_policy, catalog_script_client, user_criteria,
// io_set_item, sc_cat_item_user_criteria_mtom, …). Each related list
// degrades gracefully — when a table isn't in the snapshot the tab shows
// an "(not in this snapshot)" empty state pointing at exporter coverage.

(function () {
  const data = window.HistoricalWowData;

  // ---- Tiny request-deduping cache --------------------------------------
  // The overview, list, and record views all touch /api/sc_cat_item. Cache
  // by URL so we only pay once per page-load; one in-flight promise per
  // URL means concurrent renders share the request.
  const _cache = new Map();
  function fetchCached(key, fetcher, ttlMs = 60_000) {
    const e = _cache.get(key);
    const now = Date.now();
    if (e && (e.promise || (e.value && now - e.ts < ttlMs))) {
      return e.promise || Promise.resolve(e.value);
    }
    const p = fetcher().then(v => { _cache.set(key, { value: v, ts: Date.now() }); return v; });
    _cache.set(key, { promise: p });
    return p;
  }

  // /api/<table>?<params> with graceful fallback for tables that aren't
  // ingested yet. Returns { rows: [...], total: N, missing: bool }.
  // missing=true means the table isn't in REFERENCE_TABLES or the SQLite
  // DB — the tab can render an honest "not in snapshot" state.
  async function fetchTable(table, opts = {}) {
    try {
      const r = await data.fetchTaskList(table, opts);
      return { rows: r.rows || [], total: r.total || 0, missing: false };
    } catch (e) {
      const msg = (e && e.message) || '';
      if (/HTTP 404|HTTP 500|unknown table|no such table/i.test(msg)) {
        return { rows: [], total: 0, missing: true, error: msg };
      }
      // Unknown failure — surface as missing with the message so the UI
      // can show a useful hint rather than an empty list.
      return { rows: [], total: 0, missing: true, error: msg };
    }
  }

  // Page through every row of /api/<table> matching opts (no fixed cap on
  // top of `hardCap`). Used by panels that need full-snapshot aggregates —
  // the truncated `limit=N` form silently drops rows beyond N, which made
  // the "Most-used producers" panel and "Created Records" tab undercount
  // for high-volume templates. hardCap is a sanity stop so a runaway
  // query (or a misconfigured table) can't burn unbounded memory.
  async function fetchAllRows(table, opts = {}, hardCap = 50_000) {
    const pageSize = Math.min(opts.limit || 5000, 5000);
    let rows = [];
    let total = null;
    let offset = 0;
    while (offset < hardCap) {
      const r = await fetchTable(table, { ...opts, limit: pageSize, offset });
      if (r.missing) return { rows: [], total: 0, missing: true };
      if (total === null) total = r.total || 0;
      rows = rows.concat(r.rows);
      if (r.rows.length < pageSize) break;     // last page
      if (rows.length >= total) break;          // got everything
      offset += pageSize;
    }
    const capped = rows.length < (total || 0);
    return { rows, total: total || rows.length, missing: false, capped };
  }

  // ---- Item kind classification -----------------------------------------
  // Maps sys_class_name to a friendly category the UI can chip + filter by.
  // 'producer' covers any producer-shaped subclass — those don't create
  // RITMs (they spawn records in target tables) so the dashboard's RITM
  // overlay under-counts them, and the record view shows a "Created
  // records" tab instead of the usual variables-driven flow.
  const KIND_BY_CLASS = {
    'sc_cat_item':                    { kind: 'item',     label: 'Item' },
    'pc_software_cat_item':           { kind: 'software', label: 'Software' },
    'sc_cat_item_content':            { kind: 'content',  label: 'Content' },
    'sc_cat_item_producer':           { kind: 'producer', label: 'Record Producer' },
    'std_change_record_producer':     { kind: 'std_chg',  label: 'Std Change Template' },
    'sc_cat_item_composite_producer': { kind: 'composite', label: 'Composite Producer' },
  };
  function kindOf(it) {
    const cls = (it && it.sys_class_name && (it.sys_class_name.value || it.sys_class_name)) || 'sc_cat_item';
    return KIND_BY_CLASS[cls] || { kind: 'other', label: String(cls).replace(/_/g, ' ') };
  }
  const PRODUCER_KINDS = new Set(['producer', 'std_chg', 'composite']);

  // ---- Public catalog API ----------------------------------------------
  const C = {
    KIND_BY_CLASS, PRODUCER_KINDS, kindOf,
    // Pull every sc_cat_item (213 in the live snapshot). Sorted by name.
    fetchAllItems: () => fetchCached('all_items', async () => {
      const r = await fetchTable('sc_cat_item', { limit: 5000, order_by: 'name', dir: 'asc' });
      return r.rows;
    }),
    // Every standard-change `change_request` in the snapshot, paged from
    // /api/change_request?type=standard. Cached on first call so the
    // dashboard doesn't re-page on every render. Live snapshot has ~2,174
    // standards out of ~14,974 total change_requests.
    fetchAllStandardChanges: () => fetchCached('all_std_changes', () =>
      fetchAllRows('change_request', {
        filters: { type: 'standard' },
        order_by: 'sys_updated_on', dir: 'desc',
      }),
      120_000,
    ),
    // For Standard Change templates: producer.name -> all proposal versions
    // -> all change_request rows that reference any of those proposal sys_ids.
    // Pages through every change_request — high-volume templates have 600+
    // rows, so the previous limit=200 silently truncated. Returns
    // { proposals, changes, total, capped }.
    fetchProducerCreatedRecords: async (producerName) => {
      if (!producerName) return { proposals: [], changes: [], total: 0 };
      const propRes = await fetchTable('std_change_proposal', {
        limit: 50, filters: { template_name: producerName }, order_by: 'sys_updated_on', dir: 'desc',
      });
      if (propRes.missing) return { proposals: [], changes: [], total: 0, missing: true };
      const proposals = propRes.rows;
      // Fan out one paged query per proposal sys_id (1-3 versions / template).
      const changeBuckets = await Promise.all(proposals.map(p =>
        fetchAllRows('change_request', {
          filters: { std_change_producer_version: p.sys_id },
          order_by: 'sys_updated_on', dir: 'desc',
        })
      ));
      const all = [];
      let total = 0, capped = false;
      for (let i = 0; i < changeBuckets.length; i++) {
        for (const r of changeBuckets[i].rows) all.push({ ...r, _proposal: proposals[i] });
        total += changeBuckets[i].total || 0;
        if (changeBuckets[i].capped) capped = true;
      }
      all.sort((a, b) => (b.sys_updated_on || '').localeCompare(a.sys_updated_on || ''));
      return { proposals, changes: all, total, capped };
    },
    fetchItem: (sys_id) => data.fetchRecord('sc_cat_item', sys_id),
    fetchVariablesFor: (sys_id) => fetchTable('item_option_new', {
      limit: 500, filters: { cat_item: sys_id }, order_by: 'order', dir: 'asc',
    }),
    fetchUIPoliciesFor: (sys_id) => fetchTable('catalog_ui_policy', {
      limit: 200, filters: { cat_item: sys_id }, order_by: 'order', dir: 'asc',
    }),
    fetchUIPolicyActionsFor: (sys_id) => fetchTable('catalog_ui_policy_action', {
      limit: 500, filters: { cat_item: sys_id },
    }),
    fetchClientScriptsFor: (sys_id) => fetchTable('catalog_script_client', {
      limit: 200, filters: { cat_item: sys_id }, order_by: 'name', dir: 'asc',
    }),
    fetchAvailableFor: (sys_id) => fetchTable('sc_cat_item_user_criteria_mtom', {
      limit: 200, filters: { sc_cat_item: sys_id },
    }),
    fetchNotAvailableFor: (sys_id) => fetchTable('sc_cat_item_user_criteria_no_mtom', {
      limit: 200, filters: { sc_cat_item: sys_id },
    }),
    fetchVariableSetsFor: (sys_id) => fetchTable('io_set_item', {
      limit: 100, filters: { sc_cat_item: sys_id }, order_by: 'order', dir: 'asc',
    }),
    fetchUserCriterion: (sys_id) => fetchCached('uc_' + sys_id,
      () => data.fetchRecord('user_criteria', sys_id).catch(() => null)),
    fetchVariableSet: (sys_id) => fetchCached('vset_' + sys_id,
      () => data.fetchRecord('item_option_new_set', sys_id).catch(() => null)),
    fetchCatalog: (sys_id) => fetchCached('catalog_' + sys_id,
      () => data.fetchRecord('sc_catalog', sys_id).catch(() => null)),
    fetchCategory: (sys_id) => fetchCached('category_' + sys_id,
      () => data.fetchRecord('sc_category', sys_id).catch(() => null)),
    // Aggregate counts the dashboard tiles want. Each of these is just a
    // count(*) query — limit=1, total field carries the count.
    fetchTotalCount: (table) => fetchCached('count_' + table, async () => {
      const r = await fetchTable(table, { limit: 1 });
      return { total: r.total, missing: r.missing };
    }, 30_000),
  };

  C._cache = _cache;
  window.HistoricalWowCatalog = C;
})();

        'catalog_ui_policy', 'catalog_script_client',

        'item_option_new_set', 'io_set_item',

      ].map(t => C.fetchTotalCount(t).then(r => [t, r]))).then(pairs => {

        .then(r => { if (!cancel) { setRitms(r.rows || []); setRitmTotal(r.total || 0); } })
        .catch(() => { if (!cancel) { setRitms([]); setRitmTotal(0); } });
      // Standard change templates create change_requests, not RITMs. Page
      // through every one in the snapshot (not just the most recent N) so
      // the "Most-used record producers" counts reflect actual snapshot
      // history, not whatever happened in the last few months.
      C.fetchAllStandardChanges()
        .then(r => { if (!cancel) setStdChanges(r.rows); })
        .catch(() => { if (!cancel) setStdChanges([]); });
      return () => { cancel = true; };
    }, []);

    // Most-used record producers, ranked by # of change_requests created
    // from the template. Display values on change_request.std_change_producer_version
    // include " - N" version suffix; strip it to get the producer name.
    const topProducers = useMemo(() => {
      if (!items || !stdChanges) return null;
      const itemsByName = new Map();
      for (const it of items) itemsByName.set(String(it.name || ''), it);
      const counts = new Map();
      for (const cr of stdChanges) {
        const tmpl = stripVersionSuffix(dv(cr, 'std_change_producer_version'));
        if (!tmpl) continue;
        if (!counts.has(tmpl)) counts.set(tmpl, { name: tmpl, total: 0, item: itemsByName.get(tmpl) || null });
        counts.get(tmpl).total += 1;
      }
      return [...counts.values()].sort((a, b) => b.total - a.total).slice(0, 12);
    }, [items, stdChanges]);
    const stdChgPctOfWindow = stdChanges ? Math.round((stdChanges.length / Math.max(1, stdChanges.length)) * 100) : 0;

    // Aggregate per-cat_item RITM counts and outcomes from the real RITMs.
    const usageByCatItem = useMemo(() => {
      if (!ritms) return null;
      const m = new Map();
      for (const r of ritms) {
        const k = flat(r.cat_item) || ('__d:' + dv(r, 'cat_item'));
        if (!m.has(k)) m.set(k, { sys_id: flat(r.cat_item), name: dv(r, 'cat_item') || '(unnamed)', rows: [] });
        m.get(k).rows.push(r);
      }
      return m;
    }, [ritms]);

    const itemsByCatalog = useMemo(() => {
      if (!items) return new Map();
      const m = new Map();
      for (const it of items) {
        const k = dv(it, 'sc_catalogs') || '(uncategorized)';
        if (!m.has(k)) m.set(k, []);
        m.get(k).push(it);
      }
      return m;
    }, [items]);

    const itemsByCategory = useMemo(() => {
      if (!items) return new Map();
      const m = new Map();
      for (const it of items) {
        const k = dv(it, 'category') || '(uncategorized)';
        if (!m.has(k)) m.set(k, []);
        m.get(k).push(it);
      }
      return m;
    }, [items]);

    // Top items by RITM count
    const topItems = useMemo(() => {
      if (!items || !usageByCatItem) return null;
      const itemBySid = new Map(items.map(i => [i.sys_id, i]));
      const ranked = [];
      for (const u of usageByCatItem.values()) {
        const it = itemBySid.get(u.sys_id);
        if (!it) continue;  // catalog item from outside the snapshot
        ranked.push({
          item: it,
          ritmCount: u.rows.length,
          rows: u.rows,
        });
      }
      ranked.sort((a, b) => b.ritmCount - a.ritmCount);
      return ranked.slice(0, 12);
    }, [items, usageByCatItem]);

    // Outcome mix from the snapshot RITMs.
    const outcomeMix = useMemo(() => {
      const m = { 'Closed complete': 0, 'Closed incomplete': 0, 'Closed cancelled': 0,
                  'Closed rejected': 0, 'Open / in-progress': 0, '(other)': 0 };
      const decode = (s) => {
        s = String(s || '');
        if (s === '3') return 'Closed complete';
        if (s === '4') return 'Closed incomplete';
        if (s === '7') return 'Closed cancelled';
        if (s === '8') return 'Closed rejected';
        if (s === '1' || s === '2') return 'Open / in-progress';
        return '(other)';
      };
      if (ritms) for (const r of ritms) m[decode(flat(r.state))] += 1;
      return m;

    return (

                      return (

                          <td className="num mono">{t.ritmCount.toLocaleString()}</td>
                          <td>

                              <div style={{ width: w(mix.o) + '%', background: 'var(--c-blue)' }} title={`in-progress ${mix.o}`} />
                              <div style={{ width: w(mix.x) + '%', background: 'var(--c-amber)' }} title={`incomplete ${mix.x}`} />
                              <div style={{ width: w(mix.c) + '%', background: 'var(--c-gray)' }} title={`cancelled ${mix.c}`} />

                            </div>

            </div>
          </div>

          {/* Outcome donut + breakdowns */}

                  <span style={{ fontSize: 12.5 }}>{cat}</span>

                </div>
              ))}
            </div>

            <h2 style={{ fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--fg-3)', margin: '20px 0 10px' }}>
              By category
            </h2>
            <div style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 8, padding: '12px 14px', maxHeight: 260, overflowY: 'auto' }}>
              {[...itemsByCategory.entries()].sort((a, b) => b[1].length - a[1].length).map(([cty, its]) => (
                <div key={cty} style={{ display: 'flex', alignItems: 'baseline', gap: 8, padding: '4px 0', borderBottom: '1px solid var(--border)' }}>
                  <span style={{ fontSize: 12.5 }}>{cty}</span>
                  <span className="mono" style={{ marginLeft: 'auto', fontSize: 11.5, color: 'var(--fg-3)' }}>{its.length}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Most-used record producers (Standard Change templates).
            These create change_request rows, not RITMs, so they're invisible
            to the "Most-used items" panel above — surface them separately. */}
        <div style={{ marginTop: 28 }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10 }}>
            <h2 style={{ fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--fg-3)', margin: 0 }}>
              Most-used record producers
              <span className="mono" style={{ color: 'var(--fg-4)', marginLeft: 8 }}>
                from {stdChanges == null ? '…' : stdChanges.length.toLocaleString()} standard changes
              </span>
            </h2>
            <span style={{ fontSize: 11, color: 'var(--fg-4)' }}>
              counts join change_request → std_change_proposal → std_change_record_producer
            </span>
          </div>
          <div style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 8, overflow: 'hidden' }}>
            {topProducers == null ? <Loading /> : topProducers.length === 0 ? (
              <div style={{ padding: 24, color: 'var(--fg-4)', fontSize: 12.5, textAlign: 'center' }}>
                No standard changes in the snapshot reference catalog producers.
              </div>
            ) : (
              <table className="dt" style={{ width: '100%' }}>
                <thead><tr>
                  <th>Standard Change template</th>
                  <th style={{ width: 120 }} className="num">Changes created</th>
                  <th style={{ width: 200 }}>Catalog item</th>
                </tr></thead>
                <tbody>
                  {topProducers.map(p => (
                    <tr key={p.name}
                        onClick={() => p.item && window.navigate(`/catalog-items/${p.item.sys_id}`)}
                        style={{ cursor: p.item ? 'pointer' : 'default' }}>
                      <td>
                        <strong style={{ fontWeight: 500 }}>{p.name}</strong>
                      </td>
                      <td className="num mono">{p.total.toLocaleString()}</td>
                      <td>
                        {p.item
                          ? <span style={{ ...chip, background: KIND_CHIP.std_chg.bg, borderColor: KIND_CHIP.std_chg.border, color: KIND_CHIP.std_chg.fg }}>Open template →</span>
                          : <span style={{ color: 'var(--fg-4)', fontSize: 11.5, fontStyle: 'italic' }}>(no matching sc_cat_item)</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>

        <div style={{ marginTop: 28 }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10 }}>
            <h2 style={{ fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.08em', color: 'var(--fg-3)', margin: 0 }}>
              All catalog items <span className="mono" style={{ color: 'var(--fg-4)' }}>{items.length}</span>
            </h2>
            <a onClick={() => window.navigate('/catalog-items')} style={{ fontSize: 12, color: 'var(--accent-fg)', cursor: 'pointer' }}>
              Open list →
            </a>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 8 }}>
            {items.map(it => {
              const u = usageByCatItem?.get(it.sys_id);
              return (
                <div key={it.sys_id}
                     onClick={() => window.navigate(`/catalog-items/${it.sys_id}`)}
                     style={{
                       background: 'var(--bg-elev)', border: '1px solid var(--border)',
                       borderRadius: 8, padding: '10px 12px', cursor: 'pointer',
                       opacity: isTrue(dv(it, 'active')) ? 1 : 0.55,

                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                    <window.Icon name="file" size={12} />
                    <span style={{ fontSize: 13, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{it.name}</span>
                    {!isTrue(dv(it, 'active')) && <span style={{ ...chip, fontSize: 10 }}>inactive</span>}

                  <div style={{ fontSize: 11.5, color: 'var(--fg-3)', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>

                  <div style={{ marginTop: 6, display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'var(--fg-4)' }}>
                    <KindChip it={it} />
                    <span style={chip}>{dv(it, 'category') || 'no category'}</span>
                    <span className="mono" style={{ marginLeft: 'auto' }}>{u ? u.rows.length.toLocaleString() : 0} RITMs</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  };

  function Donut({ segments, total, subtitle }) {
    const size = 160, stroke = 28, r = (size - stroke) / 2, c = size / 2;
    const circ = 2 * Math.PI * r;
    let acc = 0;
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={c} cy={c} r={r} fill="none" stroke="var(--bg-3)" strokeWidth={stroke} />
          {segments.map((s, i) => {
            if (!total || s.value === 0) return null;
            const frac = s.value / total;
            const dash = `${(circ * frac).toFixed(2)} ${(circ - circ * frac).toFixed(2)}`;
            const offset = -acc * circ;
            acc += frac;
            return (
              <circle key={i} cx={c} cy={c} r={r} fill="none"
                stroke={s.color} strokeWidth={stroke}
                strokeDasharray={dash} strokeDashoffset={offset}
                transform={`rotate(-90 ${c} ${c})`} />
            );
          })}
          <text x={c} y={c - 4} textAnchor="middle" style={{ fontFamily: 'var(--font-mono)', fontSize: 18, fill: 'var(--fg)' }}>
            {(total || 0).toLocaleString()}
          </text>
          <text x={c} y={c + 14} textAnchor="middle" style={{ fontSize: 10, fill: 'var(--fg-4)' }}>
            {subtitle || ''}
          </text>
        </svg>
      </div>
    );
  }

  // =========================================================================
  // Catalog item list
  // =========================================================================
  window.CatalogItemListPage = function CatalogItemListPage() {
    const [items, setItems] = useState(null);
    const [q, setQ] = useState('');
    const [catalog, setCatalog] = useState('');
    const [category, setCategory] = useState('');
    const [kind, setKind] = useState('');  // empty = all kinds

    useEffect(() => {
      window.AuditLog.push('list', 'sc_cat_item', '');
      let cancel = false;
      C.fetchAllItems().then(rs => { if (!cancel) setItems(rs); }).catch(() => { if (!cancel) setItems([]); });
      return () => { cancel = true; };
    }, []);

    const catalogs = useMemo(() => {
      if (!items) return [];
      return [...new Set(items.map(i => dv(i, 'sc_catalogs')).filter(Boolean))].sort();
    }, [items]);
    const categories = useMemo(() => {
      if (!items) return [];
      return [...new Set(items.map(i => dv(i, 'category')).filter(Boolean))].sort();
    }, [items]);
    // Counts per kind (drives the dropdown labels so you can see
    // how many of each type exist without filtering first).
    const kindCounts = useMemo(() => {
      const m = new Map();
      for (const i of (items || [])) {
        const k = C.kindOf(i);
        const key = k.kind + '|' + k.label;
        m.set(key, (m.get(key) || 0) + 1);
      }
      return [...m.entries()].map(([k, n]) => {
        const [kind, label] = k.split('|');
        return { kind, label, count: n };
      }).sort((a, b) => b.count - a.count);
    }, [items]);

    const filtered = useMemo(() => {
      if (!items) return [];
      const ql = q.trim().toLowerCase();
      return items.filter(i => {
        if (catalog && dv(i, 'sc_catalogs') !== catalog) return false;
        if (category && dv(i, 'category') !== category) return false;
        if (kind && C.kindOf(i).kind !== kind) return false;
        if (activeOnly && !isTrue(dv(i, 'active'))) return false;
        if (!ql) return true;
        return [i.name, i.short_description, dv(i, 'category'), dv(i, 'sc_catalogs'), flat(i.sys_class_name)]

      <div>
        <div className="page-header">

          </div>
          <div className="toolbar">
            <select value={kind} onChange={e => setKind(e.target.value)}
              style={{ height: 26, padding: '0 10px', border: '1px solid var(--border-2)', borderRadius: 14, background: 'var(--bg-elev)', fontSize: 12, color: 'var(--fg)', outline: 'none' }}>
              <option value="">All types ({items ? items.length : '…'})</option>
              {kindCounts.map(k => (
                <option key={k.kind} value={k.kind}>{k.label} ({k.count})</option>
              ))}
            </select>
            <select value={catalog} onChange={e => setCatalog(e.target.value)}
              style={{ height: 26, padding: '0 10px', border: '1px solid var(--border-2)', borderRadius: 14, background: 'var(--bg-elev)', fontSize: 12, color: 'var(--fg)', outline: 'none' }}>
              <option value="">All catalogs</option>
              {catalogs.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <select value={category} onChange={e => setCategory(e.target.value)}

              <option value="">All categories</option>
